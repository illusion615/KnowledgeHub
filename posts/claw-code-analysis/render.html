<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加载中...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/article.css" />
  <link rel="stylesheet" href="../../assets/scrollbar.css" />
  <style>
    /* Renderer-specific: code blocks */
    .code-block {
      position: relative;
      margin: 18px 0;
      border-radius: 14px;
      overflow: hidden;
    }
    .code-block pre {
      margin: 0;
      padding: 22px 24px;
      background: rgba(16, 31, 43, 0.95);
      color: #cdd6e0;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      overflow-x: auto;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
    }
    [data-theme="dark"] .code-block pre {
      background: rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.08);
    }

    /* Renderer-specific: mermaid */
    .mermaid-container {
      margin: 24px 0;
      padding: 28px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
      overflow-x: auto;
    }
    .mermaid-container .mermaid {
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
    }
    .mermaid-container svg {
      max-width: 100%;
    }

    /* Renderer-specific: table enhancements */
    .simple-table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.85rem;
    }
    .simple-table th,
    .simple-table td {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .simple-table th {
      font-weight: 600;
      color: var(--fg);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .simple-table td {
      color: var(--muted);
    }

    /* Loading skeleton */
    .render-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .render-loading .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent, #0d8f8c);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* View mode toggle button */
    .view-mode-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .view-mode-toggle:hover {
      background: rgba(255,255,255,0.12);
      color: var(--fg);
    }

    /* ── Markdown Plain View (independent DOM) ── */
    .view-markdown {
      font-family: "Noto Sans SC", "Space Grotesk", sans-serif;
      color: var(--fg, #1a1a1a);
      line-height: 1.75;
    }
    .view-markdown .md-plain {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
    .md-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(128,128,128,0.06);
      margin-bottom: 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(246, 248, 251, 0.45);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      backdrop-filter: blur(20px) saturate(180%);
    }
    [data-theme="dark"] .md-topbar {
      background: rgba(22, 27, 34, 0.45);
      border-bottom-color: rgba(255,255,255,0.04);
    }
    .md-topbar a {
      color: var(--muted, #666);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .md-topbar a:hover { color: var(--fg); }

    /* Mermaid in markdown view: transparent bg, unified tonal colors */
    .md-plain .mermaid {
      background: transparent !important;
    }
    .md-plain .mermaid .node rect,
    .md-plain .mermaid .node circle,
    .md-plain .mermaid .node polygon {
      fill: rgba(13, 143, 140, 0.12) !important;
      stroke: rgba(13, 143, 140, 0.5) !important;
      stroke-width: 1.5px;
    }
    .md-plain .mermaid .node .label {
      color: var(--fg) !important;
      fill: var(--fg) !important;
    }
    .md-plain .mermaid .edgePath .path {
      stroke: rgba(13, 143, 140, 0.4) !important;
      stroke-width: 1.5px;
    }
    .md-plain .mermaid .edgeLabel {
      background: transparent !important;
    }
    .md-plain .mermaid .marker {
      fill: rgba(13, 143, 140, 0.5) !important;
      stroke: rgba(13, 143, 140, 0.5) !important;
    }
    .is-plain-toggle {
      background: var(--accent, #0d8f8c);
      color: #fff;
      border-color: var(--accent, #0d8f8c);
    }

    .md-plain h1 { font-size: 1.8rem; font-weight: 800; margin: 0 0 16px; line-height: 1.2; }
    .md-plain h2 { font-size: 1.4rem; font-weight: 700; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(128,128,128,0.2); }
    .md-plain h3 { font-size: 1.1rem; font-weight: 600; margin: 24px 0 8px; }
    .md-plain h4 { font-size: 1rem; font-weight: 600; margin: 20px 0 6px; }
    .md-plain p { margin: 0 0 12px; }
    .md-plain hr { border: none; border-top: 1px solid rgba(128,128,128,0.2); margin: 24px 0; }

    .md-plain blockquote {
      border-left: 3px solid rgba(128,128,128,0.3);
      margin: 12px 0;
      padding: 4px 0 4px 16px;
      color: var(--muted, #666);
    }
    .md-plain blockquote p { margin: 0 0 4px; }

    .md-plain ul, .md-plain ol { padding-left: 24px; margin: 8px 0 12px; }
    .md-plain li { margin: 4px 0; }

    .md-plain table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.88rem; }
    .md-plain th, .md-plain td { border: 1px solid rgba(128,128,128,0.25); padding: 6px 10px; text-align: left; }
    .md-plain th { font-weight: 600; background: rgba(128,128,128,0.06); }

    .md-plain pre {
      margin: 12px 0;
      padding: 14px 16px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      overflow-x: auto;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    [data-theme="dark"] .md-plain pre { background: rgba(255,255,255,0.06); }
    .md-plain code {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 0.88em;
      background: rgba(0,0,0,0.05);
      padding: 1px 4px;
      border-radius: 3px;
    }
    .md-plain pre code { background: transparent; padding: 0; }
    .md-plain img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="backdrop" aria-hidden="true">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
    </div>
    <div class="site" id="site">
      <div class="render-loading">
        <span class="spinner"></span>
        正在渲染文章...
      </div>
    </div>
  </div>

  <!-- Mermaid from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- Article Renderer -->
  <script src="../../assets/article-renderer.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var site = document.getElementById('site');
      site.innerHTML = '';
      StudyRoom.render('article.md', site);
    });
  </script>
  <script src="../../assets/scrollbar.js"></script>
  <script src="../../assets/article-presentation.js"></script>
</body>
</html>
