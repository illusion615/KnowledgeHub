<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Hub — 学习与研究笔记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f2ed;
      --ink: #1a1a1a;
      --muted: #6b7280;
      --accent: #ff7a00;
      --teal: #0d8f8c;
      --gold: #e0b04b;
      --orbit-stroke: rgba(0, 0, 0, 0.07);
      --node-glow: rgba(255, 122, 0, 0.35);
      --card-bg: rgba(255, 255, 255, 0.88);
      --card-border: rgba(0, 0, 0, 0.1);
      --card-shadow: 0 24px 64px rgba(0, 0, 0, 0.12);
      --line-color: rgba(255, 122, 0, 0.35);
      --ctrl-bg: rgba(0, 0, 0, 0.05);
      --ctrl-hover: rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --bg: #0c1018;
      --ink: #e4e6ea;
      --muted: #8b95a5;
      --orbit-stroke: rgba(255, 255, 255, 0.06);
      --node-glow: rgba(255, 122, 0, 0.45);
      --card-bg: rgba(18, 24, 34, 0.94);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      --line-color: rgba(255, 122, 0, 0.45);
      --ctrl-bg: rgba(255, 255, 255, 0.08);
      --ctrl-hover: rgba(255, 255, 255, 0.14);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Noto Sans SC", "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255, 122, 0, 0.06), transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(13, 143, 140, 0.05), transparent 50%);
      pointer-events: none;
    }

    [data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255, 122, 0, 0.04), transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(13, 143, 140, 0.03), transparent 50%);
    }

    a { color: inherit; text-decoration: none; }

    /* ---- overlay header ---- */
    .overlay-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 28px 36px;
      z-index: 10;
      pointer-events: none;
    }
    .overlay-header > * { pointer-events: auto; }

    .logo {
      font-family: "Space Grotesk", sans-serif;
      display: flex; align-items: center; gap: 10px;
    }
    .logo::before {
      content: "";
      width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      flex-shrink: 0;
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-owner {
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.04em; color: var(--muted); margin-bottom: 2px;
    }
    .logo-main {
      font-size: 1.4rem; font-weight: 700;
      letter-spacing: -0.02em; color: var(--ink);
    }

    .controls { display: flex; align-items: center; gap: 6px; margin-top: 4px; }

    .ctrl-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 6px 10px; border: none; border-radius: 8px;
      background: var(--ctrl-bg); color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: background 0.2s, color 0.2s; line-height: 1;
    }
    .ctrl-btn:hover { background: var(--ctrl-hover); color: var(--ink); }
    .ctrl-btn.is-active { color: var(--ink); font-weight: 700; }

    .ctrl-divider { width: 1px; height: 16px; background: var(--orbit-stroke); margin: 0 4px; }
    .theme-btn {
      width: 30px; height: 30px; padding: 0;
      background: transparent;
      border-radius: 0;
      color: var(--muted);
      opacity: 0.9;
      transition: color 0.2s, opacity 0.2s, filter 0.2s;
    }
    .theme-btn svg {
      width: 18px; height: 18px;
      display: block;
      pointer-events: none;
    }
    .theme-btn:hover {
      background: transparent;
      color: var(--ink);
      opacity: 1;
      filter: brightness(1.15);
    }

    /* ---- graph canvas ---- */
    .graph { position: fixed; inset: 0; width: 100%; height: 100%; cursor: grab; }
    .graph:active { cursor: grabbing; }

    .graph-stage {
      position: absolute; inset: 0; transform-origin: 0 0;
    }

    .graph-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .orbit-ring {
      fill: none;
      stroke: var(--orbit-stroke);
      stroke-dasharray: 6 10;
      transition: opacity 0.5s;
    }
    .orbit-ring.is-bg { opacity: 0.3; }

    .conn-line {
      fill: none; stroke: var(--line-color);
      stroke-width: 1.5; stroke-dasharray: 5 5;
      opacity: 0; transition: opacity 0.4s;
    }
    .conn-line.is-visible { opacity: 1; }

    /* ---- planet ---- */
    .planet {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 2;
      cursor: pointer;
      transition: opacity 0.5s, transform 0.3s;
    }
    .planet.is-bg {
      opacity: 0.2;
      pointer-events: auto;
    }
    .planet-body {
      border-radius: 50%;
      display: grid; place-items: center;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .planet-body::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.5), transparent 50%),
        radial-gradient(ellipse at 25% 60%, rgba(255,255,255,0.12) 0%, transparent 40%),
        radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.08) 0%, transparent 35%);
      pointer-events: none;
      z-index: 2;
    }

    .planet-body::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 65% 75%, rgba(0,0,0,0.4), transparent 50%);
      pointer-events: none;
      z-index: 2;
    }

    .planet-texture {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.62;
      background:
        radial-gradient(circle at 20% 45%, rgba(255,255,255,0.18) 0%, transparent 22%),
        radial-gradient(circle at 55% 25%, rgba(0,0,0,0.12) 0%, transparent 18%),
        radial-gradient(circle at 75% 55%, rgba(255,255,255,0.1) 0%, transparent 20%),
        radial-gradient(circle at 40% 70%, rgba(0,0,0,0.15) 0%, transparent 16%),
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08) 0%, transparent 14%),
        radial-gradient(circle at 60% 65%, rgba(255,255,255,0.12) 0%, transparent 18%),
        radial-gradient(circle at 85% 35%, rgba(0,0,0,0.1) 0%, transparent 15%),
        radial-gradient(circle at 15% 75%, rgba(0,0,0,0.08) 0%, transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 30%),
        radial-gradient(circle at 45% 15%, rgba(0,0,0,0.1) 0%, transparent 12%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.07) 0%, transparent 16%),
        radial-gradient(circle at 10% 50%, rgba(255,255,255,0.09) 0%, transparent 14%);
      mix-blend-mode: soft-light;
      filter: contrast(1.1) saturate(1.08);
      animation: planetSurfaceDrift 22s linear infinite;
    }

    .planet-surface-noise {
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.28;
      background:
        repeating-radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25) 0 1px, transparent 1px 4px),
        repeating-radial-gradient(circle at 68% 62%, rgba(0,0,0,0.18) 0 1px, transparent 1px 5px);
      mix-blend-mode: overlay;
      filter: blur(0.4px);
      animation: planetSurfaceDrift 28s linear infinite reverse;
    }

    .planet-relief {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.24;
      background:
        radial-gradient(ellipse at 26% 60%, rgba(0,0,0,0.25) 0%, transparent 32%),
        radial-gradient(ellipse at 64% 28%, rgba(255,255,255,0.22) 0%, transparent 34%),
        radial-gradient(ellipse at 72% 72%, rgba(0,0,0,0.2) 0%, transparent 26%);
      mix-blend-mode: multiply;
    }

    .planet-band {
      position: absolute;
      left: 0; right: 0;
      height: 28%;
      top: 38%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.15;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.2) 30%, rgba(0,0,0,0.15) 70%, transparent);
      filter: blur(1.5px);
    }

    @keyframes planetSurfaceDrift {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.02); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .planet:hover .planet-body,
    .planet.is-selected .planet-body {
      box-shadow: 0 0 36px var(--node-glow), 0 0 0 4px rgba(255, 255, 255, 0.1);
      transform: scale(1.08);
    }
    .planet-label {
      position: absolute;
      left: 50%; top: calc(100% + 8px);
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.76rem; font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 6px var(--bg);
      transition: color 0.3s;
    }
    .planet.is-selected .planet-label { color: var(--ink); }

    /* ---- knowledge node ---- */
    .node {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: box-shadow 0.3s, opacity 0.5s;
      z-index: 3;
    }
    .node::after {
      content: "";
      position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid transparent; transition: border-color 0.3s;
    }
    .node:hover, .node.is-active {
      box-shadow: 0 0 24px var(--node-glow);
    }
    .node:hover::after, .node.is-active::after {
      border-color: currentColor; opacity: 0.3;
    }
    .node.is-related { box-shadow: 0 0 18px var(--node-glow); }
    .node.is-dimmed { opacity: 0.12; pointer-events: none; }
    .node.is-bg { opacity: 0.15; pointer-events: none; }

    .node-label {
      position: absolute;
      left: 50%; top: calc(100% + 8px);
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.76rem; font-weight: 500;
      color: var(--muted);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
      text-shadow: 0 1px 4px var(--bg);
    }
    .node:hover .node-label,
    .node.is-active .node-label { opacity: 1; }
    .node.is-dimmed .node-label,
    .node.is-bg .node-label { opacity: 0; }

    /* ---- card ---- */
    .card {
      position: absolute;
      width: 360px;
      padding: 24px 24px 20px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      z-index: 5;
      opacity: 0;
      transform: scale(0.9) translateY(8px);
      transition: opacity 0.28s ease, transform 0.28s ease;
      pointer-events: none;
    }
    .card.is-visible {
      opacity: 1; transform: scale(1) translateY(0); pointer-events: auto;
    }
    .card-meta {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 8px; font-size: 0.78rem; color: var(--muted); margin-bottom: 10px;
    }
    .card-tag {
      padding: 2px 8px; border-radius: 999px;
      background: rgba(13, 143, 140, 0.1); color: var(--teal);
      font-size: 0.72rem; font-weight: 500;
    }
    [data-theme="dark"] .card-tag { background: rgba(13, 143, 140, 0.18); }
    .card h3 {
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 1.15rem; line-height: 1.4;
      letter-spacing: -0.01em; margin-bottom: 10px;
    }
    .card p {
      color: var(--muted); font-size: 0.88rem;
      line-height: 1.75; margin-bottom: 16px;
    }
    .card-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 600; color: var(--accent);
    }
    .card-link::after { content: "→"; transition: transform 0.2s; }
    .card-link:hover::after { transform: translateX(4px); }

    .planet-panel {
      position: absolute;
      width: min(420px, calc(100vw - 24px));
      max-height: min(72vh, 560px);
      padding: 20px 20px 18px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.5), rgba(255,255,255,0.18)),
        rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: 0 20px 56px rgba(0,0,0,0.16);
      -webkit-backdrop-filter: blur(24px) saturate(1.15);
      backdrop-filter: blur(24px) saturate(1.15);
      z-index: 4;
      opacity: 0;
      transform: scale(0.92) translateY(10px);
      transition: opacity 0.28s ease, transform 0.28s ease;
      pointer-events: none;
      overflow: hidden;
    }
    [data-theme="dark"] .planet-panel {
      background:
        linear-gradient(180deg, rgba(24,28,34,0.72), rgba(12,14,18,0.52)),
        rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.08);
      box-shadow: 0 24px 64px rgba(0,0,0,0.42);
    }
    .planet-panel.is-visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .planet-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .planet-panel-kicker {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .planet-panel-title {
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 1.02rem;
      line-height: 1.45;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .planet-panel-subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.6;
    }
    .planet-panel-close {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .planet-panel-close:hover {
      background: rgba(255,255,255,0.24);
      color: var(--ink);
      transform: rotate(90deg);
    }
    [data-theme="dark"] .planet-panel-close {
      background: rgba(255,255,255,0.06);
    }
    [data-theme="dark"] .planet-panel-close:hover {
      background: rgba(255,255,255,0.12);
    }
    .planet-panel-list {
      display: grid;
      gap: 12px;
      max-height: calc(min(72vh, 560px) - 112px);
      overflow: auto;
      padding-right: 4px;
    }
    .planet-panel-item {
      display: block;
      padding: 14px 14px 12px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      color: inherit;
      text-decoration: none;
      transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    [data-theme="dark"] .planet-panel-item {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
    }
    .planet-panel-item:hover {
      transform: translateY(-2px);
      border-color: rgba(255,122,0,0.36);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .planet-panel-item:hover {
      background: rgba(255,255,255,0.06);
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
    }
    .planet-panel-item h4 {
      font-size: 0.94rem;
      line-height: 1.5;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .planet-panel-item p {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .planet-panel-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
    }
    .planet-panel-link::after {
      content: "→";
      transition: transform 0.2s;
    }
    .planet-panel-item:hover .planet-panel-link::after {
      transform: translateX(4px);
    }

    /* ---- tag cloud ---- */
    .tag-cloud {
      position: fixed; left: 0; right: 0; bottom: 48px; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      padding: 0 24px;
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      pointer-events: auto;
    }
    .tag-cloud::-webkit-scrollbar { display: none; }
    .tag-cloud-label {
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.68rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); opacity: 0.6;
      flex-shrink: 0; margin-right: 4px;
    }
    .tag-chip {
      display: inline-flex; align-items: center;
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid var(--card-border);
      background: var(--ctrl-bg);
      color: var(--muted);
      font-size: 0.65rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
      -webkit-user-select: none;
      user-select: none;
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      white-space: nowrap; flex-shrink: 0;
    }
    .tag-chip:hover { color: var(--ink); border-color: var(--accent); }
    .tag-chip.is-selected {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(255, 122, 0, 0.25);
    }

    /* ---- settings sidebar ---- */
    .settings-btn svg { display: block; }
    .settings-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.3);
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .settings-backdrop.is-open { opacity: 1; pointer-events: auto; }
    .settings-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(380px, 85vw); z-index: 51;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.52));
      border-left: 1px solid rgba(0,0,0,0.08);
      box-shadow: -16px 0 48px rgba(0,0,0,0.1);
      -webkit-backdrop-filter: blur(32px) saturate(1.2);
      backdrop-filter: blur(32px) saturate(1.2);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    [data-theme="dark"] .settings-panel {
      background: linear-gradient(180deg, rgba(18,22,30,0.88), rgba(12,16,24,0.78));
      border-color: rgba(255,255,255,0.06);
      box-shadow: -16px 0 48px rgba(0,0,0,0.4);
    }
    .settings-panel.is-open { transform: translateX(0); }
    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 24px 16px; border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] .settings-header { border-color: rgba(255,255,255,0.06); }
    .settings-header h2 {
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 1.1rem; font-weight: 700; color: var(--ink);
    }
    .settings-close {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      border: none; background: var(--ctrl-bg); color: var(--muted);
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .settings-close:hover { background: var(--ctrl-hover); color: var(--ink); }
    .settings-body { padding: 20px 24px 32px; flex: 1; }
    .settings-section { margin-bottom: 28px; }
    .settings-section h3 {
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }
    .settings-field { margin-bottom: 14px; }
    .settings-label {
      display: block; font-size: 0.82rem; color: var(--muted);
      margin-bottom: 6px; font-weight: 500;
    }
    .settings-select,
    .settings-input {
      width: 100%; padding: 10px 12px;
      border-radius: 10px; border: 1px solid var(--card-border);
      background: var(--ctrl-bg); color: var(--ink);
      font-size: 0.88rem; font-family: inherit;

    var drag = { active: false, moved: false, startX: 0, startY: 0, camX: 0, camY: 0 };

    var planetMap = {};
    var postMap = {};

    // ============ DOM REFS ============
    var svg = document.getElementById('svg');
    var graphEl = document.getElementById('graph');
    var graphStageEl = document.getElementById('graph-stage');
    var planetPanelEl = document.getElementById('planet-panel');
    var cardEl = document.getElementById('card');

    // ============ INIT ============
    applyTheme(theme);
    applyLang(lang);
    createHubOrbits();
    createPlanets();
    createNodes();
    buildTagCloud();
    initSettings();
    requestAnimationFrame(animate);
    window.addEventListener('resize', onResize);
    graphEl.addEventListener('click', onGraphClick);
    planetPanelEl.addEventListener('mouseenter', beginHoverPause);
    planetPanelEl.addEventListener('mouseleave', endHoverPause);
    planetPanelEl.addEventListener('click', function (e) {
      if (e.target.closest('.planet-panel-close')) {
        e.stopPropagation();
        clearPlanetSelection();
      }
    });
    cardEl.addEventListener('mouseenter', beginHoverPause);
    cardEl.addEventListener('mouseleave', endHoverPause);

    // Zoom (mouse wheel)
    graphEl.addEventListener('wheel', function (e) {
      if (e.target.closest('.planet-panel')) return;
      e.preventDefault();
      var f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      var newScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, cam.scale * f));
      f = newScale / cam.scale;
      cam.x = e.clientX - (e.clientX - cam.x) * f;
      cam.y = e.clientY - (e.clientY - cam.y) * f;
      cam.scale = newScale;
    }, { passive: false });

    // Pan (drag on empty space)
    graphEl.addEventListener('mousedown', function (e) {
      if (e.button !== 0) return;
      if (e.target.closest('.node') || e.target.closest('.planet') ||
          e.target.closest('.card') || e.target.closest('.planet-panel') ||
          e.target.closest('.tag-chip') ||
          e.target.closest('.ctrl-btn')) return;
      drag.active = true; drag.moved = false;
      drag.startX = e.clientX; drag.startY = e.clientY;
      drag.camX = cam.x; drag.camY = cam.y;
    });
    window.addEventListener('mousemove', function (e) {
      if (!drag.active) return;
      var dx = e.clientX - drag.startX;
      var dy = e.clientY - drag.startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) drag.moved = true;
      cam.x = drag.camX + dx;
      cam.y = drag.camY + dy;
    });
    window.addEventListener('mouseup', function () {
      drag.active = false;
    });

    // ============ THEME / LANG ============
    document.getElementById('theme-toggle').addEventListener('click', function () {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme(theme);
      localStorage.setItem('theme', theme);
    });
    document.getElementById('lang-zh').addEventListener('click', function () {
      lang = 'zh'; applyLang(lang); localStorage.setItem('lang', lang);
    });
    document.getElementById('lang-en').addEventListener('click', function () {
      lang = 'en'; applyLang(lang); localStorage.setItem('lang', lang);
    });

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      var themeBtn = document.getElementById('theme-toggle');
      themeBtn.innerHTML = getThemeIconSvg(t);
      themeBtn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }

    function getThemeIconSvg(t) {
      if (t === 'dark') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4.5v2.2M12 17.3v2.2M4.5 12h2.2M17.3 12h2.2M6.8 6.8l1.5 1.5M15.7 15.7l1.5 1.5M6.8 17.2l1.5-1.5M15.7 8.3l1.5-1.5"></path><circle cx="12" cy="12" r="3.7"></circle></svg>';
      }
      return '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.2 14.8a8.3 8.3 0 1 1-11-11 7 7 0 1 0 11 11z"></path></svg>';
    }

    function applyLang(l) {
      document.documentElement.setAttribute('lang', l === 'zh' ? 'zh-CN' : 'en');
      document.querySelectorAll('[data-zh][data-en]').forEach(function (el) {
        el.innerHTML = el.getAttribute('data-' + l);
      });
      document.getElementById('lang-zh').classList.toggle('is-active', l === 'zh');
      document.getElementById('lang-en').classList.toggle('is-active', l === 'en');
      document.title = l === 'zh' ? 'Knowledge Hub — 学习与研究笔记' : 'Knowledge Hub — Study & Research Notes';
      planets.forEach(function (pl) {
        if (pl.labelEl) pl.labelEl.textContent = pl.label[l];
      });
      posts.forEach(function (p) {
        if (p.labelEl) p.labelEl.textContent = p.title[l];
      });
      if (selectedPlanetId) showPlanetPanel(selectedPlanetId);
      if (activePostId) showCard(activePostId);
    }

    // ============ HUB ORBITS (SVG) ============
    function createHubOrbits() {
      HUB_ORBITS.forEach(function () {
        var el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        el.setAttribute('class', 'orbit-ring');
        el.setAttribute('stroke-width', '1');
        svg.appendChild(el);
        orbitEls.push(el);
      });
      layoutOrbits();
    }

    function layoutOrbits() {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      HUB_ORBITS.forEach(function (o, i) {
        var el = orbitEls[i];
        el.setAttribute('cx', cx);
        el.setAttribute('cy', cy);
        el.setAttribute('rx', base * o.rx);
        el.setAttribute('ry', base * o.ry);
        el.setAttribute('transform', 'rotate(' + o.tilt + ' ' + cx + ' ' + cy + ')');
      });
    }

    // ============ PLANETS ============
    function createPlanets() {
      // Count posts per planet for proportional sizing
      var postCounts = {};
      posts.forEach(function (p) {
        postCounts[p.planetId] = (postCounts[p.planetId] || 0) + 1;
      });
      var maxCount = 1;
      Object.keys(postCounts).forEach(function (k) {
        if (postCounts[k] > maxCount) maxCount = postCounts[k];
      });

      var MIN_SIZE = 32;
      var MAX_SIZE = 56;

      planets.forEach(function (pl) {
        pl.angle = pl.phase;
        pl.x = 0; pl.y = 0;

        var count = postCounts[pl.id] || 1;
        var size = MIN_SIZE + (MAX_SIZE - MIN_SIZE) * (count / Math.max(maxCount, 1));
        pl.bodySize = size;

        // Create satellite orbit ring (SVG)
        var satRing = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        satRing.setAttribute('class', 'orbit-ring');
        satRing.setAttribute('stroke-width', '0.8');
        satRing.style.stroke = pl.color;
        satRing.style.opacity = '0.2';
        svg.appendChild(satRing);
        pl.satRingEl = satRing;

        // Create planet DOM
        var el = document.createElement('div');
        el.className = 'planet';
        el.setAttribute('data-planet', pl.id);

        var body = document.createElement('div');
        body.className = 'planet-body';
        body.style.width = size + 'px';
        body.style.height = size + 'px';
        var darker = adjustColor(pl.color, -50);
        var lighter = adjustColor(pl.color, 40);
        body.style.background = 'radial-gradient(circle at 38% 35%, ' + lighter + ', ' + pl.color + ' 50%, ' + darker + ' 100%)';
        body.style.boxShadow = '0 4px 20px ' + pl.color + '44, inset 0 -4px 12px ' + darker + '66';

        // Texture overlay for natural surface
        var texture = document.createElement('div');
        texture.className = 'planet-texture';
        body.appendChild(texture);

        // Fine grain layer for more realistic planetary surface detail
        var noise = document.createElement('div');
        noise.className = 'planet-surface-noise';
        body.appendChild(noise);

        // Relief layer to add topographic-like light and shadow patches
        var relief = document.createElement('div');
        relief.className = 'planet-relief';
        body.appendChild(relief);

        // Atmospheric band
        var band = document.createElement('div');
        band.className = 'planet-band';
        body.appendChild(band);

        el.appendChild(body);

        var label = document.createElement('span');
        label.className = 'planet-label';
        label.textContent = pl.label[lang];
        el.appendChild(label);
        pl.labelEl = label;

        el.addEventListener('click', function (e) {
          e.stopPropagation();
          onPlanetClick(pl.id);
        });
        el.addEventListener('mouseenter', beginHoverPause);
        el.addEventListener('mouseleave', endHoverPause);

        graphStageEl.appendChild(el);
        pl.el = el;
        planetMap[pl.id] = pl;
      });
    }

    // ============ KNOWLEDGE NODES ============
    function createNodes() {
      posts.forEach(function (p) {
        p.angle = p.phase;
        p.paused = false;
        p.x = 0; p.y = 0;

        var el = document.createElement('div');
        el.className = 'node';
        el.style.background = p.color;
        el.style.color = p.color;
        el.setAttribute('data-id', p.id);

        var label = document.createElement('span');
        label.className = 'node-label';
        label.textContent = p.title[lang];
        el.appendChild(label);
        p.labelEl = label;

        el.addEventListener('mouseenter', function () { onNodeHover(p.id); });
        el.addEventListener('mouseleave', function () { onNodeLeave(p.id); });
        el.addEventListener('click', function (e) {
          e.stopPropagation();
          onNodeClick(p.id);
        });

        graphStageEl.appendChild(el);
        p.el = el;
        postMap[p.id] = p;
      });
    }

    // ============ POSITION CALC ============
    function calcPlanetPos(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      var o = HUB_ORBITS[pl.orbitIndex] || HUB_ORBITS[0];
      var rx = base * o.rx, ry = base * o.ry;
      var tiltRad = o.tilt * Math.PI / 180;
      var ux = rx * Math.cos(pl.angle);
      var uy = ry * Math.sin(pl.angle);
      return {
        x: cx + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: cy + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcNodePos(post) {
      var pl = planetMap[post.planetId];
      if (!pl) return { x: 0, y: 0 };
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * SAT_RADIUS;
      var tiltRad = SAT_TILT * Math.PI / 180;
      var ux = r * Math.cos(post.angle);
      var uy = r * 0.6 * Math.sin(post.angle);
      return {
        x: pl.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: pl.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    // ============ ANIMATION ============
    function animate(time) {
      var dt = prevTime ? (time - prevTime) : 16;
      prevTime = time;
      var base = Math.min(window.innerWidth, window.innerHeight);
      graphStageEl.style.transform = 'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.scale + ')';

      // Move planets
      planets.forEach(function (pl) {
        if (!isMotionPaused) {
          pl.angle += HUB_SPEED * pl.speed * dt;
        }
        var pos = calcPlanetPos(pl);
        pl.x = pos.x; pl.y = pos.y;
        pl.el.style.left = pos.x + 'px';
        pl.el.style.top = pos.y + 'px';

        // Update satellite orbit ring
        var r = base * SAT_RADIUS;
        pl.satRingEl.setAttribute('cx', pos.x);
        pl.satRingEl.setAttribute('cy', pos.y);
        pl.satRingEl.setAttribute('rx', r);
        pl.satRingEl.setAttribute('ry', r * 0.6);
        pl.satRingEl.setAttribute('transform', 'rotate(' + SAT_TILT + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move knowledge nodes
      posts.forEach(function (p) {
        if (!isMotionPaused && !p.paused) {
          p.angle += SAT_SPEED * p.speed * dt;
        }
        var pos = calcNodePos(p);
        p.x = pos.x; p.y = pos.y;
        p.el.style.left = pos.x + 'px';
        p.el.style.top = pos.y + 'px';
      });

      updateConnections();

      if (selectedPlanetId && planetMap[selectedPlanetId]) {
        positionPlanetPanel(planetMap[selectedPlanetId]);
      }

      if (activePostId && postMap[activePostId]) {
        positionCard(postMap[activePostId]);
      }

      requestAnimationFrame(animate);
    }

    // ============ PLANET CLICK ============
    function onPlanetClick(plId) {
      closeCard();
      if (selectedPlanetId === plId) {
        clearPlanetSelection();
        return;
      }
      selectedPlanetId = plId;
      applyPlanetFilter();
      showPlanetPanel(plId);
    }

    function clearPlanetSelection() {
      selectedPlanetId = null;
      applyPlanetFilter();
      closePlanetPanel();
    }

    function applyPlanetFilter() {
      planets.forEach(function (pl) {
        var isBg = selectedPlanetId && pl.id !== selectedPlanetId;
        pl.el.classList.toggle('is-bg', isBg);
        pl.el.classList.toggle('is-selected', pl.id === selectedPlanetId);
        pl.satRingEl.classList.toggle('is-bg', isBg);
      });

      // Also mark hub orbit rings
      if (selectedPlanetId) {
        var selPl = planetMap[selectedPlanetId];
        orbitEls.forEach(function (el, i) {
          el.classList.toggle('is-bg', selPl.orbitIndex !== i);
        });
      } else {
        orbitEls.forEach(function (el) { el.classList.remove('is-bg'); });
      }

      posts.forEach(function (p) {
        var isBg = selectedPlanetId && p.planetId !== selectedPlanetId;
        p.el.classList.toggle('is-bg', isBg);
        if (isBg && activePostId === p.id) closeCard();
      });
    }

    // ============ NODE INTERACTIONS ============
    function onNodeHover(id) {
      beginHoverPause();
      hoverPostId = id;
      var p = postMap[id];
      if (p) p.paused = true;
      if (p && p.relations.length) {
        p.relations.forEach(function (rid) {
          var r = postMap[rid];
          if (r) r.el.classList.add('is-related');
        });
      }
    }

    function onNodeLeave(id) {
      hoverPostId = null;
      var p = postMap[id];
      if (p && activePostId !== id) p.paused = false;
      posts.forEach(function (pp) { pp.el.classList.remove('is-related'); });
      endHoverPause();
    }

    function onNodeClick(id) {
      if (activePostId === id) { closeCard(); return; }
      if (activePostId && postMap[activePostId]) {
        postMap[activePostId].paused = false;
        postMap[activePostId].el.classList.remove('is-active');
      }
      activePostId = id;
      var p = postMap[id];
      p.paused = true;
      p.el.classList.add('is-active');
      showCard(id);
    }

    function onGraphClick(e) {
      if (drag.moved) { drag.moved = false; return; }
      if (e.target.closest('.node') || e.target.closest('.card') || e.target.closest('.planet') || e.target.closest('.planet-panel')) return;
      closeCard();
      // Also deselect planet
      if (selectedPlanetId) {
        clearPlanetSelection();
      }
    }

    function showPlanetPanel(plId) {
      var pl = planetMap[plId];
      if (!pl) return;
      var planetPosts = posts.filter(function (p) {
        return p.planetId === plId;
      });
      var itemsHtml = planetPosts.map(function (p) {
        return '<a class="planet-panel-item" href="' + p.url + '">' +
          '<h4>' + p.title[lang] + '</h4>' +
          '<p>' + p.summary[lang] + '</p>' +
          '<span class="planet-panel-link">' +
            (lang === 'zh' ? '查看详情' : 'View details') +
          '</span>' +
        '</a>';
      }).join('');

      planetPanelEl.innerHTML =
        '<div class="planet-panel-header">' +
          '<div>' +
            '<div class="planet-panel-kicker">' + (lang === 'zh' ? '知识星球' : 'Knowledge Planet') + '</div>' +
            '<h3 class="planet-panel-title">' + pl.label[lang] + '</h3>' +
            '<p class="planet-panel-subtitle">' +
              (lang === 'zh'
                ? '共 ' + planetPosts.length + ' 个相关知识点，点击可查看详情。'
                : planetPosts.length + ' related knowledge points. Select one to open the full article.') +
            '</p>' +
          '</div>' +
          '<button class="planet-panel-close" type="button" aria-label="' + (lang === 'zh' ? '关闭面板' : 'Close panel') + '">×</button>' +
        '</div>' +
        '<div class="planet-panel-list">' + itemsHtml + '</div>';

      positionPlanetPanel(pl);
      planetPanelEl.classList.remove('is-visible');
      void planetPanelEl.offsetWidth;
      planetPanelEl.classList.add('is-visible');
    }

    function positionPlanetPanel(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var panelWidth = planetPanelEl.offsetWidth || Math.min(420, W - 24);
      var panelHeight = planetPanelEl.offsetHeight || 360;
      var planetScreenX = pl.x * cam.scale + cam.x;
      var planetScreenY = pl.y * cam.scale + cam.y;
      var offset = Math.max(28, pl.bodySize * 0.7 * cam.scale + 24);
      var x = planetScreenX + offset;
      var y = planetScreenY - panelHeight * 0.34;

      if (x + panelWidth + 16 > W) x = planetScreenX - panelWidth - offset;
      if (x < 12) x = 12;
      if (y < 72) y = 72;
      if (y + panelHeight + 16 > H) y = H - panelHeight - 16;

      planetPanelEl.style.left = x + 'px';
      planetPanelEl.style.top = y + 'px';
    }

    function closePlanetPanel() {
      planetPanelEl.classList.remove('is-visible');
    }

    function showCard(id) {
      var p = postMap[id];
      if (!p) return;
      var tags = p.tags.map(function (t) {
        return '<span class="card-tag">' + t + '</span>';
      }).join('');
      cardEl.innerHTML =
        '<div class="card-meta"><time>' + p.date + '</time>' + tags + '</div>' +
        '<h3>' + p.title[lang] + '</h3>' +
        '<p>' + p.summary[lang] + '</p>' +
        '<a class="card-link" href="' + p.url + '">' +
          (lang === 'zh' ? '阅读全文' : 'Read more') + '</a>';
      positionCard(p);
      cardEl.classList.remove('is-visible');
      void cardEl.offsetWidth;
      cardEl.classList.add('is-visible');
    }

    function positionCard(p) {
      var W = window.innerWidth, H = window.innerHeight;
      var cw = 360, ch = 280;
      // Convert stage logical coords to screen coords via camera transform
      var sx = p.x * cam.scale + cam.x;
      var sy = p.y * cam.scale + cam.y;
      var x = sx + 24, y = sy - ch / 3;
      if (x + cw + 20 > W) x = sx - cw - 24;
      if (x < 20) x = Math.max(20, sx - cw / 2);
      if (y < 80) y = 80;
      if (y + ch + 20 > H) y = H - ch - 20;
      cardEl.style.left = x + 'px';
      cardEl.style.top = y + 'px';
    }

    function closeCard() {
      if (activePostId && postMap[activePostId]) {
        postMap[activePostId].paused = false;
        postMap[activePostId].el.classList.remove('is-active');
      }
      activePostId = null;
      cardEl.classList.remove('is-visible');
    }

    // ============ CONNECTION LINES ============
    function updateConnections() {
      connLines.forEach(function (el) { el.remove(); });
      connLines = [];
      var srcId = hoverPostId || activePostId;
      if (!srcId) return;
      var src = postMap[srcId];
      if (!src || !src.relations.length) return;
      src.relations.forEach(function (rid) {
        var tgt = postMap[rid];
        if (!tgt) return;
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
        line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
        line.setAttribute('class', 'conn-line is-visible');
        line.setAttribute('stroke', src.color);
        svg.appendChild(line);
        connLines.push(line);
      });
    }

    // ============ TAG CLOUD ============
    function buildTagCloud() {
      var tagSet = {};
      posts.forEach(function (p) {
        p.tags.forEach(function (t) { tagSet[t] = true; });
      });
      var cloud = document.getElementById('tag-cloud');
      Object.keys(tagSet).forEach(function (tag) {
        var chip = document.createElement('button');
        chip.className = 'tag-chip'; chip.textContent = tag;
        chip.setAttribute('data-tag', tag);
        chip.addEventListener('click', function (e) {
          e.stopPropagation();
          toggleTag(tag, chip);
        });
        cloud.appendChild(chip);
      });
    }

    function toggleTag(tag, chip) {
      var idx = selectedTags.indexOf(tag);
      if (idx >= 0) { selectedTags.splice(idx, 1); chip.classList.remove('is-selected'); }
      else { selectedTags.push(tag); chip.classList.add('is-selected'); }
      applyTagFilter();
    }

    function applyTagFilter() {
      if (selectedTags.length === 0) {
        posts.forEach(function (p) { p.el.classList.remove('is-dimmed'); });
        return;
      }
      posts.forEach(function (p) {
        var match = selectedTags.some(function (t) { return p.tags.indexOf(t) >= 0; });
        p.el.classList.toggle('is-dimmed', !match);
        if (!match && activePostId === p.id) closeCard();
      });
    }

    // ============ RESIZE ============
    function onResize() { layoutOrbits(); }

    // ============ SETTINGS PANEL ============
    function initSettings() {
      var toggle = document.getElementById('settings-toggle');
      var panel = document.getElementById('settings-panel');
      var backdrop = document.getElementById('settings-backdrop');
      var closeBtn = document.getElementById('settings-close');
      var providerSel = document.getElementById('llm-provider');
      var endpointInput = document.getElementById('llm-endpoint');
      var modelInput = document.getElementById('llm-model');
      var modelSelect = document.getElementById('llm-model-select');
      var apikeyInput = document.getElementById('llm-apikey');
      var fieldEndpoint = document.getElementById('field-endpoint');
      var fieldModel = document.getElementById('field-model');
      var fieldApikey = document.getElementById('field-apikey');
      var testBtn = document.getElementById('llm-test');
      var statusEl = document.getElementById('llm-status');
      var saveBtn = document.getElementById('llm-save');

      function openSettings() {
        panel.classList.add('is-open');
        backdrop.classList.add('is-open');
      }
      function closeSettings() {
        panel.classList.remove('is-open');
        backdrop.classList.remove('is-open');
      }

      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        openSettings();
      });
      closeBtn.addEventListener('click', closeSettings);
      backdrop.addEventListener('click', closeSettings);

      // Load saved settings
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem('llm-settings')); } catch (e) {}
      if (saved) {
        providerSel.value = saved.provider || 'none';
        endpointInput.value = saved.endpoint || '';
        modelInput.value = saved.model || '';
        apikeyInput.value = saved.apikey || '';
      }

      // Provider change → show/hide fields
      function syncFields() {
        var provider = providerSel.value;
        modelInput.hidden = false;
        modelSelect.hidden = true;
        modelSelect.innerHTML = '';
        if (provider === 'none') {
          fieldEndpoint.hidden = true;
          fieldModel.hidden = true;
          fieldApikey.hidden = true;
        } else if (provider === 'ollama') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = true;
          if (!endpointInput.value) endpointInput.value = 'http://localhost:11434';
        } else if (provider === 'openai-compat') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = false;
          if (!endpointInput.value) endpointInput.value = 'https://api.openai.com/v1';
        }
        statusEl.textContent = '';
        statusEl.className = 'settings-status';
      }
      providerSel.addEventListener('change', syncFields);
      syncFields();

      // Test connection
      testBtn.addEventListener('click', function () {
        var provider = providerSel.value;
        var endpoint = endpointInput.value.replace(/\/+$/, '');
        if (provider === 'none' || !endpoint) {
          statusEl.textContent = '请先选择 Provider 并填写端点';
          statusEl.className = 'settings-status is-err';
          return;
        }

        statusEl.textContent = '连接中...';
        statusEl.className = 'settings-status';

        var testUrl = '';
        var headers = { 'Content-Type': 'application/json' };
        if (provider === 'ollama') {
          testUrl = endpoint + '/api/tags';
        } else {
          testUrl = endpoint + '/models';
          var key = apikeyInput.value;
          if (key) headers['Authorization'] = 'Bearer ' + key;
        }

        fetch(testUrl, { method: 'GET', headers: headers })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            var models = [];
            if (provider === 'ollama' && data.models) {
              data.models.forEach(function (m) { models.push(m.name || m.model); });
            } else if (data.data) {
              data.data.forEach(function (m) { models.push(m.id); });
            }
            statusEl.textContent = '✓ 已连接，' + models.length + ' 个模型可用';
            statusEl.className = 'settings-status is-ok';

            if (models.length > 0) {
              var currentVal = modelInput.value || modelSelect.value || '';
              modelSelect.innerHTML = '';
              var placeholder = document.createElement('option');
              placeholder.value = '';
              placeholder.textContent = '-- 选择模型 --';
              modelSelect.appendChild(placeholder);
              models.forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === currentVal) opt.selected = true;
                modelSelect.appendChild(opt);
              });
              modelInput.hidden = true;
              modelSelect.hidden = false;
              if (currentVal && models.indexOf(currentVal) >= 0) {
                modelSelect.value = currentVal;
              }
              modelSelect.onchange = function () {
                modelInput.value = modelSelect.value;
              };
            }
          })
          .catch(function (err) {
            statusEl.textContent = '✗ ' + err.message;
            statusEl.className = 'settings-status is-err';
          });
      });

      // Save settings
      saveBtn.addEventListener('click', function () {
        var settings = {
          provider: providerSel.value,
          endpoint: endpointInput.value,
          model: modelInput.value,
          apikey: apikeyInput.value
        };
        localStorage.setItem('llm-settings', JSON.stringify(settings));
        statusEl.textContent = '✓ 已保存';
        statusEl.className = 'settings-status is-ok';
        setTimeout(function () {
          statusEl.textContent = '';
          statusEl.className = 'settings-status';
        }, 2000);
      });
    }

    // ============ UTIL ============
    function beginHoverPause() {
      hoverPauseCount += 1;
      isMotionPaused = hoverPauseCount > 0;
    }

    function endHoverPause() {
      hoverPauseCount = Math.max(0, hoverPauseCount - 1);
      isMotionPaused = hoverPauseCount > 0;
    }

    function adjustColor(hex, amt) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      r = Math.max(0, Math.min(255, r + amt));
      g = Math.max(0, Math.min(255, g + amt));
      b = Math.max(0, Math.min(255, b + amt));
      return '#' + [r, g, b].map(function (c) {
        return c.toString(16).padStart(2, '0');
      }).join('');
    }

  }); // end DOMContentLoaded
  </script>
</body>
</html>
