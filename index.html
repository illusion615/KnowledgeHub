    // ============ POSITION CALC ============
    function calcPlanetPos(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      var o = HUB_ORBITS[pl.orbitIndex] || HUB_ORBITS[0];
      var rx = base * o.rx, ry = base * o.ry;
      var tiltRad = o.tilt * Math.PI / 180;
      var ux = rx * Math.cos(pl.angle);
      var uy = ry * Math.sin(pl.angle);
      return {
        x: cx + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: cy + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcGroupPos(g) {
      // Parent is either a planet (root) or another group
      var parent = planetMap[g.parentId] || groupMap[g.parentId];
      if (!parent) return { x: 0, y: 0 };
      var depth = getDepth(g);
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * getOrbitRadiusForDepth(depth);
      var tilt = getOrbitTilt(depth);
      var tiltRad = tilt * Math.PI / 180;
      var ux = r * Math.cos(g.angle);
      var uy = r * 0.6 * Math.sin(g.angle);
      return {
        x: parent.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: parent.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcNodePos(post) {
      // Find the direct parent (group or planet)
      var parent = null;
      if (post.groupId && groupMap[post.groupId]) {
        parent = groupMap[post.groupId];
      } else if (post.planetId && planetMap[post.planetId]) {
        parent = planetMap[post.planetId];
      }
      if (!parent) return { x: 0, y: 0 };
      var depth = getDepth(post);
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * getOrbitRadiusForDepth(depth);
      var tilt = getOrbitTilt(depth);
      var tiltRad = tilt * Math.PI / 180;
      var ux = r * Math.cos(post.angle);
      var uy = r * 0.6 * Math.sin(post.angle);
      return {
        x: parent.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: parent.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    // ============ ANIMATION ============
    function animate(time) {
      var dt = prevTime ? (time - prevTime) : 16;
      prevTime = time;
      var base = Math.min(window.innerWidth, window.innerHeight);
      graphStageEl.style.transform = 'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.scale + ')';

      // Move planets
      planets.forEach(function (pl) {
        if (!isMotionPaused) {
          pl.angle += HUB_SPEED * pl.speed * dt;
        }
        var pos = calcPlanetPos(pl);
        pl.x = pos.x; pl.y = pos.y;
        pl.el.style.left = pos.x + 'px';
        pl.el.style.top = pos.y + 'px';

        // Update satellite orbit ring using depth-based radius
        var childDepth = 1; // children of root are depth 1
        var r = base * getOrbitRadiusForDepth(childDepth);
        var tilt = getOrbitTilt(childDepth);
        pl.satRingEl.setAttribute('cx', pos.x);
        pl.satRingEl.setAttribute('cy', pos.y);
        pl.satRingEl.setAttribute('rx', r);
        pl.satRingEl.setAttribute('ry', r * 0.6);
        pl.satRingEl.setAttribute('transform', 'rotate(' + tilt + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move groups (orbit their parent planet or group)
      groups.forEach(function (g) {
        var depth = getDepth(g);
        var spd = getOrbitSpeed(depth);
        if (!isMotionPaused) {
          g.angle += spd * (g.speed || 1) * dt;
        }
        var pos = calcGroupPos(g);
        g.x = pos.x; g.y = pos.y;
        g.el.style.left = pos.x + 'px';
        g.el.style.top = pos.y + 'px';

        // Update this group's child orbit ring
        var childDepth = depth + 1;
        var gr = base * getOrbitRadiusForDepth(childDepth);
        var gTilt = getOrbitTilt(childDepth);
        g.satRingEl.setAttribute('cx', pos.x);
        g.satRingEl.setAttribute('cy', pos.y);
        g.satRingEl.setAttribute('rx', gr);
        g.satRingEl.setAttribute('ry', gr * 0.6);
        g.satRingEl.setAttribute('transform', 'rotate(' + gTilt + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move knowledge nodes (orbit their parent group or planet)
      posts.forEach(function (p) {
        var depth = getDepth(p);
        var spd = getOrbitSpeed(depth);
        if (!isMotionPaused && !p.paused) {
          p.angle += spd * p.speed * dt;
        }
        var pos = calcNodePos(p);
        p.x = pos.x; p.y = pos.y;
        p.el.style.left = pos.x + 'px';
        p.el.style.top = pos.y + 'px';
      });

      updateConnections();

      if (selectedPlanetId && planetMap[selectedPlanetId]) {
        positionPlanetPanel(planetMap[selectedPlanetId]);
      }

      if (activePostId && postMap[activePostId]) {
        positionCard(postMap[activePostId]);
      }

      requestAnimationFrame(animate);
    }

    // ============ PLANET CLICK ============
    function onPlanetClick(plId) {
      closeCard();
      if (selectedPlanetId === plId) {
        clearPlanetSelection();
        return;
      }
      selectedPlanetId = plId;
      applyPlanetFilter();
      showPlanetPanel(plId);
    }

    function clearPlanetSelection() {
      selectedPlanetId = null;
      applyPlanetFilter();
      closePlanetPanel();
    }

    function applyPlanetFilter() {
      // Find all descendant node ids of the selected topic
      var selDescIds = {};
      if (selectedPlanetId) {
        getAllArticles(selectedPlanetId).forEach(function (a) { selDescIds[a.id] = true; });
        // Also include descendant topics
        var queue = [selectedPlanetId];
        while (queue.length) {
          var cur = queue.shift();
          getChildren(cur).forEach(function (c) {
            if (c.type === 'topic') { selDescIds[c.id] = true; queue.push(c.id); }
          });
        }
        selDescIds[selectedPlanetId] = true;
      }

      planets.forEach(function (pl) {
        var isBg = selectedPlanetId && !selDescIds[pl.id];
        pl.el.classList.toggle('is-bg', isBg);
        pl.el.classList.toggle('is-selected', pl.id === selectedPlanetId);
        pl.satRingEl.classList.toggle('is-bg', isBg);
      });

      if (selectedPlanetId) {
        var selPl = planetMap[selectedPlanetId];
        orbitEls.forEach(function (el, i) {
          el.classList.toggle('is-bg', selPl ? selPl.orbitIndex !== i : true);
        });
      } else {
        orbitEls.forEach(function (el) { el.classList.remove('is-bg'); });
      }

      groups.forEach(function (g) {
        var isBg = selectedPlanetId && !selDescIds[g.id];
        g.el.classList.toggle('is-bg', isBg);
        g.el.classList.toggle('is-selected', g.id === selectedPlanetId);
        g.satRingEl.classList.toggle('is-bg', isBg);
      });

      posts.forEach(function (p) {
        var isBg = selectedPlanetId && !selDescIds[p.id];
        p.el.classList.toggle('is-bg', isBg);
        if (isBg && activePostId === p.id) closeCard();
      });
    }

    // ============ NODE INTERACTIONS ============
    function onNodeHover(id) {
      beginHoverPause();
      hoverPostId = id;
      var p = postMap[id];
      if (p) p.paused = true;
      if (p && p.relations.length) {
        p.relations.forEach(function (rid) {
          var r = postMap[rid];
          if (r) r.el.classList.add('is-related');
        });
      }
      // Show summary card on hover
      if (p && !activePostId) {
        showCard(id);
      }
    }

    function onNodeLeave(id) {
      hoverPostId = null;
      var p = postMap[id];
      if (p && activePostId !== id) p.paused = false;
      posts.forEach(function (pp) { pp.el.classList.remove('is-related'); });
      // Hide card if it was shown by hover (not by click)
      if (activePostId !== id) {
        closeCard();
      }
      endHoverPause();
    }

    function onNodeClick(id) {
      var p = postMap[id];
      if (p && p.url) {
        navigateToArticle(p.url);
      }
    }

    function onGraphClick(e) {
      if (drag.moved) { drag.moved = false; return; }
      if (graphTouchSuppressClick) {
        graphTouchSuppressClick = false;
        if (graphTouchSuppressTimer) {
          clearTimeout(graphTouchSuppressTimer);
          graphTouchSuppressTimer = null;
        }
        return;
      }
      if (e.target.closest('.node') || e.target.closest('.card') || e.target.closest('.planet') || e.target.closest('.planet-panel')) return;
      closeCard();
      // Also deselect planet
      if (selectedPlanetId) {
        clearPlanetSelection();
      }
    }

    function showPlanetPanel(plId) {
      var pl = planetMap[plId] || groupMap[plId];
      if (!pl) return;
      var panelPosts = getAllArticles(plId);
      panelPosts.sort(function (a, b) { return (a.date || '').localeCompare(b.date || ''); });
      var itemsHtml = panelPosts.map(function (p) {
        var tagsHtml = (p.tags || []).map(function (t) {
          return '<span class="card-tag">' + t + '</span>';
        }).join('');
        return '<a class="planet-panel-item" href="' + p.url + '">' +
          '<h4>' + p.title[lang] + '</h4>' +
          '<div class="card-tags">' + tagsHtml + '</div>' +
          '<p>' + p.summary[lang] + '</p>' +
        '</a>';
      }).join('');

      var topicLabel = pl.label ? pl.label[lang] : (pl.title ? pl.title[lang] : pl.id);

      planetPanelEl.innerHTML =
        '<div class="planet-panel-header">' +
          '<div>' +
            '<div class="planet-panel-kicker">' + (lang === 'zh' ? '知识主题' : 'Knowledge Topic') + '</div>' +
            '<h3 class="planet-panel-title">' + topicLabel + '</h3>' +
            '<p class="planet-panel-subtitle">' +
              (lang === 'zh'
                ? '共 ' + panelPosts.length + ' 个相关知识点，点击可查看详情。'
                : panelPosts.length + ' related knowledge points. Select one to open the full article.') +
            '</p>' +
          '</div>' +
          '<button class="planet-panel-close" type="button" aria-label="' + (lang === 'zh' ? '关闭面板' : 'Close panel') + '">×</button>' +
        '</div>' +
        '<div class="planet-panel-list">' + itemsHtml + '</div>';

      positionPlanetPanel(pl);
      planetPanelEl.classList.remove('is-visible');
      void planetPanelEl.offsetWidth;
      planetPanelEl.classList.add('is-visible');
    }

    function positionPlanetPanel(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var panelWidth = planetPanelEl.offsetWidth || Math.min(420, W - 24);
      var panelHeight = planetPanelEl.offsetHeight || 360;
      var planetScreenX = pl.x * cam.scale + cam.x;
      var planetScreenY = pl.y * cam.scale + cam.y;
      var offset = Math.max(28, pl.bodySize * 0.7 * cam.scale + 24);
      var x = planetScreenX + offset;
      var y = planetScreenY - panelHeight * 0.34;

      if (x + panelWidth + 16 > W) x = planetScreenX - panelWidth - offset;
      if (x < 12) x = 12;
      if (x + panelWidth + 12 > W) x = W - panelWidth - 12;
      if (y < 72) y = 72;
      if (y + panelHeight + 16 > H) y = H - panelHeight - 16;
      if (y < 72) y = 72;

      planetPanelEl.style.left = x + 'px';
      planetPanelEl.style.top = y + 'px';
    }

    function closePlanetPanel() {
      planetPanelEl.classList.remove('is-visible');
    }

    function showCard(id, screenX, screenY) {
      var p = postMap[id];
      if (!p) return;
      var tags = p.tags.map(function (t) {
        return '<span class="card-tag">' + t + '</span>';
      }).join('');
      cardEl.innerHTML =
        '<div class="card-meta"><time>' + p.date + '</time></div>' +
        '<h3>' + p.title[lang] + '</h3>' +
        '<div class="card-tags">' + tags + '</div>' +
        '<p>' + p.summary[lang] + '</p>';
      if (screenX !== undefined && screenY !== undefined) {
        positionCardAt(screenX, screenY);
      } else {
        positionCard(p);
      }
      cardEl.classList.remove('is-visible');
      void cardEl.offsetWidth;
      cardEl.classList.add('is-visible');
    }

    function positionCardAt(sx, sy) {
      var W = window.innerWidth, H = window.innerHeight;
      var cw = cardEl.offsetWidth || 360;
      var ch = cardEl.offsetHeight || 280;
      var x = sx + 24, y = sy - ch / 3;
      if (x + cw + 16 > W) x = sx - cw - 24;
      if (x < 12) x = 12;
      if (x + cw + 12 > W) x = W - cw - 12;
      if (y < 72) y = 72;
      if (y + ch + 16 > H) y = H - ch - 16;
      if (y < 72) y = 72;
      cardEl.style.left = x + 'px';
      cardEl.style.top = y + 'px';
    }

    function positionCard(p) {
      var W = window.innerWidth, H = window.innerHeight;
      var cw = cardEl.offsetWidth || 360;
      var ch = cardEl.offsetHeight || 280;
      // Convert stage logical coords to screen coords via camera transform
      var sx = p.x * cam.scale + cam.x;
      var sy = p.y * cam.scale + cam.y;
      var x = sx + 24, y = sy - ch / 3;
      // Ensure card stays within visible area
      if (x + cw + 16 > W) x = sx - cw - 24;
      if (x < 12) x = 12;
      if (x + cw + 12 > W) x = W - cw - 12;
      if (y < 72) y = 72;
      if (y + ch + 16 > H) y = H - ch - 16;
      if (y < 72) y = 72;
      cardEl.style.left = x + 'px';
      cardEl.style.top = y + 'px';
    }

    function closeCard() {
      if (activePostId && postMap[activePostId]) {
        postMap[activePostId].paused = false;
        postMap[activePostId].el.classList.remove('is-active');
      }
      activePostId = null;
      cardEl.classList.remove('is-visible');
    }

    // ============ CONNECTION LINES ============
    function updateConnections() {
      connLines.forEach(function (el) { el.remove(); });
      connLines = [];
      var srcId = hoverPostId || activePostId;
      if (!srcId) return;
      var src = postMap[srcId];
      if (!src || !src.relations.length) return;
      src.relations.forEach(function (rid) {
        var tgt = postMap[rid];
        if (!tgt) return;
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
        line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
        line.setAttribute('class', 'conn-line is-visible');
        line.setAttribute('stroke', src.color);
        svg.appendChild(line);
        connLines.push(line);
      });
    }

    // ============ TAG CLOUD ============
    function buildTagCloud() {
      var tagSet = {};
      posts.forEach(function (p) {
        p.tags.forEach(function (t) { tagSet[t] = true; });
      });
      var cloud = document.getElementById('tag-cloud');
      Object.keys(tagSet).forEach(function (tag) {
        var chip = document.createElement('button');
        chip.className = 'tag-chip'; chip.textContent = tag;
        chip.setAttribute('data-tag', tag);
        chip.addEventListener('click', function (e) {
          e.stopPropagation();
          toggleTag(tag, chip);
        });
        cloud.appendChild(chip);
      });
    }

    function toggleTag(tag, chip) {
      var idx = selectedTags.indexOf(tag);
      if (idx >= 0) { selectedTags.splice(idx, 1); chip.classList.remove('is-selected'); }
      else { selectedTags.push(tag); chip.classList.add('is-selected'); }
      applyTagFilter();
    }

    function applyTagFilter() {
      if (selectedTags.length === 0) {
        posts.forEach(function (p) { p.el.classList.remove('is-dimmed'); });
        return;
      }
      posts.forEach(function (p) {
        var match = selectedTags.some(function (t) { return p.tags.indexOf(t) >= 0; });
        p.el.classList.toggle('is-dimmed', !match);
        if (!match && activePostId === p.id) closeCard();
      });
    }

    // ============ RESIZE ============
    function onResize() { layoutOrbits(); }

    // ============ SETTINGS PANEL ============
    function initSettings() {
      var toggle = document.getElementById('settings-toggle');
      var panel = document.getElementById('settings-panel');
      var backdrop = document.getElementById('settings-backdrop');
      var closeBtn = document.getElementById('settings-close');
      var providerSel = document.getElementById('llm-provider');
      var endpointInput = document.getElementById('llm-endpoint');
      var modelInput = document.getElementById('llm-model');
      var modelSelect = document.getElementById('llm-model-select');
      var apikeyInput = document.getElementById('llm-apikey');
      var fieldEndpoint = document.getElementById('field-endpoint');
      var fieldModel = document.getElementById('field-model');
      var fieldApikey = document.getElementById('field-apikey');
      var testBtn = document.getElementById('llm-test');
      var statusEl = document.getElementById('llm-status');
      var saveBtn = document.getElementById('llm-save');

      function openSettings() {
        panel.classList.add('is-open');
        backdrop.classList.add('is-open');
      }
      function closeSettings() {
        panel.classList.remove('is-open');
        backdrop.classList.remove('is-open');
      }

      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        openSettings();
      });
      closeBtn.addEventListener('click', closeSettings);
      backdrop.addEventListener('click', closeSettings);

      // Load saved settings
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem('llm-settings')); } catch (e) {}
      if (saved) {
        providerSel.value = saved.provider || 'none';
        endpointInput.value = saved.endpoint || '';
        modelInput.value = saved.model || '';
        apikeyInput.value = saved.apikey || '';
      }

      // Provider change → show/hide fields
      function syncFields() {
        var provider = providerSel.value;
        modelInput.hidden = false;
        modelSelect.hidden = true;
        modelSelect.innerHTML = '';
        if (provider === 'none') {
          fieldEndpoint.hidden = true;
          fieldModel.hidden = true;
          fieldApikey.hidden = true;
        } else if (provider === 'ollama') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = true;
          if (!endpointInput.value) endpointInput.value = 'http://localhost:11434';
        } else if (provider === 'openai-compat') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = false;
          if (!endpointInput.value) endpointInput.value = 'https://api.openai.com/v1';
        }
        statusEl.textContent = '';
        statusEl.className = 'settings-status';
      }
      providerSel.addEventListener('change', syncFields);
      syncFields();

      // Test connection
      testBtn.addEventListener('click', function () {
        var provider = providerSel.value;
        var endpoint = endpointInput.value.replace(/\/+$/, '');
        if (provider === 'none' || !endpoint) {
          statusEl.textContent = '请先选择 Provider 并填写端点';
          statusEl.className = 'settings-status is-err';
          return;
        }

        statusEl.textContent = '连接中...';
        statusEl.className = 'settings-status';

        var testUrl = '';
        var headers = { 'Content-Type': 'application/json' };
        if (provider === 'ollama') {
          testUrl = endpoint + '/api/tags';
        } else {
          testUrl = endpoint + '/models';
          var key = apikeyInput.value;
          if (key) headers['Authorization'] = 'Bearer ' + key;
        }

        fetch(testUrl, { method: 'GET', headers: headers })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            var models = [];
            if (provider === 'ollama' && data.models) {
              data.models.forEach(function (m) { models.push(m.name || m.model); });
            } else if (data.data) {
              data.data.forEach(function (m) { models.push(m.id); });
            }
            statusEl.textContent = '✓ 已连接，' + models.length + ' 个模型可用';
            statusEl.className = 'settings-status is-ok';

            if (models.length > 0) {
              var currentVal = modelInput.value || modelSelect.value || '';
              modelSelect.innerHTML = '';
              var placeholder = document.createElement('option');
              placeholder.value = '';
              placeholder.textContent = '-- 选择模型 --';
              modelSelect.appendChild(placeholder);
              models.forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === currentVal) opt.selected = true;
                modelSelect.appendChild(opt);
              });
              modelInput.hidden = true;
              modelSelect.hidden = false;
              if (currentVal && models.indexOf(currentVal) >= 0) {
                modelSelect.value = currentVal;
              }
              modelSelect.onchange = function () {
                modelInput.value = modelSelect.value;
              };
            }
          })
          .catch(function (err) {
            statusEl.textContent = '✗ ' + err.message;
            statusEl.className = 'settings-status is-err';
          });
      });

      // Save settings
      saveBtn.addEventListener('click', function () {
        var settings = {
          provider: providerSel.value,
          endpoint: endpointInput.value,
          model: modelInput.value,
          apikey: apikeyInput.value
        };
        localStorage.setItem('llm-settings', JSON.stringify(settings));
        statusEl.textContent = '✓ 已保存';
        statusEl.className = 'settings-status is-ok';
        setTimeout(function () {
          statusEl.textContent = '';
          statusEl.className = 'settings-status';
        }, 2000);
      });
    }

    // ============ LAYOUT SWITCHING ============
    function initLayoutPicker() {
      var picker = document.getElementById('layout-picker');
      var buttons = picker.querySelectorAll('.layout-picker-option');
      var spokeSection = document.getElementById('spoke-style-section');
      var arcSortSection = document.getElementById('arc-sort-section');

      // Show/hide spoke style and sort sections based on current layout
      spokeSection.style.display = (currentLayout === 'infographic') ? '' : 'none';
      arcSortSection.style.display = (currentLayout === 'infographic') ? '' : 'none';

      buttons.forEach(function (btn) {
        if (btn.getAttribute('data-layout') === currentLayout) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var layout = btn.getAttribute('data-layout');
          if (layout === currentLayout) return;
          buttons.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          currentLayout = layout;
          localStorage.setItem('layout', layout);
          spokeSection.style.display = (layout === 'infographic') ? '' : 'none';
          arcSortSection.style.display = (layout === 'infographic') ? '' : 'none';
          applyLayout(layout);
        });
      });

      // Spoke style picker
      initSpokePicker();

      // Arc sort picker
      initArcSortPicker();
    }

    function initSpokePicker() {
      var spokePicker = document.getElementById('spoke-style-picker');
      var spokeBtns = spokePicker.querySelectorAll('.layout-picker-option');
      spokeBtns.forEach(function (btn) {
        if (btn.getAttribute('data-spoke') === spokeStyle) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var style = btn.getAttribute('data-spoke');
          if (style === spokeStyle) return;
          spokeBtns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          spokeStyle = style;
          localStorage.setItem('spokeStyle', style);
          if (currentLayout === 'infographic') renderInfographicView();
        });
      });
    }

    // ── Open mode picker ──
    function initArcSortPicker() {
      var sortPicker = document.getElementById('arc-sort-picker');
      if (!sortPicker) return;
      var sortBtns = sortPicker.querySelectorAll('.layout-picker-option');
      sortBtns.forEach(function (btn) {
        if (btn.getAttribute('data-arc-sort') === arcSortMode) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var mode = btn.getAttribute('data-arc-sort');
          if (mode === arcSortMode) return;
          sortBtns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          arcSortMode = mode;
          localStorage.setItem('arcSortMode', mode);
          if (currentLayout === 'infographic') renderInfographicView();
        });
      });
    }

    // ── Open mode picker ──
    function initOpenModePicker() {
      var picker = document.getElementById('open-mode-picker');
      if (!picker) return;
      var btns = picker.querySelectorAll('.layout-picker-option');
      btns.forEach(function (btn) {
        if (btn.getAttribute('data-open') === openMode) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var mode = btn.getAttribute('data-open');
          if (mode === openMode) return;
          btns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          openMode = mode;
          localStorage.setItem('openMode', mode);
        });
      });
    }

    // ── Texture picker ──
    function initTexturePicker() {
      var picker = document.getElementById('texture-picker');
      if (!picker) return;
      var btns = picker.querySelectorAll('.layout-picker-option');
      // Apply saved texture
      document.body.setAttribute('data-texture', bgTexture);
      btns.forEach(function (btn) {
        if (btn.getAttribute('data-texture') === bgTexture) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var tex = btn.getAttribute('data-texture');
          if (tex === bgTexture) return;
          btns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          bgTexture = tex;
          localStorage.setItem('bgTexture', tex);
          document.body.setAttribute('data-texture', tex);
        });
      });
    }

    function navigateToArticle(url) {
      if (!url) return;
      if (openMode === 'new') {
        window.open(url, '_blank');
      } else {
        window.location.href = url;
      }
    }

    // Intercept all article link clicks to respect openMode setting
    document.addEventListener('click', function (e) {
      if (openMode !== 'new') return;
      var link = e.target.closest('a[href]');
      if (!link) return;
      var href = link.getAttribute('href');
      if (!href || href.charAt(0) === '#') return;
      // Only intercept internal article links (posts/...)
      if (href.indexOf('posts/') === 0 || href.indexOf('./posts/') === 0) {
        e.preventDefault();
        window.open(href, '_blank');
      }
    });

    // ============ SEARCH ============
    var searchInput = document.getElementById('search-input');
    var searchClear = document.getElementById('search-clear');
    var searchQuery = '';
    var searchDebounce = null;

    function matchesSearch(node, q) {
      if (!q) return true;
      var ql = q.toLowerCase();
      var title = (node.title ? (node.title.zh + ' ' + node.title.en) : '').toLowerCase();
      var label = (node.label ? (node.label.zh + ' ' + node.label.en) : '').toLowerCase();
      var summary = (node.summary ? (node.summary.zh + ' ' + node.summary.en) : '').toLowerCase();
      var tags = (node.tags || []).join(' ').toLowerCase();
      return title.indexOf(ql) !== -1 || label.indexOf(ql) !== -1 ||
             summary.indexOf(ql) !== -1 || tags.indexOf(ql) !== -1;
    }

    function applySearch(q) {
      searchQuery = q;
      if (currentLayout === 'galaxy') {
        applySearchGalaxy(q);
      } else if (currentLayout === 'cards') {
        applySearchCards(q);
      }
      // Infographic: re-render applies filter via spoke opacity
      if (currentLayout === 'infographic') {
        renderInfographicView();
      }
      if (currentLayout === 'cell') {
        applySearchCell(q);
      }
    }

    function applySearchGalaxy(q) {
      planets.forEach(function (pl) {
        var match = !q || matchesSearch(pl, q) || getAllArticles(pl.id).some(function (a) { return matchesSearch(a, q); });
        pl.el.classList.toggle('is-search-hidden', !match);
        pl.satRingEl.style.display = match ? '' : 'none';
      });
      groups.forEach(function (g) {
        var match = !q || matchesSearch(g, q) || getAllArticles(g.id).some(function (a) { return matchesSearch(a, q); });
        g.el.classList.toggle('is-search-hidden', !match);
        g.satRingEl.style.display = match ? '' : 'none';
      });
      posts.forEach(function (p) {
        var match = !q || matchesSearch(p, q);
        p.el.classList.toggle('is-search-hidden', !match);
      });
    }

    function applySearchCards(q) {
      var items = cardsViewEl.querySelectorAll('.layout-card-item');
      var titles = cardsViewEl.querySelectorAll('.layout-cards-group-title');
      if (!q) {
        items.forEach(function (el) { el.style.display = ''; });
        titles.forEach(function (el) { el.style.display = ''; });
        return;
      }
      var ql = q.toLowerCase();
      var visibleGroups = {};
      items.forEach(function (el) {
        var text = el.textContent.toLowerCase();
        var show = text.indexOf(ql) !== -1;
        el.style.display = show ? '' : 'none';
        if (show) {
          var prev = el.previousElementSibling;
          while (prev) {
            if (prev.classList.contains('layout-cards-group-title')) {
              visibleGroups[prev.textContent] = true;
              break;
            }
            prev = prev.previousElementSibling;
          }
        }
      });
      titles.forEach(function (el) {
        el.style.display = visibleGroups[el.textContent] ? '' : 'none';
      });
    }

    function applySearchCell(q) {
      var articles = cellViewEl.querySelectorAll('.cell-article');
      articles.forEach(function (el) {
        if (!q) {
          el.classList.remove('is-search-hidden');
          return;
        }
        // Find matching node by label text
        var labelEl = el.querySelector('.cell-article-label');
        var labelText = labelEl ? labelEl.textContent : '';
        // Also check the underlying data
        var match = false;
        posts.forEach(function (p) {
          if (p.title && (p.title.zh === labelText || p.title.en === labelText)) {
            match = matchesSearch(p, q);
          }
        });
        // Fallback: text search on label
        if (!match && labelText.toLowerCase().indexOf(q.toLowerCase()) !== -1) match = true;
        el.classList.toggle('is-search-hidden', !match);
      });
    }

    searchInput.addEventListener('input', function () {
      var q = searchInput.value.trim();
      searchClear.hidden = !q;
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(function () { applySearch(q); }, 150);
    });

    searchClear.addEventListener('click', function () {
      searchInput.value = '';
      searchClear.hidden = true;
      applySearch('');
    });

    function applyLayout(layout) {
      // Cleanup previous infographic arc listeners
      if (infographicViewEl._arcCleanup) {
        infographicViewEl._arcCleanup();
        infographicViewEl._arcCleanup = null;
      }
      // Cleanup previous cell view
      if (cellViewEl._cleanup) {

        cellViewEl._cleanup = null;
      }
      document.body.setAttribute('data-layout', layout);
      // Clean up galaxy state
      closeCard();
      closePlanetPanel();
      if (selectedPlanetId) clearPlanetSelection();
      // Re-apply search to new layout
      if (searchQuery) applySearch(searchQuery);
      // Render alternate views if needed
      if (layout === 'cards') {
        renderCardsView();
      } else if (layout === 'infographic') {
        renderInfographicView();
      } else if (layout === 'cell') {

    function renderCardsView() {
      var html = '<div class="layout-cards-grid">';
      planets.forEach(function (pl) {
        var planetPosts = posts.filter(function (p) { return p.planetId === pl.id; });

        html += '<div class="layout-cards-group-title">' +

        '</div>';

    // ============ CELL VIEW (Force-directed organic bubbles) ============
    function renderCellView() {
      cellViewEl.innerHTML = '';
      var stage = document.createElement('div');
      stage.className = 'cell-stage';
      cellViewEl.appendChild(stage);

      var W = window.innerWidth, H = window.innerHeight;
      var cellCam = { x: W / 2, y: H / 2, scale: 0.85 };
      var cellDrag = { active: false, moved: false, sx: 0, sy: 0, cx: 0, cy: 0 };
      var cellTouch = { mode: '', moved: false, startX: 0, startY: 0, camX: 0, camY: 0, startScale: 1, startDistance: 0, worldX: 0, worldY: 0 };
      var simNodes = []; // flat list of all simulation nodes
      var simFrame = null;
      var cellWheelHandler = null;
      var cellMouseDownHandler = null;
      var cellMoveHandler = null;
      var cellUpHandler = null;
      var cellTouchStartHandler = null;
      var cellTouchMoveHandler = null;
      var cellTouchEndHandler = null;
      var cellTouchCancelHandler = null;

      // Organic border-radius presets
      var blobShapes = [
        '42% 58% 55% 45% / 55% 45% 52% 48%',
        '55% 45% 48% 52% / 45% 55% 50% 50%',
        '48% 52% 58% 42% / 52% 48% 44% 56%',
        '50% 50% 45% 55% / 58% 42% 55% 45%',
        '45% 55% 52% 48% / 50% 50% 58% 42%'
      ];

      // ── Build flat node list from tree ──
      var PAD = 10;
      var LABEL_PAD = 28; // extra top padding for bubble label
      var ART_R = 16;

      function buildNodes(parentId, depth, parentNode) {
        var children = getChildren(parentId);
        var topics = [], articles = [];
        children.forEach(function (c) {
          if (c.type === 'topic') topics.push(c);
          else articles.push(c);
        });

        var childSimNodes = [];

        // Articles as leaf nodes
        articles.forEach(function (a, i) {
          var angle = (i / Math.max(articles.length, 1)) * Math.PI * 2 + Math.random() * 0.3;
          var dist = 20 + Math.random() * 15;
          var sn = {
            id: a.id, type: 'article', depth: depth, node: a,
            x: dist * Math.cos(angle), y: dist * Math.sin(angle),
            vx: 0, vy: 0, r: ART_R,
            parent: parentNode, el: null, labelEl: null
          };
          simNodes.push(sn);
          childSimNodes.push(sn);
        });

        // Topics recursively
        topics.forEach(function (t, i) {
          var angle = (i / Math.max(topics.length, 1)) * Math.PI * 2 + Math.random() * 0.5;
          var dist = 30 + Math.random() * 20;
          var sn = {
            id: t.id, type: 'topic', depth: depth, node: t,
            x: dist * Math.cos(angle), y: dist * Math.sin(angle),
            vx: 0, vy: 0, r: 30,
            parent: parentNode, el: null, labelEl: null,
            children: [], blobIdx: (i + depth) % blobShapes.length
          };
          simNodes.push(sn);
          childSimNodes.push(sn);
          // Recurse
          sn.children = buildNodes(t.id, depth + 1, sn);
        });

        return childSimNodes;
      }

      // Root-level sim nodes
      var rootNodes = [];
      planets.forEach(function (pl, i) {
        var angle = (i / planets.length) * Math.PI * 2;
        var dist = 50 + i * 20;
        var sn = {
          id: pl.id, type: 'topic', depth: 0, node: pl,
          x: dist * Math.cos(angle), y: dist * Math.sin(angle),
          vx: 0, vy: 0, r: 50,
          parent: null, el: null, labelEl: null,
          children: [], blobIdx: i % blobShapes.length
        };
        simNodes.push(sn);
        rootNodes.push(sn);
        sn.children = buildNodes(pl.id, 1, sn);
      });

      // ── Create DOM elements ──
      simNodes.forEach(function (sn) {
        if (sn.type === 'topic') {
          var bubble = document.createElement('div');
          bubble.className = 'cell-bubble';
          bubble.style.borderRadius = blobShapes[sn.blobIdx];
          var c = sn.node.color || '#888';
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          bubble.style.background = isDark
            ? 'radial-gradient(ellipse at 40% 35%, ' + c + '1a, ' + c + '08 70%, transparent)'
            : 'radial-gradient(ellipse at 40% 35%, ' + c + '14, ' + c + '06 70%, transparent)';
          bubble.style.borderColor = c + '25';
          (function (nId) {
            bubble.addEventListener('click', function (e) {
              e.stopPropagation();
              onPlanetClick(nId);
            });
          })(sn.node.id);
          stage.appendChild(bubble);
          sn.el = bubble;

          var label = document.createElement('div');
          label.className = 'cell-bubble-label';
          label.textContent = sn.node.label ? sn.node.label[lang] : sn.node.id;
          stage.appendChild(label);
          sn.labelEl = label;
        } else {
          var dot = document.createElement('div');
          dot.className = 'cell-article';
          dot.style.width = (ART_R * 2) + 'px';
          dot.style.height = (ART_R * 2) + 'px';
          var ac = sn.node.color || '#888';
          var dk = adjustColor(ac, -40), lt = adjustColor(ac, 40);
          dot.style.background = 'radial-gradient(circle at 38% 35%, ' + lt + ', ' + ac + ' 55%, ' + dk + ')';
          dot.style.boxShadow = '0 2px 8px ' + ac + '44';
          var dotLabel = document.createElement('span');
          dotLabel.className = 'cell-article-label';
          dotLabel.textContent = sn.node.title ? sn.node.title[lang] : sn.node.id;
          dot.appendChild(dotLabel);
          (function (url, nId) {
            dot.addEventListener('click', function (e) {
              e.stopPropagation();
              navigateToArticle(url);
            });
            dot.addEventListener('mouseenter', function (e) {
              if (postMap[nId]) showCard(nId, e.clientX, e.clientY);
              beginHoverPause();
            });
            dot.addEventListener('mouseleave', function () {
              closeCard();
              endHoverPause();
            });
          })(sn.node.url, sn.node.id);
          stage.appendChild(dot);
          sn.el = dot;
        }
      });

      // ── Force simulation ──
      var driftTime = 0;
      function simulate() {
        var alpha = 0.85; // velocity retention per frame
        var gravity = 0.002;
        var drift = window._cellGameActive ? 0.04 : 0.008; // boosted drift during game
        driftTime += window._cellGameActive ? 0.012 : 0.003;

        // Apply forces bottom-up: children push each other, then attract to parent center
        function applyForces(nodes, cx, cy) {
          // Gravity toward parent center
          nodes.forEach(function (n) {
            n.vx += (cx - n.x) * gravity;
            n.vy += (cy - n.y) * gravity;
            // Slow organic drift using unique per-node phase
            var phase = n._driftPhase;
            if (phase === undefined) { phase = n._driftPhase = Math.random() * Math.PI * 2; }
            n.vx += Math.sin(driftTime * 0.7 + phase) * drift;
            n.vy += Math.cos(driftTime * 0.5 + phase * 1.3) * drift;
          });

          // Elastic collision between siblings
          var restitution = 0.3; // soft bounce
          for (var i = 0; i < nodes.length; i++) {
            for (var j = i + 1; j < nodes.length; j++) {
              var dx = nodes[j].x - nodes[i].x;
              var dy = nodes[j].y - nodes[i].y;
              var dist = Math.sqrt(dx * dx + dy * dy) || 1;
              var minD = nodes[i].r + nodes[j].r + 2;
              if (dist < minD) {
                // Normal vector from i to j
                var nx = dx / dist;
                var ny = dy / dist;
                // Relative velocity of j w.r.t. i along normal
                var dvx = nodes[j].vx - nodes[i].vx;
                var dvy = nodes[j].vy - nodes[i].vy;
                var relVn = dvx * nx + dvy * ny;
                // Only resolve if objects are approaching
                if (relVn < 0) {
                  // Mass proportional to radius squared
                  var mi = nodes[i].r * nodes[i].r;
                  var mj = nodes[j].r * nodes[j].r;
                  var impulse = -(1 + restitution) * relVn / (1 / mi + 1 / mj);
                  nodes[i].vx -= (impulse / mi) * nx;
                  nodes[i].vy -= (impulse / mi) * ny;
                  nodes[j].vx += (impulse / mj) * nx;
                  nodes[j].vy += (impulse / mj) * ny;
                }
                // Separate overlapping objects
                var overlap = (minD - dist) * 0.5;
                nodes[i].x -= overlap * nx;
                nodes[i].y -= overlap * ny;
                nodes[j].x += overlap * nx;
                nodes[j].y += overlap * ny;
              }
            }
          }

          // Update positions
          nodes.forEach(function (n) {
            n.vx *= alpha;
            n.vy *= alpha;
            n.x += n.vx;
            n.y += n.vy;
          });

          // Recurse into topic children
          nodes.forEach(function (n) {
            if (n.type === 'topic' && n.children.length > 0) {
              applyForces(n.children, 0, 0);
              // Compute tight bounding box of children (in local coords)
              var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
              n.children.forEach(function (c) {
                minX = Math.min(minX, c.x - c.r);
                maxX = Math.max(maxX, c.x + c.r);
                minY = Math.min(minY, c.y - c.r);
                maxY = Math.max(maxY, c.y + c.r);
              });
              var w = maxX - minX + PAD * 2;
              var h = maxY - minY + PAD * 2 + LABEL_PAD;
              n.r = Math.sqrt(w * w + h * h) / 2;
              n.bw = w; n.bh = h;
              n.bcx = (minX + maxX) / 2; n.bcy = (minY + maxY) / 2;
            } else if (n.type === 'topic') {
              n.r = 24; n.bw = 48; n.bh = 48; n.bcx = 0; n.bcy = 0;
            }
          });
        }

        applyForces(rootNodes, 0, 0);
      }

      // ── Render positions ──
      function renderPositions() {
        function renderNode(sn, ox, oy) {
          var gx = ox + sn.x;
          var gy = oy + sn.y;
          if (sn.type === 'topic') {
            var w = sn.bw || 48;
            var h = sn.bh || 48;
            var bcx = sn.bcx || 0;
            var bcy = sn.bcy || 0;
            sn.el.style.width = w + 'px';
            sn.el.style.height = h + 'px';
            sn.el.style.left = (gx + bcx - w / 2) + 'px';
            sn.el.style.top = (gy + bcy - h / 2) + 'px';
            var fs = Math.max(8, Math.min(13, Math.min(w, h) / 6));
            sn.labelEl.style.fontSize = fs + 'px';
            sn.labelEl.style.top = (gy + bcy - h / 2 + 4) + 'px';
            sn.labelEl.style.left = (gx + bcx) + 'px';
            // Render children relative to this topic
            sn.children.forEach(function (c) { renderNode(c, gx, gy); });
          } else {
            sn.el.style.left = gx + 'px';
            sn.el.style.top = gy + 'px';
            sn.el.style.transform = 'translate(-50%, -50%)';
          }
        }
        rootNodes.forEach(function (rn) { renderNode(rn, 0, 0); });
      }

      // ── Animation loop ──
      function tick() {
        if (!isMotionPaused) {
          simulate();
          renderPositions();
        }
        simFrame = requestAnimationFrame(tick);
      }
      simFrame = requestAnimationFrame(tick);

      // ── Camera ──
      function updateCellCamera() {
        stage.style.transform = 'translate(' + cellCam.x + 'px,' + cellCam.y + 'px) scale(' + cellCam.scale + ')';
      }

      function beginCellPinch(touches) {
        var center = getTouchCenter(touches);
        cellTouch.mode = 'pinch';
        cellTouch.moved = true;
        cellTouch.startScale = cellCam.scale;
        cellTouch.startDistance = Math.max(1, getTouchDistance(touches));
        cellTouch.worldX = (center.x - cellCam.x) / cellCam.scale;
        cellTouch.worldY = (center.y - cellCam.y) / cellCam.scale;
      }

      function resetCellTouch() {
        cellTouch.mode = '';
        cellTouch.moved = false;
      }

      updateCellCamera();

      cellWheelHandler = function (e) {
        if (currentLayout !== 'cell') return;
        e.preventDefault();
        var f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
        zoomCameraAt(cellCam, e.clientX, e.clientY, cellCam.scale * f, 0.15, 5);
        updateCellCamera();
      };
      cellViewEl.addEventListener('wheel', cellWheelHandler, { passive: false });

      cellMouseDownHandler = function (e) {
        if (e.button !== 0) return;
        cellDrag.active = true; cellDrag.moved = false;
        cellDrag.sx = e.clientX; cellDrag.sy = e.clientY;
        cellDrag.cx = cellCam.x; cellDrag.cy = cellCam.y;
      };
      cellViewEl.addEventListener('mousedown', cellMouseDownHandler);

      cellMoveHandler = function (e) {
        if (!cellDrag.active || currentLayout !== 'cell') return;
        cellDrag.moved = true;
        cellCam.x = cellDrag.cx + (e.clientX - cellDrag.sx);
        cellCam.y = cellDrag.cy + (e.clientY - cellDrag.sy);
        updateCellCamera();
      };
      cellUpHandler = function () { cellDrag.active = false; };
      window.addEventListener('mousemove', cellMoveHandler);
      window.addEventListener('mouseup', cellUpHandler);

      cellTouchStartHandler = function (e) {
        var touch;
        if (currentLayout !== 'cell') return;
        if (e.touches.length === 2) {
          beginCellPinch(e.touches);
          e.preventDefault();
          return;
        }
        if (e.touches.length !== 1 || e.target.closest('.cell-article')) return;
        touch = e.touches[0];
        cellTouch.mode = 'pan';
        cellTouch.moved = false;
        cellTouch.startX = touch.clientX;
        cellTouch.startY = touch.clientY;
        cellTouch.camX = cellCam.x;
        cellTouch.camY = cellCam.y;
      };

      cellTouchMoveHandler = function (e) {
        var touch;
        var center;
        var distance;
        var nextScale;
        var dx;
        var dy;
        if (currentLayout !== 'cell') return;
        if (e.touches.length === 2) {
          if (cellTouch.mode !== 'pinch') beginCellPinch(e.touches);
          center = getTouchCenter(e.touches);
          distance = Math.max(1, getTouchDistance(e.touches));
          nextScale = cellTouch.startScale * (distance / cellTouch.startDistance);
          anchorCameraToTouch(cellCam, center.x, center.y, cellTouch.worldX, cellTouch.worldY, nextScale, 0.15, 5);
          updateCellCamera();
          e.preventDefault();
          return;
        }
        if (e.touches.length !== 1 || cellTouch.mode !== 'pan') return;
        touch = e.touches[0];
        dx = touch.clientX - cellTouch.startX;
        dy = touch.clientY - cellTouch.startY;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) cellTouch.moved = true;
        cellCam.x = cellTouch.camX + dx;
        cellCam.y = cellTouch.camY + dy;
        updateCellCamera();
        e.preventDefault();
      };

      cellTouchEndHandler = function (e) {
        var touch;
        if (currentLayout !== 'cell') return;
        if (cellTouch.mode === 'pinch' && e.touches.length === 1) {
          touch = e.touches[0];
          cellTouch.mode = 'pan';
          cellTouch.moved = true;
          cellTouch.startX = touch.clientX;
          cellTouch.startY = touch.clientY;
          cellTouch.camX = cellCam.x;
          cellTouch.camY = cellCam.y;
          return;
        }
        if (e.touches.length === 0) resetCellTouch();
      };

      cellTouchCancelHandler = function () {
        resetCellTouch();
      };

      cellViewEl.addEventListener('touchstart', cellTouchStartHandler, { passive: false });
      cellViewEl.addEventListener('touchmove', cellTouchMoveHandler, { passive: false });
      cellViewEl.addEventListener('touchend', cellTouchEndHandler, { passive: false });
      cellViewEl.addEventListener('touchcancel', cellTouchCancelHandler, { passive: false });

      // Cleanup
      cellViewEl._cleanup = function () {
        if (simFrame) cancelAnimationFrame(simFrame);
        cellViewEl.removeEventListener('wheel', cellWheelHandler);
        cellViewEl.removeEventListener('mousedown', cellMouseDownHandler);
        cellViewEl.removeEventListener('touchstart', cellTouchStartHandler);
        cellViewEl.removeEventListener('touchmove', cellTouchMoveHandler);
        cellViewEl.removeEventListener('touchend', cellTouchEndHandler);
        cellViewEl.removeEventListener('touchcancel', cellTouchCancelHandler);
        window.removeEventListener('mousemove', cellMoveHandler);
        window.removeEventListener('mouseup', cellUpHandler);
      };
    }

    // ============ CELL GAME (Shooter mini-game) ============
    (function () {
      var gameBtn = document.getElementById('cell-game-btn');
      var canvas = document.getElementById('cell-game-canvas');
      var ctx = canvas.getContext('2d');
      var hudEl = document.getElementById('cell-game-hud');
      var overEl = document.getElementById('cell-game-over');
      var finalScoreEl = document.getElementById('cell-game-final-score');
      var restartBtn = document.getElementById('cell-game-restart');

      var gameActive = false;
      var gameFrame = null;
      var score = 0;

      // Ship state
      var ship = { x: 0, y: 0, r: 14, angle: 0, vx: 0, vy: 0 };
      var keys = { w: false, a: false, s: false, d: false };
      var mouse = { x: 0, y: 0 };
      var bullets = [];
      var missiles = [];
      var smokes = [];
      var debris = [];
      var targets = []; // cells cloned from knowledge nodes

      // Game icon SVGs
      var playIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>';
      var exitIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function buildTargets() {
        targets = [];
        var W = canvas.width, H = canvas.height;
        var cellArticles = document.querySelectorAll('#cell-view .cell-article');
        cellArticles.forEach(function (el) {
          var rect = el.getBoundingClientRect();
          var cx = rect.left + rect.width / 2;
          var cy = rect.top + rect.height / 2;
          var r = Math.max(rect.width, rect.height) / 2;
          if (r < 4) return;
          var bgStyle = el.style.background || '';
          targets.push({
            x: cx, y: cy, r: r, origR: r,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            rawColor: extractColorFromBg(bgStyle),
            hp: 3, alive: true, el: el
          });
        });
        var cellBubbles = document.querySelectorAll('#cell-view .cell-bubble');
        cellBubbles.forEach(function (el) {
          var rect = el.getBoundingClientRect();
          var cx = rect.left + rect.width / 2;
          var cy = rect.top + rect.height / 2;
          var r = Math.max(rect.width, rect.height) / 2.5;
          if (r < 10) return;
          targets.push({
            x: cx, y: cy, r: r, origR: r,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            rawColor: '#5588aa',
            hp: 6, alive: true, el: el
          });
        });
      }

      // Sync target positions from DOM each frame (cells are still moving)
      function syncTargetPositions() {
        for (var i = 0; i < targets.length; i++) {
          var t = targets[i];
          if (!t.alive || !t.el) continue;
          var rect = t.el.getBoundingClientRect();
          t.x = rect.left + rect.width / 2;
          t.y = rect.top + rect.height / 2;
          t.r = Math.max(rect.width, rect.height) / 2;
        }
      }

      function extractColorFromBg(bg) {
        var m = bg.match(/#[0-9a-fA-F]{3,8}/);
        return m ? m[0] : '#888';
      }

      function startGame() {
        gameActive = true;
        score = 0;
        resizeCanvas();
        canvas.classList.add('active');
        hudEl.classList.add('active');
        overEl.classList.remove('active');
        document.body.classList.add('cell-game-on');
        gameBtn.innerHTML = exitIcon;
        hudEl.textContent = 'SCORE: 0';

        ship.x = 100;
        ship.y = canvas.height - 100;
        ship.vx = 0; ship.vy = 0;
        bullets = [];
        missiles = [];
        smokes = [];
        debris = [];
        buildTargets();

        // Boost cell drift activity during game
        window._cellGameActive = true;

        window.addEventListener('keydown', onGameKeyDown);
        window.addEventListener('keyup', onGameKeyUp);
        canvas.addEventListener('mousemove', onGameMouseMove);
        canvas.addEventListener('mousedown', onGameMouseDown);
        canvas.addEventListener('contextmenu', onGameContextMenu);
        window.addEventListener('resize', resizeCanvas);

        gameFrame = requestAnimationFrame(gameLoop);
      }

      function stopGame() {
        gameActive = false;
        if (gameFrame) cancelAnimationFrame(gameFrame);
        canvas.classList.remove('active');
        hudEl.classList.remove('active');
        overEl.classList.remove('active');
        document.body.classList.remove('cell-game-on');
        gameBtn.innerHTML = playIcon;
        keys.w = keys.a = keys.s = keys.d = false;

        window._cellGameActive = false;

        window.removeEventListener('keydown', onGameKeyDown);
        window.removeEventListener('keyup', onGameKeyUp);
        canvas.removeEventListener('mousemove', onGameMouseMove);
        canvas.removeEventListener('mousedown', onGameMouseDown);
        canvas.removeEventListener('contextmenu', onGameContextMenu);
        window.removeEventListener('resize', resizeCanvas);
      }

      function gameOver() {
        gameActive = false;
        if (gameFrame) cancelAnimationFrame(gameFrame);
        finalScoreEl.textContent = 'SCORE: ' + score;
        overEl.classList.add('active');

        window.removeEventListener('keydown', onGameKeyDown);
        window.removeEventListener('keyup', onGameKeyUp);
        canvas.removeEventListener('mousemove', onGameMouseMove);
        canvas.removeEventListener('mousedown', onGameMouseDown);
        canvas.removeEventListener('contextmenu', onGameContextMenu);
      }

      function onGameKeyDown(e) {
        var k = e.key.toLowerCase();
        if (k === 'escape') { stopGame(); return; }
        if (k === 'w' || k === 'arrowup') keys.w = true;
        if (k === 'a' || k === 'arrowleft') keys.a = true;
        if (k === 's' || k === 'arrowdown') keys.s = true;
        if (k === 'd' || k === 'arrowright') keys.d = true;
        if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].indexOf(k) !== -1) e.preventDefault();
      }

      function onGameKeyUp(e) {
        var k = e.key.toLowerCase();
        if (k === 'w' || k === 'arrowup') keys.w = false;
        if (k === 'a' || k === 'arrowleft') keys.a = false;
        if (k === 's' || k === 'arrowdown') keys.s = false;
        if (k === 'd' || k === 'arrowright') keys.d = false;
      }

      function onGameMouseMove(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      }

      function onGameMouseDown(e) {
        if (!gameActive) return;
        if (e.button === 0) {
          // Left click: bullet
          var angle = Math.atan2(mouse.y - ship.y, mouse.x - ship.x);
          bullets.push({
            x: ship.x + Math.cos(angle) * (ship.r + 4),
            y: ship.y + Math.sin(angle) * (ship.r + 4),
            vx: Math.cos(angle) * 7,
            vy: Math.sin(angle) * 7,
            life: 90
          });
        }
      }

      function onGameContextMenu(e) {
        e.preventDefault();
        if (!gameActive) return;
        // Right click: missile toward cursor
        var angle = Math.atan2(mouse.y - ship.y, mouse.x - ship.x);
        missiles.push({
          x: ship.x + Math.cos(angle) * (ship.r + 6),
          y: ship.y + Math.sin(angle) * (ship.r + 6),
          vx: Math.cos(angle) * 3.5,
          vy: Math.sin(angle) * 3.5,
          angle: angle,
          speed: 3.5,
          life: 180,
          trail: [] // array of {x, y} for trajectory line
        });
      }

      // Main game loop
      function gameLoop() {
        if (!gameActive) return;
        var W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        // ── Ship movement ──
        var accel = 0.35;
        var friction = 0.94;
        if (keys.w) ship.vy -= accel;
        if (keys.s) ship.vy += accel;
        if (keys.a) ship.vx -= accel;
        if (keys.d) ship.vx += accel;
        ship.vx *= friction;
        ship.vy *= friction;
        ship.x += ship.vx;
        ship.y += ship.vy;
        // Clamp to screen
        ship.x = Math.max(ship.r, Math.min(W - ship.r, ship.x));
        ship.y = Math.max(ship.r, Math.min(H - ship.r, ship.y));
        ship.angle = Math.atan2(mouse.y - ship.y, mouse.x - ship.x);

        // ── Update bullets ──
        var i, j;
        for (i = bullets.length - 1; i >= 0; i--) {
          var b = bullets[i];
          b.x += b.vx;
          b.y += b.vy;
          b.life--;
          if (b.life <= 0 || b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) {
            bullets.splice(i, 1);
          }
        }

        // ── Sync target positions from live DOM cells ──
        syncTargetPositions();

        // ── Update missiles ──
        for (i = missiles.length - 1; i >= 0; i--) {
          var m = missiles[i];
          // Gentle homing toward nearest alive target
          var nearT = null, nearD = Infinity;
          for (j = 0; j < targets.length; j++) {
            if (!targets[j].alive) continue;
            var mdx = targets[j].x - m.x, mdy = targets[j].y - m.y;
            var md = mdx * mdx + mdy * mdy;
            if (md < nearD) { nearD = md; nearT = targets[j]; }
          }
          if (nearT) {
            var desiredAngle = Math.atan2(nearT.y - m.y, nearT.x - m.x);
            var angleDiff = desiredAngle - m.angle;
            // Normalize to [-PI, PI]
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            m.angle += angleDiff * 0.04; // gentle turn rate
          }
          m.speed = Math.min(6, m.speed + 0.02); // accelerate
          m.vx = Math.cos(m.angle) * m.speed;
          m.vy = Math.sin(m.angle) * m.speed;
          m.x += m.vx;
          m.y += m.vy;
          m.life--;
          // Record trail
          m.trail.push({ x: m.x, y: m.y });
          if (m.trail.length > 30) m.trail.shift();
          // Emit smoke particles
          if (Math.random() < 0.6) {
            smokes.push({
              x: m.x - m.vx * 0.5 + (Math.random() - 0.5) * 4,
              y: m.y - m.vy * 0.5 + (Math.random() - 0.5) * 4,
              r: 3 + Math.random() * 3,
              life: 30 + Math.floor(Math.random() * 20),
              maxLife: 50
            });
          }
          // Out of bounds or expired
          if (m.life <= 0 || m.x < -20 || m.x > W + 20 || m.y < -20 || m.y > H + 20) {
            missiles.splice(i, 1);
            continue;
          }
          // Missile-target collision
          var missileHit = false;
          for (j = 0; j < targets.length; j++) {
            var t = targets[j];
            if (!t.alive) continue;
            var mdx2 = m.x - t.x, mdy2 = m.y - t.y;
            if (mdx2 * mdx2 + mdy2 * mdy2 < (t.r + 6) * (t.r + 6)) {
              missileHit = true;
              // Massive damage
              t.hp -= 3;
              score += 3;
              // Big explosion debris
              for (var km = 0; km < 15; km++) {
                var eda = Math.random() * Math.PI * 2;
                var esp = 2 + Math.random() * 5;
                debris.push({
                  x: m.x, y: m.y,
                  vx: Math.cos(eda) * esp,
                  vy: Math.sin(eda) * esp,
                  r: 2 + Math.random() * 4,
                  life: 50 + Math.floor(Math.random() * 40),
                  color: t.rawColor
                });
              }
              // Smoke burst
              for (var ks = 0; ks < 8; ks++) {
                smokes.push({
                  x: m.x + (Math.random() - 0.5) * 20,
                  y: m.y + (Math.random() - 0.5) * 20,
                  r: 6 + Math.random() * 8,
                  life: 40 + Math.floor(Math.random() * 25),
                  maxLife: 65
                });
              }
              // Shrink / annihilate
              if (t.el) {
                var sc = Math.max(0.1, t.hp / 3);
                t.el.style.transform = 'translate(-50%, -50%) scale(' + sc + ')';
              }
              if (t.hp <= 0) {
                t.alive = false;
                score += 7;
                if (t.el) {
                  t.el.style.transition = 'opacity 0.3s, transform 0.3s';
                  t.el.style.opacity = '0';
                  t.el.style.transform = 'translate(-50%, -50%) scale(0)';
                }
                for (var ka = 0; ka < 12; ka++) {
                  var ada = Math.random() * Math.PI * 2;
                  var asp = 2 + Math.random() * 5;
                  debris.push({
                    x: t.x, y: t.y,
                    vx: Math.cos(ada) * asp,
                    vy: Math.sin(ada) * asp,
                    r: 3 + Math.random() * 5,
                    life: 60 + Math.floor(Math.random() * 50),
                    color: t.rawColor
                  });
                }
              }
              hudEl.textContent = 'SCORE: ' + score;
              break;
            }
          }
          if (missileHit) { missiles.splice(i, 1); }
        }

        // ── Update smokes ──
        for (i = smokes.length - 1; i >= 0; i--) {
          var sm = smokes[i];
          sm.r += 0.15; // expand slowly
          sm.life--;
          if (sm.life <= 0) smokes.splice(i, 1);
        }

        // ── Bullet-target collision ──
        for (i = bullets.length - 1; i >= 0; i--) {
          var b = bullets[i];
          for (j = 0; j < targets.length; j++) {
            var t = targets[j];
            if (!t.alive) continue;
            var dx = b.x - t.x, dy = b.y - t.y;
            if (dx * dx + dy * dy < t.r * t.r) {
              // Hit!
              bullets.splice(i, 1);
              t.hp--;
              score += 1;
              // Spawn debris
              var debrisCount = 3 + Math.floor(Math.random() * 3);
              for (var k = 0; k < debrisCount; k++) {
                var da = Math.random() * Math.PI * 2;
                var dsp = 1.5 + Math.random() * 3;
                debris.push({
                  x: b.x, y: b.y,
                  vx: Math.cos(da) * dsp,
                  vy: Math.sin(da) * dsp,
                  r: 2 + Math.random() * 3,
                  life: 50 + Math.floor(Math.random() * 40),
                  color: t.rawColor
                });
              }
              // Shrink the DOM element
              if (t.el) {
                var scale = Math.max(0.2, t.hp / 3);
                t.el.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
              }
              // Annihilate if hp depleted
              if (t.hp <= 0) {
                t.alive = false;
                score += 9; // +10 total
                if (t.el) {
                  t.el.style.transition = 'opacity 0.3s, transform 0.3s';
                  t.el.style.opacity = '0';
                  t.el.style.transform = 'translate(-50%, -50%) scale(0)';
                }
                // Big burst
                for (var k2 = 0; k2 < 10; k2++) {
                  var da2 = Math.random() * Math.PI * 2;
                  var dsp2 = 2 + Math.random() * 4;
                  debris.push({
                    x: t.x, y: t.y,
                    vx: Math.cos(da2) * dsp2,
                    vy: Math.sin(da2) * dsp2,
                    r: 2 + Math.random() * 4,
                    life: 60 + Math.floor(Math.random() * 50),
                    color: t.rawColor
                  });
                }
              }
              hudEl.textContent = 'SCORE: ' + score;
              break;
            }
          }
        }

        // ── Target-ship collision ──
        for (i = 0; i < targets.length; i++) {
          var t = targets[i];
          if (!t.alive) continue;
          var dx = ship.x - t.x, dy = ship.y - t.y;
          if (dx * dx + dy * dy < (ship.r + t.r) * (ship.r + t.r)) {
            gameOver();
            // Draw explosion at ship
            for (var k3 = 0; k3 < 15; k3++) {
              var da3 = Math.random() * Math.PI * 2;
              var dsp3 = 2 + Math.random() * 5;
              debris.push({
                x: ship.x, y: ship.y,
                vx: Math.cos(da3) * dsp3,
                vy: Math.sin(da3) * dsp3,
                r: 2 + Math.random() * 4,
                life: 40 + Math.floor(Math.random() * 30),
                color: '#ff4444'
              });
            }
            // Continue one more render pass to show explosion
            drawGame(W, H);
            return;
          }
        }

        // ── Update debris ──
        for (i = debris.length - 1; i >= 0; i--) {
          var d = debris[i];
          d.x += d.vx;
          d.y += d.vy;
          d.vx *= 0.98;
          d.vy *= 0.98;
          d.life--;
          // Wall bounce
          if (d.x < 0 || d.x > W) d.vx *= -1;
          if (d.y < 0 || d.y > H) d.vy *= -1;
          if (d.life <= 0) debris.splice(i, 1);
        }

        drawGame(W, H);
        gameFrame = requestAnimationFrame(gameLoop);
      }

      function drawGame(W, H) {
        // ── Draw debris ──
        var i;
        for (i = 0; i < debris.length; i++) {
          var d = debris[i];
          ctx.globalAlpha = Math.min(1, d.life / 20);
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = d.color;
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // ── Draw smokes ──
        for (i = 0; i < smokes.length; i++) {
          var sm = smokes[i];
          var smAlpha = (sm.life / (sm.maxLife || 50)) * 0.35;
          ctx.globalAlpha = smAlpha;
          ctx.beginPath();
          ctx.arc(sm.x, sm.y, sm.r, 0, Math.PI * 2);
          ctx.fillStyle = '#aaa';
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // ── Draw missile trails ──
        for (i = 0; i < missiles.length; i++) {
          var m = missiles[i];
          if (m.trail.length > 1) {
            ctx.save();
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            for (var ti = 1; ti < m.trail.length; ti++) {
              var tAlpha = ti / m.trail.length;
              ctx.globalAlpha = tAlpha * 0.6;
              ctx.strokeStyle = '#ff6622';
              ctx.beginPath();
              ctx.moveTo(m.trail[ti - 1].x, m.trail[ti - 1].y);
              ctx.lineTo(m.trail[ti].x, m.trail[ti].y);
              ctx.stroke();
            }
            ctx.restore();
          }
          // Draw missile body
          ctx.save();
          ctx.translate(m.x, m.y);
          ctx.rotate(m.angle);
          ctx.beginPath();
          ctx.moveTo(10, 0);
          ctx.lineTo(-6, -4);
          ctx.lineTo(-4, 0);
          ctx.lineTo(-6, 4);
          ctx.closePath();
          ctx.fillStyle = '#ff4400';
          ctx.shadowColor = '#ff4400';
          ctx.shadowBlur = 10;
          ctx.fill();
          // Missile flame
          ctx.beginPath();
          ctx.moveTo(-4, -2);
          ctx.lineTo(-10 - Math.random() * 6, 0);
          ctx.lineTo(-4, 2);
          ctx.fillStyle = 'rgba(255,' + Math.floor(180 + Math.random() * 75) + ',0,0.8)';
          ctx.shadowBlur = 0;
          ctx.fill();
          ctx.restore();
        }
        ctx.globalAlpha = 1;

        // ── Draw bullets ──
        for (i = 0; i < bullets.length; i++) {
          var b = bullets[i];
          ctx.beginPath();
          ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = '#ffdd44';
          ctx.shadowColor = '#ffdd44';
          ctx.shadowBlur = 6;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // ── Draw ship ──
        if (gameActive) {
          ctx.save();
          ctx.translate(ship.x, ship.y);
          ctx.rotate(ship.angle);
          ctx.beginPath();
          ctx.moveTo(ship.r + 4, 0);
          ctx.lineTo(-ship.r, -ship.r * 0.7);
          ctx.lineTo(-ship.r * 0.5, 0);
          ctx.lineTo(-ship.r, ship.r * 0.7);
          ctx.closePath();
          ctx.fillStyle = '#00ddff';
          ctx.shadowColor = '#00ddff';
          ctx.shadowBlur = 12;
          ctx.fill();
          ctx.restore();

          // ── Draw crosshair ──
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.6)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(mouse.x, mouse.y, 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(mouse.x - 18, mouse.y);
          ctx.lineTo(mouse.x - 8, mouse.y);
          ctx.moveTo(mouse.x + 8, mouse.y);
          ctx.lineTo(mouse.x + 18, mouse.y);
          ctx.moveTo(mouse.x, mouse.y - 18);
          ctx.lineTo(mouse.x, mouse.y - 8);
          ctx.moveTo(mouse.x, mouse.y + 8);
          ctx.lineTo(mouse.x, mouse.y + 18);
          ctx.stroke();
          ctx.restore();
        }

        // ── Draw thruster flame when moving ──
        if (gameActive && (keys.w || keys.a || keys.s || keys.d)) {
          ctx.save();
          ctx.translate(ship.x, ship.y);
          ctx.rotate(ship.angle);
          ctx.beginPath();
          ctx.moveTo(-ship.r * 0.5, -ship.r * 0.25);
          ctx.lineTo(-ship.r - 6 - Math.random() * 6, 0);
          ctx.lineTo(-ship.r * 0.5, ship.r * 0.25);
          ctx.fillStyle = 'rgba(255,' + Math.floor(120 + Math.random() * 80) + ',0,0.7)';
          ctx.fill();
          ctx.restore();
        }
      }

      function lightenColor(hex, amt) {
        var r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
        return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
      }

      function darkenColor(hex, amt) {
        var r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        r = Math.max(0, r - amt); g = Math.max(0, g - amt); b = Math.max(0, b - amt);
        return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
      }

      gameBtn.addEventListener('click', function () {
        if (gameActive) {
          stopGame();
        } else {
          if (currentLayout === 'cell') startGame();
        }
      });

      restartBtn.addEventListener('click', function () {
        overEl.classList.remove('active');
        gameBtn.innerHTML = playIcon;
        keys.w = keys.a = keys.s = keys.d = false;
        window.removeEventListener('resize', resizeCanvas);
        // Restart
        startGame();
      });
    })();

    function renderInfographicView() {
      // ═══════════════════════════════════════════════════════════
      // Arc Hierarchy Engine — unlimited depth, rule-based rendering
      // ═══════════════════════════════════════════════════════════
      // Each arc level displays children (topics + articles) of the
      // selected node at the previous level.  Level 0 shows root
      // topics.  Deeper levels are created/destroyed dynamically.
      // ═══════════════════════════════════════════════════════════

      var W = window.innerWidth, H = window.innerHeight;
      var cx = -W * 0.08;
