    // ============ HUB ORBITS (SVG) ============
    function createHubOrbits() {
      HUB_ORBITS.forEach(function () {
        var el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        el.setAttribute('class', 'orbit-ring');
        el.setAttribute('stroke-width', '1');
        svg.appendChild(el);
        orbitEls.push(el);
      });
      layoutOrbits();
    }

    function layoutOrbits() {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      HUB_ORBITS.forEach(function (o, i) {
        var el = orbitEls[i];
        el.setAttribute('cx', cx);
        el.setAttribute('cy', cy);
        el.setAttribute('rx', base * o.rx);
        el.setAttribute('ry', base * o.ry);
        el.setAttribute('transform', 'rotate(' + o.tilt + ' ' + cx + ' ' + cy + ')');
      });
    }

    // ============ PLANETS ============
    function createPlanets() {
      // Count ALL descendant articles per planet for proportional sizing
      var descCounts = {};
      var globalMax = 1;
      allPlanets.forEach(function (pl) {
        var count = getAllArticles(pl.id).length;
        descCounts[pl.id] = count;
        if (count > globalMax) globalMax = count;
      });
      // Also compute for all groups
      allGroups.forEach(function (g) {
        var count = getAllArticles(g.id).length;
        descCounts[g.id] = count;
        if (count > globalMax) globalMax = count;
      });

      var MIN_SIZE = 36;
      var MAX_SIZE = 80;

      allPlanets.forEach(function (pl) {
        pl.angle = pl.phase;
        pl.x = 0; pl.y = 0;

        var count = descCounts[pl.id] || 1;
        var ratio = count / globalMax;
        var size = MIN_SIZE + (MAX_SIZE - MIN_SIZE) * Math.sqrt(ratio);
        pl.bodySize = size;
        // Larger planets move slower
        pl.speed = Math.max(0.25, 1 - ratio * 0.6) * (pl.speed || 0.5);

        // Create satellite orbit ring (SVG)
        var satRing = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        satRing.setAttribute('class', 'orbit-ring');
        satRing.setAttribute('stroke-width', '0.8');
        satRing.style.stroke = pl.color;
        satRing.style.opacity = '0.2';
        svg.appendChild(satRing);
        pl.satRingEl = satRing;

        // Create planet DOM
        var el = document.createElement('div');
        el.className = 'planet';
        el.setAttribute('data-planet', pl.id);

        var body = document.createElement('div');
        body.className = 'planet-body';
        body.style.width = size + 'px';
        body.style.height = size + 'px';
        var darker = adjustColor(pl.color, -50);
        var lighter = adjustColor(pl.color, 40);
        body.style.background = 'radial-gradient(circle at 38% 35%, ' + lighter + ', ' + pl.color + ' 50%, ' + darker + ' 100%)';
        body.style.boxShadow = '0 4px 20px ' + pl.color + '44, inset 0 -4px 12px ' + darker + '66';

        // Texture overlay for natural surface
        var texture = document.createElement('div');
        texture.className = 'planet-texture';
        body.appendChild(texture);

        // Fine grain layer for more realistic planetary surface detail
        var noise = document.createElement('div');
        noise.className = 'planet-surface-noise';
        body.appendChild(noise);

        // Relief layer to add topographic-like light and shadow patches
        var relief = document.createElement('div');
        relief.className = 'planet-relief';
        body.appendChild(relief);

        // Atmospheric band
        var band = document.createElement('div');
        band.className = 'planet-band';
        body.appendChild(band);

        el.appendChild(body);

        var label = document.createElement('span');
        label.className = 'planet-label';
        label.textContent = pl.label[lang];
        el.appendChild(label);
        pl.labelEl = label;

        el.addEventListener('click', function (e) {
          e.stopPropagation();
          onPlanetClick(pl.id);
        });
        el.addEventListener('mouseenter', beginHoverPause);
        el.addEventListener('mouseleave', endHoverPause);

        graphStageEl.appendChild(el);
        pl.el = el;
        planetMap[pl.id] = pl;
      });

      // Create group "mini-planet" nodes (any depth)
      allGroups.forEach(function (g) {
        g.angle = g.phase || 0;
        g.x = 0; g.y = 0;

        var depth = getDepth(g);
        var count = descCounts[g.id] || 0;
        var ratio = count / globalMax;

        // Orbit ring for group's children
        var gRing = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        gRing.setAttribute('class', 'orbit-ring');
        gRing.setAttribute('stroke-width', Math.max(0.3, 0.8 - depth * 0.15).toFixed(1));
        gRing.style.stroke = g.color;
        gRing.style.opacity = Math.max(0.06, 0.2 - depth * 0.04).toFixed(2);
        svg.appendChild(gRing);
        g.satRingEl = gRing;

        // Size proportional to descendant count, scaled down by depth
        var el = document.createElement('div');
        el.className = 'planet';
        el.setAttribute('data-group', g.id);

        var depthScale = Math.max(0.5, 1 - (depth - 1) * 0.15);
        var minS = 14 * depthScale;
        var maxS = 44 * depthScale;
        var size = count > 0 ? minS + (maxS - minS) * Math.sqrt(ratio) : minS;
        size = Math.max(12, Math.round(size));
        g.bodySize = size;
        // Larger groups orbit slower
        g.speed = Math.max(0.4, 1 - ratio * 0.5) * (g.speed || 0.85);
        var body = document.createElement('div');
        body.className = 'planet-body';
        body.style.width = size + 'px';
        body.style.height = size + 'px';
        var darker = adjustColor(g.color, -50);
        var lighter = adjustColor(g.color, 40);
        body.style.background = 'radial-gradient(circle at 38% 35%, ' + lighter + ', ' + g.color + ' 50%, ' + darker + ' 100%)';
        body.style.boxShadow = '0 3px 14px ' + g.color + '44, inset 0 -3px 8px ' + darker + '66';

        var texture = document.createElement('div');
        texture.className = 'planet-texture';
        body.appendChild(texture);
        el.appendChild(body);

        var label = document.createElement('span');
        label.className = 'planet-label';
        label.textContent = g.label[lang];
        el.appendChild(label);
        g.labelEl = label;

        el.addEventListener('mouseenter', beginHoverPause);
        el.addEventListener('mouseleave', endHoverPause);
        (function (gId) {
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            onPlanetClick(gId);
          });
        })(g.id);

        graphStageEl.appendChild(el);
        g.el = el;
        groupMap[g.id] = g;
      });
    }

    // ============ KNOWLEDGE NODES ============
    function createNodes() {
      allPosts.forEach(function (p) {
        p.angle = p.phase;
        p.paused = false;
        p.x = 0; p.y = 0;

        var el = document.createElement('div');
        el.className = 'node';
        el.style.background = p.color;
        el.style.color = p.color;
        el.setAttribute('data-id', p.id);

        var label = document.createElement('span');
        label.className = 'node-label';
        label.textContent = p.title[lang];
        el.appendChild(label);
        p.labelEl = label;

        el.addEventListener('mouseenter', function () { onNodeHover(p.id); });
        el.addEventListener('mouseleave', function () { onNodeLeave(p.id); });
        el.addEventListener('click', function (e) {
          e.stopPropagation();
          onNodeClick(p.id);
        });

        graphStageEl.appendChild(el);
        p.el = el;
        postMap[p.id] = p;
      });
    }

    // ============ POSITION CALC ============
    function calcPlanetPos(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      var o = HUB_ORBITS[pl.orbitIndex] || HUB_ORBITS[0];
      var rx = base * o.rx, ry = base * o.ry;
      var tiltRad = o.tilt * Math.PI / 180;
      var ux = rx * Math.cos(pl.angle);
      var uy = ry * Math.sin(pl.angle);
      return {
        x: cx + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: cy + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcGroupPos(g) {
      // Parent is either a planet (root) or another group
      var parent = planetMap[g.parentId] || groupMap[g.parentId];
      if (!parent) return { x: 0, y: 0 };
      var depth = getDepth(g);
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * getOrbitRadiusForDepth(depth);
      var tilt = getOrbitTilt(depth);
      var tiltRad = tilt * Math.PI / 180;
      var ux = r * Math.cos(g.angle);
      var uy = r * 0.6 * Math.sin(g.angle);
      return {
        x: parent.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: parent.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcNodePos(post) {
      // Find the direct parent (group or planet)
      var parent = null;
      if (post.groupId && groupMap[post.groupId]) {
        parent = groupMap[post.groupId];
      } else if (post.planetId && planetMap[post.planetId]) {
        parent = planetMap[post.planetId];
      }
      if (!parent) return { x: 0, y: 0 };
      var depth = getDepth(post);
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * getOrbitRadiusForDepth(depth);
      var tilt = getOrbitTilt(depth);
      var tiltRad = tilt * Math.PI / 180;
      var ux = r * Math.cos(post.angle);
      var uy = r * 0.6 * Math.sin(post.angle);
      return {
        x: parent.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: parent.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    // ============ ANIMATION ============
    function animate(time) {
      var dt = prevTime ? (time - prevTime) : 16;
      prevTime = time;
      var base = Math.min(window.innerWidth, window.innerHeight);
      graphStageEl.style.transform = 'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.scale + ')';

      // Move planets
      planets.forEach(function (pl) {
        if (!isMotionPaused) {
          pl.angle += HUB_SPEED * pl.speed * dt;
        }
        var pos = calcPlanetPos(pl);
        pl.x = pos.x; pl.y = pos.y;
        pl.el.style.left = pos.x + 'px';
        pl.el.style.top = pos.y + 'px';

        // Update satellite orbit ring using depth-based radius
        var childDepth = 1; // children of root are depth 1
        var r = base * getOrbitRadiusForDepth(childDepth);
        var tilt = getOrbitTilt(childDepth);
        pl.satRingEl.setAttribute('cx', pos.x);
        pl.satRingEl.setAttribute('cy', pos.y);
        pl.satRingEl.setAttribute('rx', r);
        pl.satRingEl.setAttribute('ry', r * 0.6);
        pl.satRingEl.setAttribute('transform', 'rotate(' + tilt + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move groups (orbit their parent planet or group)
      groups.forEach(function (g) {
        var depth = getDepth(g);
        var spd = getOrbitSpeed(depth);
        if (!isMotionPaused) {
          g.angle += spd * (g.speed || 1) * dt;
        }
        var pos = calcGroupPos(g);
        g.x = pos.x; g.y = pos.y;
        g.el.style.left = pos.x + 'px';
        g.el.style.top = pos.y + 'px';

        // Update this group's child orbit ring
        var childDepth = depth + 1;
        var gr = base * getOrbitRadiusForDepth(childDepth);
        var gTilt = getOrbitTilt(childDepth);
        g.satRingEl.setAttribute('cx', pos.x);
        g.satRingEl.setAttribute('cy', pos.y);
        g.satRingEl.setAttribute('rx', gr);
        g.satRingEl.setAttribute('ry', gr * 0.6);
        g.satRingEl.setAttribute('transform', 'rotate(' + gTilt + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move knowledge nodes (orbit their parent group or planet)
      posts.forEach(function (p) {
        var depth = getDepth(p);
        var spd = getOrbitSpeed(depth);
        if (!isMotionPaused && !p.paused) {
          p.angle += spd * p.speed * dt;
        }
        var pos = calcNodePos(p);
        p.x = pos.x; p.y = pos.y;
        p.el.style.left = pos.x + 'px';
        p.el.style.top = pos.y + 'px';
      });

      updateConnections();

      if (selectedPlanetId && planetMap[selectedPlanetId]) {
        positionPlanetPanel(planetMap[selectedPlanetId]);
      }

      if (activePostId && postMap[activePostId]) {
        positionCard(postMap[activePostId]);
      }

      requestAnimationFrame(animate);
    }

    // ============ PLANET CLICK ============
    function onPlanetClick(plId) {
      closeCard();
      if (selectedPlanetId === plId) {
        clearPlanetSelection();
        return;
      }
      selectedPlanetId = plId;
      applyPlanetFilter();
      showPlanetPanel(plId);
    }

    function clearPlanetSelection() {
      selectedPlanetId = null;
      applyPlanetFilter();
      closePlanetPanel();
    }

    function applyPlanetFilter() {
      // Find all descendant node ids of the selected topic
      var selDescIds = {};
      if (selectedPlanetId) {
        getAllArticles(selectedPlanetId).forEach(function (a) { selDescIds[a.id] = true; });
        // Also include descendant topics
        var queue = [selectedPlanetId];
        while (queue.length) {
          var cur = queue.shift();
          getChildren(cur).forEach(function (c) {
            if (c.type === 'topic') { selDescIds[c.id] = true; queue.push(c.id); }
          });
        }
        selDescIds[selectedPlanetId] = true;
      }

      planets.forEach(function (pl) {
        var isBg = selectedPlanetId && !selDescIds[pl.id];
        pl.el.classList.toggle('is-bg', isBg);
        pl.el.classList.toggle('is-selected', pl.id === selectedPlanetId);
        pl.satRingEl.classList.toggle('is-bg', isBg);
      });

      if (selectedPlanetId) {
        var selPl = planetMap[selectedPlanetId];
        orbitEls.forEach(function (el, i) {
          el.classList.toggle('is-bg', selPl ? selPl.orbitIndex !== i : true);
        });
      } else {
        orbitEls.forEach(function (el) { el.classList.remove('is-bg'); });
      }

      groups.forEach(function (g) {
        var isBg = selectedPlanetId && !selDescIds[g.id];
        g.el.classList.toggle('is-bg', isBg);
        g.el.classList.toggle('is-selected', g.id === selectedPlanetId);
        g.satRingEl.classList.toggle('is-bg', isBg);
      });

      posts.forEach(function (p) {
        var isBg = selectedPlanetId && !selDescIds[p.id];
        p.el.classList.toggle('is-bg', isBg);
        if (isBg && activePostId === p.id) closeCard();
      });
    }

    // ============ NODE INTERACTIONS ============
    function onNodeHover(id) {
      beginHoverPause();
      hoverPostId = id;
      var p = postMap[id];
      if (p) p.paused = true;
      if (p && p.relations.length) {
        p.relations.forEach(function (rid) {
          var r = postMap[rid];
          if (r) r.el.classList.add('is-related');
        });
      }
      // Show summary card on hover
      if (p && !activePostId) {
        showCard(id);
      }
    }

    function onNodeLeave(id) {
      hoverPostId = null;
      var p = postMap[id];
      if (p && activePostId !== id) p.paused = false;
      posts.forEach(function (pp) { pp.el.classList.remove('is-related'); });
      // Hide card if it was shown by hover (not by click)
      if (activePostId !== id) {
        closeCard();
      }
      endHoverPause();
    }

    function onNodeClick(id) {
      var p = postMap[id];
      if (p && p.url) {
        navigateToArticle(p.url);
      }
    }

    function onGraphClick(e) {
      if (graphPanZoom && graphPanZoom.wasDragged()) return;
      if (graphPanZoom && graphPanZoom.isClickSuppressed()) return;
      if (e.target.closest('.node') || e.target.closest('.card') || e.target.closest('.planet') || e.target.closest('.planet-panel')) return;
      closeCard();
      // Also deselect planet
      if (selectedPlanetId) {
        clearPlanetSelection();
      }
    }

    function showPlanetPanel(plId) {
      var pl = planetMap[plId] || groupMap[plId];
      if (!pl) return;
      var panelPosts = getAllArticles(plId);
      panelPosts.sort(function (a, b) { return (a.date || '').localeCompare(b.date || ''); });
      var itemsHtml = panelPosts.map(function (p) {
        var tagsHtml = (p.tags || []).map(function (t) {
          return '<span class="card-tag">' + t + '</span>';
        }).join('');
        return '<a class="planet-panel-item" href="' + p.url + '">' +
          '<h4>' + p.title[lang] + '</h4>' +
          '<div class="card-tags">' + tagsHtml + '</div>' +
          '<p>' + p.summary[lang] + '</p>' +
        '</a>';
      }).join('');

      var topicLabel = pl.label ? pl.label[lang] : (pl.title ? pl.title[lang] : pl.id);

      planetPanelEl.innerHTML =
        '<div class="planet-panel-header">' +
          '<div>' +
            '<div class="planet-panel-kicker">' + (lang === 'zh' ? '知识主题' : 'Knowledge Topic') + '</div>' +
            '<h3 class="planet-panel-title">' + topicLabel + '</h3>' +
            '<p class="planet-panel-subtitle">' +
              (lang === 'zh'
                ? '共 ' + panelPosts.length + ' 个相关知识点，点击可查看详情。'
                : panelPosts.length + ' related knowledge points. Select one to open the full article.') +
            '</p>' +
          '</div>' +
          '<button class="planet-panel-close" type="button" aria-label="' + (lang === 'zh' ? '关闭面板' : 'Close panel') + '">×</button>' +
        '</div>' +
        '<div class="planet-panel-list">' + itemsHtml + '</div>';

      positionPlanetPanel(pl);
      planetPanelEl.classList.remove('is-visible');
      void planetPanelEl.offsetWidth;
      planetPanelEl.classList.add('is-visible');
    }

    function positionPlanetPanel(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var panelWidth = planetPanelEl.offsetWidth || Math.min(420, W - 24);
      var panelHeight = planetPanelEl.offsetHeight || 360;
      var planetScreenX = pl.x * cam.scale + cam.x;
      var planetScreenY = pl.y * cam.scale + cam.y;
      var offset = Math.max(28, pl.bodySize * 0.7 * cam.scale + 24);
      var x = planetScreenX + offset;
      var y = planetScreenY - panelHeight * 0.34;

      if (x + panelWidth + 16 > W) x = planetScreenX - panelWidth - offset;
      if (x < 12) x = 12;
      if (x + panelWidth + 12 > W) x = W - panelWidth - 12;
      if (y < 72) y = 72;
      if (y + panelHeight + 16 > H) y = H - panelHeight - 16;
      if (y < 72) y = 72;

      planetPanelEl.style.left = x + 'px';
      planetPanelEl.style.top = y + 'px';
    }

    function closePlanetPanel() {
      planetPanelEl.classList.remove('is-visible');
    }

    function showCard(id, screenX, screenY) {
      var p = postMap[id];
      if (!p) return;
      var tags = p.tags.map(function (t) {
        return '<span class="card-tag">' + t + '</span>';
      }).join('');
      cardEl.innerHTML =
        '<div class="card-meta"><time>' + p.date + '</time></div>' +
        '<h3>' + p.title[lang] + '</h3>' +
        '<div class="card-tags">' + tags + '</div>' +
        '<p>' + p.summary[lang] + '</p>';
      if (screenX !== undefined && screenY !== undefined) {
        positionCardAt(screenX, screenY);
      } else {
        positionCard(p);
      }
      cardEl.classList.remove('is-visible');
      void cardEl.offsetWidth;
      cardEl.classList.add('is-visible');
    }

    function positionCardAt(sx, sy) {
      var W = window.innerWidth, H = window.innerHeight;
      var cw = cardEl.offsetWidth || 360;
      var ch = cardEl.offsetHeight || 280;
      var x = sx + 24, y = sy - ch / 3;
      if (x + cw + 16 > W) x = sx - cw - 24;
      if (x < 12) x = 12;
      if (x + cw + 12 > W) x = W - cw - 12;
      if (y < 72) y = 72;
      if (y + ch + 16 > H) y = H - ch - 16;
      if (y < 72) y = 72;
      cardEl.style.left = x + 'px';
      cardEl.style.top = y + 'px';
    }

    function positionCard(p) {
      var W = window.innerWidth, H = window.innerHeight;
      var cw = cardEl.offsetWidth || 360;
      var ch = cardEl.offsetHeight || 280;
      // Convert stage logical coords to screen coords via camera transform
      var sx = p.x * cam.scale + cam.x;
      var sy = p.y * cam.scale + cam.y;
      var x = sx + 24, y = sy - ch / 3;
      // Ensure card stays within visible area
      if (x + cw + 16 > W) x = sx - cw - 24;
      if (x < 12) x = 12;
      if (x + cw + 12 > W) x = W - cw - 12;
      if (y < 72) y = 72;
      if (y + ch + 16 > H) y = H - ch - 16;
      if (y < 72) y = 72;
      cardEl.style.left = x + 'px';
      cardEl.style.top = y + 'px';
    }

    function closeCard() {
      if (activePostId && postMap[activePostId]) {
        postMap[activePostId].paused = false;
        postMap[activePostId].el.classList.remove('is-active');
      }
      activePostId = null;
      cardEl.classList.remove('is-visible');
    }

    // ============ CONNECTION LINES ============
    function updateConnections() {
      connLines.forEach(function (el) { el.remove(); });
      connLines = [];
      var srcId = hoverPostId || activePostId;
      if (!srcId) return;
      var src = postMap[srcId];
      if (!src || !src.relations.length) return;
      src.relations.forEach(function (rid) {
        var tgt = postMap[rid];
        if (!tgt) return;
        if (!showHidden && isNodeHidden(tgt)) return;
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
        line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
        line.setAttribute('class', 'conn-line is-visible');
        line.setAttribute('stroke', src.color);
        svg.appendChild(line);
        connLines.push(line);
      });
    }

    // ============ TAG CLOUD ============
    function buildTagCloud() {
      var tagSet = {};
      posts.forEach(function (p) {
        p.tags.forEach(function (t) { tagSet[t] = true; });
      });
      var cloud = document.getElementById('tag-cloud');
      cloud.innerHTML = '';
      Object.keys(tagSet).forEach(function (tag) {
        var chip = document.createElement('button');
        chip.className = 'tag-chip'; chip.textContent = tag;
        chip.setAttribute('data-tag', tag);
        chip.addEventListener('click', function (e) {
          e.stopPropagation();
          toggleTag(tag, chip);
        });
        cloud.appendChild(chip);
      });
    }

    function toggleTag(tag, chip) {
      var idx = selectedTags.indexOf(tag);
      if (idx >= 0) { selectedTags.splice(idx, 1); chip.classList.remove('is-selected'); }
      else { selectedTags.push(tag); chip.classList.add('is-selected'); }
      applyTagFilter();
    }

    function applyTagFilter() {
      if (selectedTags.length === 0) {
        posts.forEach(function (p) { p.el.classList.remove('is-dimmed'); });
        return;
      }
      posts.forEach(function (p) {
        var match = selectedTags.some(function (t) { return p.tags.indexOf(t) >= 0; });
        p.el.classList.toggle('is-dimmed', !match);
        if (!match && activePostId === p.id) closeCard();
      });
    }

    // ============ RESIZE ============
    function onResize() { layoutOrbits(); }

    // ============ SETTINGS PANEL ============
    function initSettings() {
      var toggle = document.getElementById('settings-toggle');
      var panel = document.getElementById('settings-panel');
      var backdrop = document.getElementById('settings-backdrop');
      var closeBtn = document.getElementById('settings-close');
      var providerSel = document.getElementById('llm-provider');
      var endpointInput = document.getElementById('llm-endpoint');
      var modelInput = document.getElementById('llm-model');
      var modelSelect = document.getElementById('llm-model-select');
      var apikeyInput = document.getElementById('llm-apikey');
      var fieldEndpoint = document.getElementById('field-endpoint');
      var fieldModel = document.getElementById('field-model');
      var fieldApikey = document.getElementById('field-apikey');
      var fieldApiVersion = document.getElementById('field-api-version');
      var apiVersionInput = document.getElementById('llm-api-version');
      var azureAuthTypeSel = document.getElementById('llm-azure-auth-type');
      var fieldAzureAuthType = document.getElementById('field-azure-auth-type');
      var fieldBearerToken = document.getElementById('field-bearer-token');
      var bearerTokenInput = document.getElementById('llm-bearer-token');
      var testBtn = document.getElementById('llm-test');
      var statusEl = document.getElementById('llm-status');
      var saveBtn = document.getElementById('llm-save');

      function openSettings() {
        panel.classList.add('is-open');
        backdrop.classList.add('is-open');
      }
      function closeSettings() {
        panel.classList.remove('is-open');
        backdrop.classList.remove('is-open');
      }

      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        openSettings();
      });
      closeBtn.addEventListener('click', closeSettings);
      backdrop.addEventListener('click', closeSettings);

      // Show-hidden toggle
      var hiddenToggle = document.getElementById('toggle-show-hidden');
      hiddenToggle.checked = showHidden;
      hiddenToggle.addEventListener('change', function () {
        showHidden = hiddenToggle.checked;
        localStorage.setItem('showHidden', showHidden ? 'true' : 'false');
        applyHiddenFilter();
      });

      // Load saved settings
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem('llm-settings')); } catch (e) {}
      if (saved) {
        providerSel.value = saved.provider || 'none';
        endpointInput.value = saved.endpoint || '';
        modelInput.value = saved.model || '';
        apikeyInput.value = saved.apikey || '';
        apiVersionInput.value = saved.apiVersion || '';
        if (saved.azureAuthType) azureAuthTypeSel.value = saved.azureAuthType;
        bearerTokenInput.value = saved.bearerToken || '';
      }

      // Provider change → show/hide fields
      function syncFields() {
        var provider = providerSel.value;
        modelInput.hidden = false;
        modelSelect.hidden = true;
        modelSelect.innerHTML = '';
        // reset placeholders to defaults
        endpointInput.placeholder = 'http://localhost:11434';
        modelInput.placeholder = 'qwen3:8b';
        apikeyInput.placeholder = 'sk-...';
        // hide Azure-specific fields by default
        fieldAzureAuthType.hidden = true;
        fieldBearerToken.hidden = true;
        if (provider === 'none') {
          fieldEndpoint.hidden = true;
          fieldModel.hidden = true;
          fieldApikey.hidden = true;
          fieldApiVersion.hidden = true;
        } else if (provider === 'ollama') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = true;
          fieldApiVersion.hidden = true;
          if (!endpointInput.value) endpointInput.value = 'http://localhost:11434';
        } else if (provider === 'openai-compat') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = false;
          fieldApiVersion.hidden = true;
          if (!endpointInput.value) endpointInput.value = 'https://api.openai.com/v1';
        } else if (provider === 'azure-openai') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApiVersion.hidden = false;
          fieldAzureAuthType.hidden = false;
          endpointInput.placeholder = 'https://{resource}.openai.azure.com';
          modelInput.placeholder = 'gpt-4o';
          apikeyInput.placeholder = '';
          if (!apiVersionInput.value) apiVersionInput.value = '2024-12-01-preview';
          syncAzureAuthFields();
        }
        statusEl.textContent = '';
        statusEl.className = 'settings-status';
      }

      function syncAzureAuthFields() {
        var authType = azureAuthTypeSel.value;
        if (authType === 'bearer') {
          fieldApikey.hidden = true;
          fieldBearerToken.hidden = false;
        } else {
          fieldApikey.hidden = false;
          fieldBearerToken.hidden = true;
        }
      }
      azureAuthTypeSel.addEventListener('change', syncAzureAuthFields);

      providerSel.addEventListener('change', syncFields);
      syncFields();

      // Test connection
      testBtn.addEventListener('click', function () {
        var provider = providerSel.value;
        var endpoint = endpointInput.value.replace(/\/+$/, '');
        if (provider === 'none' || !endpoint) {
          statusEl.textContent = '请先选择 Provider 并填写端点';
          statusEl.className = 'settings-status is-err';
          return;
        }

        statusEl.textContent = '连接中...';
        statusEl.className = 'settings-status';

        var testUrl = '';
        var headers = { 'Content-Type': 'application/json' };
        if (provider === 'ollama') {
          testUrl = endpoint + '/api/tags';
        } else if (provider === 'azure-openai') {
          var apiVer = apiVersionInput.value || '2024-12-01-preview';
          testUrl = endpoint + '/openai/models?api-version=' + apiVer;
          var azAuthType = azureAuthTypeSel.value;
          if (azAuthType === 'bearer') {
            var bt = bearerTokenInput.value;
            if (!bt) {
              statusEl.textContent = '请填写 Bearer Token';
              statusEl.className = 'settings-status is-err';
              return;
            }
            headers['Authorization'] = 'Bearer ' + bt;
          } else {
            var azKey = apikeyInput.value;
            if (azKey) headers['api-key'] = azKey;
          }
        } else {
          testUrl = endpoint + '/models';
          var key = apikeyInput.value;
          if (key) headers['Authorization'] = 'Bearer ' + key;
        }

        fetch(testUrl, { method: 'GET', headers: headers })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(handleTestResult)
          .catch(handleTestError);
      });

      function handleTestResult(data) {
            var models = [];
            var provider = providerSel.value;
            if (provider === 'ollama' && data.models) {
              data.models.forEach(function (m) { models.push(m.name || m.model); });
            } else if (data.data) {
              data.data.forEach(function (m) { models.push(m.id); });
            }
            statusEl.textContent = '✓ 已连接，' + models.length + ' 个模型可用';
            statusEl.className = 'settings-status is-ok';

            if (models.length > 0) {
              var currentVal = modelInput.value || modelSelect.value || '';
              modelSelect.innerHTML = '';
              var placeholder = document.createElement('option');
              placeholder.value = '';
              placeholder.textContent = '-- 选择模型 --';
              modelSelect.appendChild(placeholder);
              models.forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === currentVal) opt.selected = true;
                modelSelect.appendChild(opt);
              });
              modelInput.hidden = true;
              modelSelect.hidden = false;
              if (currentVal && models.indexOf(currentVal) >= 0) {
                modelSelect.value = currentVal;
              }
              modelSelect.onchange = function () {
                modelInput.value = modelSelect.value;
              };
            }
      }

      function handleTestError(err) {
            statusEl.textContent = '✗ ' + err.message;
            statusEl.className = 'settings-status is-err';
      }

      // Save settings
      saveBtn.addEventListener('click', function () {
        var settings = {
          provider: providerSel.value,
          endpoint: endpointInput.value,
          model: modelInput.value,
          apikey: apikeyInput.value,
          apiVersion: apiVersionInput.value,
          azureAuthType: azureAuthTypeSel.value,
          bearerToken: bearerTokenInput.value
        };
        localStorage.setItem('llm-settings', JSON.stringify(settings));
        statusEl.textContent = '✓ 已保存';
        statusEl.className = 'settings-status is-ok';
        setTimeout(function () {
          statusEl.textContent = '';
          statusEl.className = 'settings-status';
        }, 2000);
      });

      // ── Narration voice settings ──
      var narrLang = document.getElementById('narr-lang');
      var narrRate = document.getElementById('narr-rate');
      var narrRateValue = document.getElementById('narr-rate-value');
      var narrVoice = document.getElementById('narr-voice');
      var narrPreview = document.getElementById('narr-voice-preview');
      var narrSave = document.getElementById('narr-save');
      var narrTts = document.getElementById('narr-tts');
      var narrVibeVoice = document.getElementById('narr-vibe-voice');
      var narrVibeField = document.getElementById('narr-vibe-voice-field');

      // Load saved global narration settings
      var narrSaved = null;
      try { narrSaved = JSON.parse(localStorage.getItem('narration-settings')); } catch (e) {}
      if (narrSaved) {
        if (narrSaved.lang) narrLang.value = narrSaved.lang;
        if (narrSaved.rate) { narrRate.value = narrSaved.rate; narrRateValue.textContent = narrSaved.rate; }
        if (narrSaved.ttsProvider) narrTts.value = narrSaved.ttsProvider;
        if (narrSaved.vibeVoice) narrVibeVoice.value = narrSaved.vibeVoice;
      }

      // Show/hide VibeVoice field
      var syncVibeField = function () {
        narrVibeField.hidden = narrTts.value !== 'vibevoice';
      };
      syncVibeField();
      narrTts.addEventListener('change', syncVibeField);

      // Populate voice list
      var narrDialectMap = {
        'zh-CN': '普通话', 'zh-TW': '台湾', 'zh-HK': '粤语',
        'en-US': 'US', 'en-GB': 'UK', 'en-AU': 'AU', 'en-IN': 'IN', 'en-IE': 'IE', 'en-ZA': 'ZA'
      };

      var populateNarrVoices = function () {
        if (!window.speechSynthesis) return;
        var allVoices = window.speechSynthesis.getVoices();
        if (!allVoices || !allVoices.length) return;

        var filterLang = narrLang.value;
        if (filterLang === 'auto') filterLang = (localStorage.getItem('lang') || 'zh');
        var langPrefix = (filterLang === 'zh') ? 'zh' : 'en';
        var currentVal = narrVoice.value;

        while (narrVoice.options.length > 1) {
          narrVoice.removeChild(narrVoice.lastChild);
        }

        allVoices.forEach(function (v) {
          if (v.lang.indexOf(langPrefix) !== 0) return;
          var opt = document.createElement('option');
          opt.value = v.name;
          var dialectLabel = narrDialectMap[v.lang] || v.lang;
          var coreName = v.name.replace(/\s*\(.*\)\s*$/, '');
          opt.textContent = coreName + ' · ' + dialectLabel;
          opt.title = v.name + ' (' + v.lang + ')';
          narrVoice.appendChild(opt);
        });

        if (currentVal) narrVoice.value = currentVal;
        if (narrSaved && narrSaved.voiceName && !currentVal) narrVoice.value = narrSaved.voiceName;
      };

      populateNarrVoices();
      if (window.speechSynthesis) {
        window.speechSynthesis.addEventListener('voiceschanged', populateNarrVoices);
      }

      narrLang.addEventListener('change', function () {
        narrVoice.value = '';
        populateNarrVoices();
      });

      narrRate.addEventListener('input', function () {
        narrRateValue.textContent = parseFloat(narrRate.value).toFixed(2);
      });

      // Voice preview
      narrPreview.addEventListener('click', function () {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        var filterLang = narrLang.value;
        if (filterLang === 'auto') filterLang = (localStorage.getItem('lang') || 'zh');
        var testText = (filterLang === 'zh')
          ? '这是一段语音测试，你可以听到当前选择的语音效果。'
          : 'This is a voice preview. You can hear how the selected voice sounds.';
        var utt = new SpeechSynthesisUtterance(testText);
        utt.lang = (filterLang === 'zh') ? 'zh-CN' : 'en-US';
        utt.rate = parseFloat(narrRate.value) || 0.92;
        if (narrVoice.value) {
          var allV = window.speechSynthesis.getVoices();
          var match = allV.filter(function (v) { return v.name === narrVoice.value; });
          if (match.length) utt.voice = match[0];
        }
        window.speechSynthesis.speak(utt);
      });

      // VibeVoice preview
      var narrVibePreview = document.getElementById('narr-vibe-preview');
      narrVibePreview.addEventListener('click', function () {
        var testText = 'This is a voice preview. You can hear how the selected voice sounds.';
        narrVibePreview.textContent = '...';
        fetch('http://127.0.0.1:8191/v1/audio/speech', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer dummy' },
          body: JSON.stringify({
            model: 'VibeVoice-Realtime-0.5B-4bit',
            input: testText,
            voice: narrVibeVoice.value || 'en-Emma_woman',
            speed: parseFloat(narrRate.value) || 1.0
          })
        })
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.arrayBuffer();
        })
        .then(function (buf) {
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          return ctx.decodeAudioData(buf).then(function (audioBuf) {
            var src = ctx.createBufferSource();
            src.buffer = audioBuf;
            src.connect(ctx.destination);
            src.onended = function () { narrVibePreview.textContent = '试听'; };
            src.start(0);
            narrVibePreview.textContent = '播放中';
          });
        })
        .catch(function () {
          narrVibePreview.textContent = '试听';
          window.alert('VibeVoice 试听失败，请确认服务已启动 (http://127.0.0.1:8191)');
        });
      });

      // Save narration settings
      narrSave.addEventListener('click', function () {
        var s = {
          lang: narrLang.value === 'auto' ? '' : narrLang.value,
          rate: parseFloat(narrRate.value),
          voiceName: narrVoice.value,
          ttsProvider: narrTts.value,
          vibeVoice: narrVibeVoice.value
        };
        localStorage.setItem('narration-settings', JSON.stringify(s));
        narrSave.textContent = '✓ 已保存';
        setTimeout(function () {
          narrSave.textContent = '保存设置';
        }, 2000);
      });

      // Auto-start narration toggle
      var narrAutostart = document.getElementById('narr-autostart');
      narrAutostart.checked = localStorage.getItem('narration-autostart') === 'true';
      narrAutostart.addEventListener('change', function () {
        localStorage.setItem('narration-autostart', narrAutostart.checked ? 'true' : 'false');
      });
    }

    // ============ LAYOUT SWITCHING ============
    function initLayoutPicker() {
      var picker = document.getElementById('layout-picker');
      var buttons = picker.querySelectorAll('.layout-picker-option');
      var spokeSection = document.getElementById('spoke-style-section');
      var arcSortSection = document.getElementById('arc-sort-section');

      // Show/hide spoke style and sort sections based on current layout
      spokeSection.style.display = (currentLayout === 'infographic') ? '' : 'none';
      arcSortSection.style.display = (currentLayout === 'infographic') ? '' : 'none';

      buttons.forEach(function (btn) {
        if (btn.getAttribute('data-layout') === currentLayout) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var layout = btn.getAttribute('data-layout');
          if (layout === currentLayout) return;
          buttons.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          currentLayout = layout;
          localStorage.setItem('layout', layout);
          spokeSection.style.display = (layout === 'infographic') ? '' : 'none';
          arcSortSection.style.display = (layout === 'infographic') ? '' : 'none';
          applyLayout(layout);
        });
      });

      // Spoke style picker
      initSpokePicker();

      // Arc sort picker
      initArcSortPicker();
    }

    function initSpokePicker() {
      var spokePicker = document.getElementById('spoke-style-picker');
      var spokeBtns = spokePicker.querySelectorAll('.layout-picker-option');
      spokeBtns.forEach(function (btn) {
        if (btn.getAttribute('data-spoke') === spokeStyle) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var style = btn.getAttribute('data-spoke');
          if (style === spokeStyle) return;
          spokeBtns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          spokeStyle = style;
          localStorage.setItem('spokeStyle', style);
          if (currentLayout === 'infographic') renderInfographicView();
        });
      });
    }

    // ── Open mode picker ──
    function initArcSortPicker() {
      var sortPicker = document.getElementById('arc-sort-picker');
      if (!sortPicker) return;
      var sortBtns = sortPicker.querySelectorAll('.layout-picker-option');
      sortBtns.forEach(function (btn) {
        if (btn.getAttribute('data-arc-sort') === arcSortMode) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var mode = btn.getAttribute('data-arc-sort');
          if (mode === arcSortMode) return;
          sortBtns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          arcSortMode = mode;
          localStorage.setItem('arcSortMode', mode);
          if (currentLayout === 'infographic') renderInfographicView();
        });
      });
    }

    // ── Open mode picker ──
    function initOpenModePicker() {
      var picker = document.getElementById('open-mode-picker');
      if (!picker) return;
      var btns = picker.querySelectorAll('.layout-picker-option');
      btns.forEach(function (btn) {
        if (btn.getAttribute('data-open') === openMode) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var mode = btn.getAttribute('data-open');
          if (mode === openMode) return;
          btns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          openMode = mode;
          localStorage.setItem('openMode', mode);
        });
      });
    }

    // ── Texture picker ──
    function initTexturePicker() {
      var picker = document.getElementById('texture-picker');
      if (!picker) return;
      var btns = picker.querySelectorAll('.layout-picker-option');
      // Apply saved texture
      document.body.setAttribute('data-texture', bgTexture);
      btns.forEach(function (btn) {
        if (btn.getAttribute('data-texture') === bgTexture) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var tex = btn.getAttribute('data-texture');
          if (tex === bgTexture) return;
          btns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          bgTexture = tex;
          localStorage.setItem('bgTexture', tex);
          document.body.setAttribute('data-texture', tex);
        });
      });
    }

    function navigateToArticle(url) {
      if (!url) return;
      if (openMode === 'new') {
        window.open(url, '_blank');
      } else {
        window.location.href = url;
      }
    }

    // Intercept all article link clicks to respect openMode setting
    document.addEventListener('click', function (e) {
      if (openMode !== 'new') return;
      var link = e.target.closest('a[href]');
      if (!link) return;
      var href = link.getAttribute('href');
      if (!href || href.charAt(0) === '#') return;
      // Only intercept internal article links (posts/...)
      if (href.indexOf('posts/') === 0 || href.indexOf('./posts/') === 0) {
        e.preventDefault();
        window.open(href, '_blank');
      }
    });

    // ============ SEARCH ============
    var searchInput = document.getElementById('search-input');
    var searchClear = document.getElementById('search-clear');
    var searchQuery = '';
    var searchDebounce = null;

    function matchesSearch(node, q) {
      if (!q) return true;
      var ql = q.toLowerCase();
      var title = (node.title ? (node.title.zh + ' ' + node.title.en) : '').toLowerCase();
      var label = (node.label ? (node.label.zh + ' ' + node.label.en) : '').toLowerCase();
      var summary = (node.summary ? (node.summary.zh + ' ' + node.summary.en) : '').toLowerCase();
      var tags = (node.tags || []).join(' ').toLowerCase();
      return title.indexOf(ql) !== -1 || label.indexOf(ql) !== -1 ||
             summary.indexOf(ql) !== -1 || tags.indexOf(ql) !== -1;
    }

    function applySearch(q) {
      searchQuery = q;
      if (currentLayout === 'galaxy') {
        applySearchGalaxy(q);
      } else if (currentLayout === 'cards') {
        applySearchCards(q);
      }
      // Infographic: re-render applies filter via spoke opacity
      if (currentLayout === 'infographic') {
        renderInfographicView();
      }
      if (currentLayout === 'cell') {
        applySearchCell(q);
      }
    }

    function applySearchGalaxy(q) {
      planets.forEach(function (pl) {
        var match = !q || matchesSearch(pl, q) || getAllArticles(pl.id).some(function (a) { return matchesSearch(a, q); });
        pl.el.classList.toggle('is-search-hidden', !match);
        pl.satRingEl.style.display = match ? '' : 'none';
      });
      groups.forEach(function (g) {
        var match = !q || matchesSearch(g, q) || getAllArticles(g.id).some(function (a) { return matchesSearch(a, q); });
        g.el.classList.toggle('is-search-hidden', !match);
        g.satRingEl.style.display = match ? '' : 'none';
      });
      posts.forEach(function (p) {
        var match = !q || matchesSearch(p, q);
        p.el.classList.toggle('is-search-hidden', !match);
      });
    }

    function applySearchCards(q) {
      var items = cardsViewEl.querySelectorAll('.layout-card-item');
      var titles = cardsViewEl.querySelectorAll('.layout-cards-group-title');
      if (!q) {
        items.forEach(function (el) { el.style.display = ''; });
        titles.forEach(function (el) { el.style.display = ''; });
        return;
      }
      var ql = q.toLowerCase();
      var visibleGroups = {};
      items.forEach(function (el) {
        var text = el.textContent.toLowerCase();
        var show = text.indexOf(ql) !== -1;
        el.style.display = show ? '' : 'none';
        if (show) {
          var prev = el.previousElementSibling;
          while (prev) {
            if (prev.classList.contains('layout-cards-group-title')) {
              visibleGroups[prev.textContent] = true;
              break;
            }
            prev = prev.previousElementSibling;
          }
        }
      });
      titles.forEach(function (el) {
        el.style.display = visibleGroups[el.textContent] ? '' : 'none';
      });
    }

    function applySearchCell(q) {
      var articles = cellViewEl.querySelectorAll('.cell-article');
      articles.forEach(function (el) {
        if (!q) {
          el.classList.remove('is-search-hidden');
          return;
        }
        // Find matching node by label text
        var labelEl = el.querySelector('.cell-article-label');
        var labelText = labelEl ? labelEl.textContent : '';
        // Also check the underlying data
        var match = false;
        posts.forEach(function (p) {
          if (p.title && (p.title.zh === labelText || p.title.en === labelText)) {
            match = matchesSearch(p, q);
          }
        });
        // Fallback: text search on label
        if (!match && labelText.toLowerCase().indexOf(q.toLowerCase()) !== -1) match = true;
        el.classList.toggle('is-search-hidden', !match);
      });
    }

    searchInput.addEventListener('input', function () {
      var q = searchInput.value.trim();
      searchClear.hidden = !q;
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(function () { applySearch(q); }, 150);
    });

    searchClear.addEventListener('click', function () {
      searchInput.value = '';
      searchClear.hidden = true;
      applySearch('');
    });

    function applyHiddenFilter() {
      rebuildDerivedArrays();

      // Galaxy: toggle visibility of all DOM elements based on hidden state
      knowledgeTree.forEach(function (n) {
        var hidden = !showHidden && isNodeHidden(n);
        if (n.el) n.el.classList.toggle('is-tree-hidden', hidden);
        if (n.satRingEl) n.satRingEl.classList.toggle('is-tree-hidden', hidden);
      });

      // Rebuild tag cloud
      buildTagCloud();

      // Re-render alternate layouts (with proper cleanup)
      if (currentLayout === 'cards') {
        renderCardsView();
      } else if (currentLayout === 'infographic') {
        if (infographicViewEl._arcCleanup) {
          infographicViewEl._arcCleanup();
          infographicViewEl._arcCleanup = null;
        }
        renderInfographicView();
      } else if (currentLayout === 'cell') {
        if (cellViewEl._cleanup) {
          cellViewEl._cleanup();
          cellViewEl._cleanup = null;
        }
        renderCellView();
      }
    }

    function applyLayout(layout) {
      // Cleanup previous infographic arc listeners
      if (infographicViewEl._arcCleanup) {
        infographicViewEl._arcCleanup();
        infographicViewEl._arcCleanup = null;
      }
      // Cleanup previous cell view
      if (cellViewEl._cleanup) {
        cellViewEl._cleanup();
        cellViewEl._cleanup = null;
      }
      document.body.setAttribute('data-layout', layout);
      // Clean up galaxy state
      closeCard();
      closePlanetPanel();
      if (selectedPlanetId) clearPlanetSelection();
      // Re-apply search to new layout
      if (searchQuery) applySearch(searchQuery);
      // Render alternate views if needed
      if (layout === 'cards') {
        renderCardsView();
      } else if (layout === 'infographic') {
        renderInfographicView();
      } else if (layout === 'cell') {
        renderCellView();
      }
    }

    function renderCardsView() {
      var html = '<div class="layout-cards-grid">';
      planets.forEach(function (pl) {
        var planetPosts = posts.filter(function (p) { return p.planetId === pl.id; });
        if (planetPosts.length === 0) return;
        planetPosts.sort(function (a, b) { return (a.date || '').localeCompare(b.date || ''); });
        html += '<div class="layout-cards-group-title">' +
          '<span class="layout-cards-dot" style="background:' + pl.color + '"></span>' +
          '<span class="layout-cards-group-label">' + pl.label[lang] + '</span>' +
        '</div>';
        planetPosts.forEach(function (p) {
          var tags = p.tags.map(function (t) {
            return '<span class="card-tag">' + t + '</span>';
          }).join('');
          html += '<a class="layout-card-item" href="' + p.url + '">' +
            '<div class="card-meta"><time>' + p.date + '</time></div>' +
            '<h3>' + p.title[lang] + '</h3>' +
            '<div class="card-tags">' + tags + '</div>' +
            '<p>' + p.summary[lang] + '</p>' +
          '</a>';
        });
      });
      html += '</div>';
      cardsViewEl.innerHTML = html;
    }

    // ============ CELL VIEW (Force-directed organic bubbles) ============
    function renderCellView() {
      cellViewEl.innerHTML = '';
      var stage = document.createElement('div');
      stage.className = 'cell-stage';
      cellViewEl.appendChild(stage);

      var W = window.innerWidth, H = window.innerHeight;
      var cellCam = { x: W / 2, y: H / 2, scale: 0.85 };
      var simNodes = [];
      var simFrame = null;
      var cellPanZoom = null;

      // Organic border-radius presets
      var blobShapes = [
        '42% 58% 55% 45% / 55% 45% 52% 48%',
        '55% 45% 48% 52% / 45% 55% 50% 50%',
        '48% 52% 58% 42% / 52% 48% 44% 56%',
        '50% 50% 45% 55% / 58% 42% 55% 45%',
        '45% 55% 52% 48% / 50% 50% 58% 42%'
      ];

      // ── Build flat node list from tree ──
      var PAD = 10;
      var LABEL_PAD = 28; // extra top padding for bubble label
      var ART_R = 16;

      function buildNodes(parentId, depth, parentNode) {
        var children = getChildren(parentId);
        var topics = [], articles = [];
        children.forEach(function (c) {
          if (c.type === 'topic') topics.push(c);
          else articles.push(c);
        });

        var childSimNodes = [];

        // Articles as leaf nodes
        articles.forEach(function (a, i) {
          var angle = (i / Math.max(articles.length, 1)) * Math.PI * 2 + Math.random() * 0.3;
          var dist = 20 + Math.random() * 15;
          var sn = {
            id: a.id, type: 'article', depth: depth, node: a,
            x: dist * Math.cos(angle), y: dist * Math.sin(angle),
            vx: 0, vy: 0, r: ART_R,
            parent: parentNode, el: null, labelEl: null
          };
          simNodes.push(sn);
          childSimNodes.push(sn);
        });

        // Topics recursively
        topics.forEach(function (t, i) {
          var angle = (i / Math.max(topics.length, 1)) * Math.PI * 2 + Math.random() * 0.5;
          var dist = 30 + Math.random() * 20;
          var sn = {
            id: t.id, type: 'topic', depth: depth, node: t,
            x: dist * Math.cos(angle), y: dist * Math.sin(angle),
            vx: 0, vy: 0, r: 30,
            parent: parentNode, el: null, labelEl: null,
            children: [], blobIdx: (i + depth) % blobShapes.length
          };
          simNodes.push(sn);
          childSimNodes.push(sn);
          // Recurse
          sn.children = buildNodes(t.id, depth + 1, sn);
        });

        return childSimNodes;
      }

      // Root-level sim nodes
      var rootNodes = [];
      planets.forEach(function (pl, i) {
        var angle = (i / planets.length) * Math.PI * 2;
        var dist = 50 + i * 20;
        var sn = {
          id: pl.id, type: 'topic', depth: 0, node: pl,
          x: dist * Math.cos(angle), y: dist * Math.sin(angle),
          vx: 0, vy: 0, r: 50,
          parent: null, el: null, labelEl: null,
          children: [], blobIdx: i % blobShapes.length
        };
        simNodes.push(sn);
        rootNodes.push(sn);
        sn.children = buildNodes(pl.id, 1, sn);
      });

      // ── Create DOM elements ──
      simNodes.forEach(function (sn) {
        if (sn.type === 'topic') {
          var bubble = document.createElement('div');
          bubble.className = 'cell-bubble';
          bubble.style.borderRadius = blobShapes[sn.blobIdx];
          var c = sn.node.color || '#888';
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          bubble.style.background = isDark
            ? 'radial-gradient(ellipse at 40% 35%, ' + c + '1a, ' + c + '08 70%, transparent)'
            : 'radial-gradient(ellipse at 40% 35%, ' + c + '14, ' + c + '06 70%, transparent)';
          bubble.style.borderColor = c + '25';
          (function (nId) {
            bubble.addEventListener('click', function (e) {
              e.stopPropagation();
              onPlanetClick(nId);
            });
          })(sn.node.id);
          stage.appendChild(bubble);
          sn.el = bubble;

          var label = document.createElement('div');
          label.className = 'cell-bubble-label';
          label.textContent = sn.node.label ? sn.node.label[lang] : sn.node.id;
          stage.appendChild(label);
          sn.labelEl = label;
        } else {
          var dot = document.createElement('div');
          dot.className = 'cell-article';
          dot.style.width = (ART_R * 2) + 'px';
          dot.style.height = (ART_R * 2) + 'px';
          var ac = sn.node.color || '#888';
          var dk = adjustColor(ac, -40), lt = adjustColor(ac, 40);
          dot.style.background = 'radial-gradient(circle at 38% 35%, ' + lt + ', ' + ac + ' 55%, ' + dk + ')';
          dot.style.boxShadow = '0 2px 8px ' + ac + '44';
          var dotLabel = document.createElement('span');
          dotLabel.className = 'cell-article-label';
          dotLabel.textContent = sn.node.title ? sn.node.title[lang] : sn.node.id;
          dot.appendChild(dotLabel);
          (function (url, nId) {
            dot.addEventListener('click', function (e) {
              e.stopPropagation();
              navigateToArticle(url);
            });
            dot.addEventListener('mouseenter', function (e) {
              if (postMap[nId]) showCard(nId, e.clientX, e.clientY);
              beginHoverPause();
            });
            dot.addEventListener('mouseleave', function () {
              closeCard();
              endHoverPause();
            });
          })(sn.node.url, sn.node.id);
          stage.appendChild(dot);
          sn.el = dot;
        }
      });

      // ── Force simulation ──
      var driftTime = 0;
      function simulate() {
        var alpha = 0.85; // velocity retention per frame
        var gravity = 0.002;
        var drift = window._cellGameActive ? 0.04 : 0.008; // boosted drift during game
        driftTime += window._cellGameActive ? 0.012 : 0.003;

        // Apply forces bottom-up: children push each other, then attract to parent center
        function applyForces(nodes, cx, cy) {
          // Gravity toward parent center
          nodes.forEach(function (n) {
            n.vx += (cx - n.x) * gravity;
            n.vy += (cy - n.y) * gravity;
            // Slow organic drift using unique per-node phase
            var phase = n._driftPhase;
            if (phase === undefined) { phase = n._driftPhase = Math.random() * Math.PI * 2; }
            n.vx += Math.sin(driftTime * 0.7 + phase) * drift;
            n.vy += Math.cos(driftTime * 0.5 + phase * 1.3) * drift;
          });

          // Elastic collision between siblings
          var restitution = 0.3; // soft bounce
          for (var i = 0; i < nodes.length; i++) {
            for (var j = i + 1; j < nodes.length; j++) {
              var dx = nodes[j].x - nodes[i].x;
              var dy = nodes[j].y - nodes[i].y;
              var dist = Math.sqrt(dx * dx + dy * dy) || 1;
              var minD = nodes[i].r + nodes[j].r + 2;
              if (dist < minD) {
                // Normal vector from i to j
                var nx = dx / dist;
                var ny = dy / dist;
                // Relative velocity of j w.r.t. i along normal
                var dvx = nodes[j].vx - nodes[i].vx;
                var dvy = nodes[j].vy - nodes[i].vy;
                var relVn = dvx * nx + dvy * ny;
                // Only resolve if objects are approaching
                if (relVn < 0) {
                  // Mass proportional to radius squared
                  var mi = nodes[i].r * nodes[i].r;
                  var mj = nodes[j].r * nodes[j].r;
                  var impulse = -(1 + restitution) * relVn / (1 / mi + 1 / mj);
                  nodes[i].vx -= (impulse / mi) * nx;
                  nodes[i].vy -= (impulse / mi) * ny;
                  nodes[j].vx += (impulse / mj) * nx;
                  nodes[j].vy += (impulse / mj) * ny;
                }
                // Separate overlapping objects
                var overlap = (minD - dist) * 0.5;
                nodes[i].x -= overlap * nx;
                nodes[i].y -= overlap * ny;
                nodes[j].x += overlap * nx;
                nodes[j].y += overlap * ny;
              }
            }
          }

          // Update positions
          nodes.forEach(function (n) {
            n.vx *= alpha;
            n.vy *= alpha;
            n.x += n.vx;
            n.y += n.vy;
          });

          // Recurse into topic children
          nodes.forEach(function (n) {
            if (n.type === 'topic' && n.children.length > 0) {
              applyForces(n.children, 0, 0);
              // Compute tight bounding box of children (in local coords)
              var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
              n.children.forEach(function (c) {
                minX = Math.min(minX, c.x - c.r);
                maxX = Math.max(maxX, c.x + c.r);
                minY = Math.min(minY, c.y - c.r);
                maxY = Math.max(maxY, c.y + c.r);
              });
              var w = maxX - minX + PAD * 2;
              var h = maxY - minY + PAD * 2 + LABEL_PAD;
              n.r = Math.sqrt(w * w + h * h) / 2;
              n.bw = w; n.bh = h;
              n.bcx = (minX + maxX) / 2; n.bcy = (minY + maxY) / 2;
            } else if (n.type === 'topic') {
              n.r = 24; n.bw = 48; n.bh = 48; n.bcx = 0; n.bcy = 0;
            }
          });
        }

        applyForces(rootNodes, 0, 0);
      }

      // ── Render positions ──
      function renderPositions() {
        function renderNode(sn, ox, oy) {
          var gx = ox + sn.x;
          var gy = oy + sn.y;
          if (sn.type === 'topic') {
            var w = sn.bw || 48;
            var h = sn.bh || 48;
            var bcx = sn.bcx || 0;
            var bcy = sn.bcy || 0;
            sn.el.style.width = w + 'px';
            sn.el.style.height = h + 'px';
            sn.el.style.left = (gx + bcx - w / 2) + 'px';
            sn.el.style.top = (gy + bcy - h / 2) + 'px';
            var fs = Math.max(8, Math.min(13, Math.min(w, h) / 6));
            sn.labelEl.style.fontSize = fs + 'px';
            sn.labelEl.style.top = (gy + bcy - h / 2 + 4) + 'px';
            sn.labelEl.style.left = (gx + bcx) + 'px';
            // Render children relative to this topic
            sn.children.forEach(function (c) { renderNode(c, gx, gy); });
          } else {
            sn.el.style.left = gx + 'px';
            sn.el.style.top = gy + 'px';
            sn.el.style.transform = 'translate(-50%, -50%)';
          }
        }
        rootNodes.forEach(function (rn) { renderNode(rn, 0, 0); });
      }

      // ── Animation loop ──
      function tick() {
        if (!isMotionPaused) {
          simulate();
          renderPositions();
        }
        simFrame = requestAnimationFrame(tick);
      }
      simFrame = requestAnimationFrame(tick);

      // ── Camera (via PanZoomController) ──
      function updateCellCamera() {
        stage.style.transform = 'translate(' + cellCam.x + 'px,' + cellCam.y + 'px) scale(' + cellCam.scale + ')';
      }

      updateCellCamera();

      cellPanZoom = PanZoomController(cellViewEl, cellCam, {
        scaleMin: 0.15,
        scaleMax: 5,
        shouldBlockPan: function (target) {
          return target.closest('.cell-article');
        },
        onUpdate: updateCellCamera,
        layoutGuard: function () { return currentLayout === 'cell'; }
      });

      // Cleanup
      cellViewEl._cleanup = function () {
        if (simFrame) cancelAnimationFrame(simFrame);
        if (cellPanZoom) cellPanZoom.destroy();
      };
    }

    function renderInfographicView() {
      renderInfographicViewModule({
        container: infographicViewEl,
        planets: planets,
        lang: lang,
        searchQuery: searchQuery,
        matchesSearch: matchesSearch,
        arcSortMode: arcSortMode,
        getChildren: getChildren,
        getAllArticles: getAllArticles,
        navigateToArticle: navigateToArticle,
        currentLayout: currentLayout,
        spokeStyle: spokeStyle,
        colorSchemes: colorSchemes,
        currentScheme: currentScheme
      });
    }

    // ============ UTIL ============
    function beginHoverPause() {
      hoverPauseCount += 1;
      isMotionPaused = hoverPauseCount > 0;
    }

    function endHoverPause() {
      hoverPauseCount = Math.max(0, hoverPauseCount - 1);
      isMotionPaused = hoverPauseCount > 0;
    }

    function adjustColor(hex, amt) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      r = Math.max(0, Math.min(255, r + amt));
      g = Math.max(0, Math.min(255, g + amt));
      b = Math.max(0, Math.min(255, b + amt));
      return '#' + [r, g, b].map(function (c) {
        return c.toString(16).padStart(2, '0');
      }).join('');
    }

  }); // end DOMContentLoaded
  </script>
