  <script src="assets/scrollbar.js"></script>
  <script src="assets/knowledge-data.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {

    // ============ TREE UTILITIES ============
    // Build lookup maps from the flat knowledgeTree[]
    var nodeById = {};
    knowledgeTree.forEach(function (n) { nodeById[n.id] = n; });

    function getChildren(parentId) {
      return knowledgeTree.filter(function (n) { return n.parentId === parentId; });
    }

    function getDepth(node) {
      var d = 0, cur = node;
      while (cur && cur.parentId) { d++; cur = nodeById[cur.parentId]; }
      return d;
    }

    function getRoots() {
      return knowledgeTree.filter(function (n) { return n.parentId === null; });
    }

    function getTopics(parentId) {
      return getChildren(parentId).filter(function (n) { return n.type === 'topic'; });
    }

    function getArticles(parentId) {
      return getChildren(parentId).filter(function (n) { return n.type === 'article'; });
    }

    // Recursively collect all articles under a node (any depth)
    function getAllArticles(nodeId) {
      var result = [];
      getChildren(nodeId).forEach(function (c) {
        if (c.type === 'article') result.push(c);
        else result = result.concat(getAllArticles(c.id));
      });
      return result;
    }

    // Get display label for any node
    function nodeLabel(n, l) {
      return n.label ? n.label[l] : (n.title ? n.title[l] : n.id);
    }

    // ============ DERIVED COMPAT ARRAYS ============
    // For backward-compat with Galaxy/Cards/Infographic renderers
    var planets = getRoots();
    var groups = [];
    var posts = [];

    // Walk tree: depth-1 topics → groups; articles → posts
    knowledgeTree.forEach(function (n) {
      if (n.type === 'topic' && n.parentId !== null) {
        // It's a sub-topic (group)
        n.planetId = n.parentId; // compatibility
        groups.push(n);
      } else if (n.type === 'article') {
        // Find the root ancestor to set planetId
        var cur = n;
        var chain = [cur.parentId];
        while (cur.parentId && nodeById[cur.parentId]) {
          cur = nodeById[cur.parentId];
          if (cur.parentId !== null) chain.push(cur.parentId);
        }
        n.planetId = cur.id; // root ancestor
        // groupId = direct parent if parent is a topic (non-root)
        var directParent = nodeById[n.parentId];
        if (directParent && directParent.type === 'topic' && directParent.parentId !== null) {
          n.groupId = directParent.id;
        }
        posts.push(n);
      }
    });

    // Hub-level orbits (for planets around center)
    var HUB_ORBITS = [
      { rx: 0.22, ry: 0.30, tilt: -8 },
      { rx: 0.34, ry: 0.40, tilt: 12 },
      { rx: 0.44, ry: 0.48, tilt: -5 }
    ];

    // Orbit radii scale down by depth
    var ORBIT_RADII = [0.08, 0.045, 0.028]; // depth 1, 2, 3+
    var ORBIT_TILTS = [15, -10, 8];
    var ORBIT_SPEEDS = [0.00015, 0.00018, 0.00022];

    function getOrbitRadius(depth) {
      return ORBIT_RADII[Math.min(depth - 1, ORBIT_RADII.length - 1)];
    }
    function getOrbitTilt(depth) {
      return ORBIT_TILTS[Math.min(depth - 1, ORBIT_TILTS.length - 1)];
    }
    function getOrbitSpeed(depth) {
      return ORBIT_SPEEDS[Math.min(depth - 1, ORBIT_SPEEDS.length - 1)];
    }

    var SAT_RADIUS = ORBIT_RADII[0];
    var SAT_TILT = ORBIT_TILTS[0];
    var HUB_SPEED = 0.00004;
    var SAT_SPEED = ORBIT_SPEEDS[0];
    var GROUP_SAT_RADIUS = ORBIT_RADII[1];
    var GROUP_SAT_TILT = ORBIT_TILTS[1];
    var GROUP_SPEED = ORBIT_SPEEDS[1];
    var groupMap = {};

    // ============ STATE ============
    var lang = localStorage.getItem('lang') || 'zh';
    var theme = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    var currentLayout = localStorage.getItem('layout') || 'galaxy';
    var spokeStyle = localStorage.getItem('spokeStyle') || 'solid';
    var activePostId = null;
    var hoverPostId = null;
    var selectedPlanetId = null;
    var selectedTags = [];
    var orbitEls = [];
    var satOrbitEls = [];
    var connLines = [];
    var prevTime = 0;
    var hoverPauseCount = 0;
    var isMotionPaused = false;
    var cam = { x: 0, y: 0, scale: 1 };
    var SCALE_MIN = 0.3;
    var SCALE_MAX = 3.0;
    var drag = { active: false, moved: false, startX: 0, startY: 0, camX: 0, camY: 0 };

    var planetMap = {};
    var postMap = {};

    // ============ DOM REFS ============
    var svg = document.getElementById('svg');
    var graphEl = document.getElementById('graph');
    var graphStageEl = document.getElementById('graph-stage');
    var planetPanelEl = document.getElementById('planet-panel');
    var cardEl = document.getElementById('card');
    var cardsViewEl = document.getElementById('layout-cards-view');
    var infographicViewEl = document.getElementById('infographic-view');

    // ============ INIT ============
    applyTheme(theme);
    applyLang(lang);
    createHubOrbits();
    createPlanets();
    createNodes();
    buildTagCloud();
    initSettings();
    initLayoutPicker();
    applyLayout(currentLayout);
    requestAnimationFrame(animate);
    window.addEventListener('resize', onResize);
    graphEl.addEventListener('click', onGraphClick);
    planetPanelEl.addEventListener('mouseenter', beginHoverPause);
    planetPanelEl.addEventListener('mouseleave', endHoverPause);
    planetPanelEl.addEventListener('click', function (e) {
      if (e.target.closest('.planet-panel-close')) {
        e.stopPropagation();
        clearPlanetSelection();
      }
    });
    cardEl.addEventListener('mouseenter', beginHoverPause);
    cardEl.addEventListener('mouseleave', endHoverPause);

    // Zoom (mouse wheel)
    graphEl.addEventListener('wheel', function (e) {
      if (e.target.closest('.planet-panel')) return;
      e.preventDefault();
      var f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      var newScale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, cam.scale * f));
      f = newScale / cam.scale;
      cam.x = e.clientX - (e.clientX - cam.x) * f;
      cam.y = e.clientY - (e.clientY - cam.y) * f;
      cam.scale = newScale;
    }, { passive: false });

    // Pan (drag on empty space)
    graphEl.addEventListener('mousedown', function (e) {
      if (e.button !== 0) return;
      if (e.target.closest('.node') || e.target.closest('.planet') ||
          e.target.closest('.card') || e.target.closest('.planet-panel') ||
          e.target.closest('.tag-chip') ||
          e.target.closest('.ctrl-btn')) return;
      drag.active = true; drag.moved = false;
      drag.startX = e.clientX; drag.startY = e.clientY;
      drag.camX = cam.x; drag.camY = cam.y;
    });
    window.addEventListener('mousemove', function (e) {
      if (!drag.active) return;
      var dx = e.clientX - drag.startX;
      var dy = e.clientY - drag.startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) drag.moved = true;
      cam.x = drag.camX + dx;
      cam.y = drag.camY + dy;
    });
    window.addEventListener('mouseup', function () {
      drag.active = false;
    });

    // ============ THEME / LANG / FONT ============
    document.getElementById('theme-toggle').addEventListener('click', function () {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme(theme);
      localStorage.setItem('theme', theme);
    });

    // Language picker in settings panel
    var langPicker = document.getElementById('lang-picker');
    if (langPicker) {
      langPicker.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-lang-val]');
        if (!btn) return;
        lang = btn.getAttribute('data-lang-val');
        applyLang(lang);
        localStorage.setItem('lang', lang);
        langPicker.querySelectorAll('.layout-picker-option').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-lang-val') === lang);
        });
        // Re-render font picker labels for new language
        renderFontPicker();
      });
      // Sync initial state
      langPicker.querySelectorAll('.layout-picker-option').forEach(function (b) {
        b.classList.toggle('is-active', b.getAttribute('data-lang-val') === lang);
      });
    }

    // Font picker
    var fontDefs = {
      zh: [
        { id: 'system', name: '系统字体', family: '-apple-system, "Noto Sans SC", sans-serif', preview: '知识即力量' },
        { id: 'songti', name: '宋体', family: '"Songti SC", "SimSun", serif', preview: '知识即力量' },
        { id: 'yuanti', name: '圆体', family: '"Yuanti SC", "Noto Sans SC", sans-serif', preview: '知识即力量' },
        { id: 'kaiti', name: '楷体', family: '"Kaiti SC", "KaiTi", serif', preview: '知识即力量' }
      ],
      en: [
        { id: 'system-sans', name: 'System Sans', family: '-apple-system, "Helvetica Neue", sans-serif', preview: 'Knowledge is power' },
        { id: 'roman-serif', name: 'Roman Serif', family: '"Times New Roman", "Georgia", serif', preview: 'Knowledge is power' },
        { id: 'humanist', name: 'Humanist Sans', family: '"Gill Sans", "Optima", "Segoe UI", sans-serif', preview: 'Knowledge is power' },
        { id: 'geometric', name: 'Geometric Sans', family: '"Futura", "Avenir", "Century Gothic", sans-serif', preview: 'Knowledge is power' }
      ]
    };
    var currentFont = localStorage.getItem('readingFont') || 'system';

    function renderFontPicker() {
      var container = document.getElementById('font-picker');
      if (!container) return;
      var fonts = fontDefs[lang] || fontDefs.zh;
      container.innerHTML = '';
      fonts.forEach(function (f) {
        var btn = document.createElement('button');
        btn.className = 'font-picker-option' + (f.id === currentFont ? ' is-active' : '');
        btn.type = 'button';
        btn.setAttribute('data-font-id', f.id);
        btn.innerHTML = '<span class="font-preview" style="font-family:' + f.family + '">' + f.preview + '</span>' +
          '<span class="font-name">' + f.name + '</span>';
        container.appendChild(btn);
      });
    }

    function applyFont(fontId) {
      var fonts = fontDefs[lang] || fontDefs.zh;
      var match = null;
      fonts.forEach(function (f) { if (f.id === fontId) match = f; });
      // Also check other language
      if (!match) {
        var otherFonts = fontDefs[lang === 'zh' ? 'en' : 'zh'];
        otherFonts.forEach(function (f) { if (f.id === fontId) match = f; });
      }
      if (match) {
        document.documentElement.style.setProperty('--reading-font', match.family);
        localStorage.setItem('readingFontFamily', match.family);
      } else {
        document.documentElement.style.removeProperty('--reading-font');
        localStorage.removeItem('readingFontFamily');
      }
    }

    var fontPickerEl = document.getElementById('font-picker');
    if (fontPickerEl) {
      fontPickerEl.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-font-id]');
        if (!btn) return;
        currentFont = btn.getAttribute('data-font-id');
        localStorage.setItem('readingFont', currentFont);
        applyFont(currentFont);
        fontPickerEl.querySelectorAll('.font-picker-option').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-font-id') === currentFont);
        });
      });
    }

    renderFontPicker();
    applyFont(currentFont);

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      var themeBtn = document.getElementById('theme-toggle');
      themeBtn.innerHTML = getThemeIconSvg();
      themeBtn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }

    function getThemeIconSvg() {
      return '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18" fill="currentColor"/></svg>';
    }

    function applyLang(l) {
      document.documentElement.setAttribute('lang', l === 'zh' ? 'zh-CN' : 'en');
      document.querySelectorAll('[data-zh][data-en]').forEach(function (el) {
        el.innerHTML = el.getAttribute('data-' + l);
      });
      // Sync lang picker in settings
      if (langPicker) {
        langPicker.querySelectorAll('.layout-picker-option').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-lang-val') === l);
        });
      }
      document.title = l === 'zh' ? 'Knowledge Hub — 学习与研究笔记' : 'Knowledge Hub — Study & Research Notes';
      planets.forEach(function (pl) {
        if (pl.labelEl) pl.labelEl.textContent = pl.label[l];
      });
      groups.forEach(function (g) {
        if (g.labelEl) g.labelEl.textContent = g.label[l];
      });
      posts.forEach(function (p) {
        if (p.labelEl) p.labelEl.textContent = p.title[l];
      });
      if (selectedPlanetId) showPlanetPanel(selectedPlanetId);
      if (activePostId) showCard(activePostId);
      // Re-render alternate layouts with new language
      if (currentLayout === 'cards') renderCardsView();
      if (currentLayout === 'infographic') renderInfographicView();
    }

    // ============ HUB ORBITS (SVG) ============
    function createHubOrbits() {
      HUB_ORBITS.forEach(function () {
        var el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        el.setAttribute('class', 'orbit-ring');
        el.setAttribute('stroke-width', '1');
        svg.appendChild(el);
        orbitEls.push(el);
      });
      layoutOrbits();
    }

    function layoutOrbits() {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      HUB_ORBITS.forEach(function (o, i) {
        var el = orbitEls[i];
        el.setAttribute('cx', cx);
        el.setAttribute('cy', cy);
        el.setAttribute('rx', base * o.rx);
        el.setAttribute('ry', base * o.ry);
        el.setAttribute('transform', 'rotate(' + o.tilt + ' ' + cx + ' ' + cy + ')');
      });
    }

    // ============ PLANETS ============
    function createPlanets() {
      // Count posts per planet for proportional sizing
      var postCounts = {};
      posts.forEach(function (p) {
        postCounts[p.planetId] = (postCounts[p.planetId] || 0) + 1;
      });
      var maxCount = 1;
      Object.keys(postCounts).forEach(function (k) {
        if (postCounts[k] > maxCount) maxCount = postCounts[k];
      });

      var MIN_SIZE = 40;
      var MAX_SIZE = 68;

      planets.forEach(function (pl) {
        pl.angle = pl.phase;
        pl.x = 0; pl.y = 0;

        var count = postCounts[pl.id] || 1;
        var size = MIN_SIZE + (MAX_SIZE - MIN_SIZE) * (count / Math.max(maxCount, 1));
        pl.bodySize = size;

        // Create satellite orbit ring (SVG)
        var satRing = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        satRing.setAttribute('class', 'orbit-ring');
        satRing.setAttribute('stroke-width', '0.8');
        satRing.style.stroke = pl.color;
        satRing.style.opacity = '0.2';
        svg.appendChild(satRing);
        pl.satRingEl = satRing;

        // Create planet DOM
        var el = document.createElement('div');
        el.className = 'planet';
        el.setAttribute('data-planet', pl.id);

        var body = document.createElement('div');
        body.className = 'planet-body';
        body.style.width = size + 'px';
        body.style.height = size + 'px';
        var darker = adjustColor(pl.color, -50);
        var lighter = adjustColor(pl.color, 40);
        body.style.background = 'radial-gradient(circle at 38% 35%, ' + lighter + ', ' + pl.color + ' 50%, ' + darker + ' 100%)';
        body.style.boxShadow = '0 4px 20px ' + pl.color + '44, inset 0 -4px 12px ' + darker + '66';

        // Texture overlay for natural surface
        var texture = document.createElement('div');
        texture.className = 'planet-texture';
        body.appendChild(texture);

        // Fine grain layer for more realistic planetary surface detail
        var noise = document.createElement('div');
        noise.className = 'planet-surface-noise';
        body.appendChild(noise);

        // Relief layer to add topographic-like light and shadow patches
        var relief = document.createElement('div');
        relief.className = 'planet-relief';
        body.appendChild(relief);

        // Atmospheric band
        var band = document.createElement('div');
        band.className = 'planet-band';
        body.appendChild(band);

        el.appendChild(body);

        var label = document.createElement('span');
        label.className = 'planet-label';
        label.textContent = pl.label[lang];
        el.appendChild(label);
        pl.labelEl = label;

        el.addEventListener('click', function (e) {
          e.stopPropagation();
          onPlanetClick(pl.id);
        });
        el.addEventListener('mouseenter', beginHoverPause);
        el.addEventListener('mouseleave', endHoverPause);

        graphStageEl.appendChild(el);
        pl.el = el;
        planetMap[pl.id] = pl;
      });

      // Create group "mini-planet" nodes
      groups.forEach(function (g) {
        g.angle = g.phase || 0;
        g.x = 0; g.y = 0;

        // Orbit ring for group's children
        var gRing = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
        gRing.setAttribute('class', 'orbit-ring');
        gRing.setAttribute('stroke-width', '0.6');
        gRing.style.stroke = g.color;
        gRing.style.opacity = '0.15';
        svg.appendChild(gRing);
        g.satRingEl = gRing;

        // Group node DOM (smaller planet style)
        var el = document.createElement('div');
        el.className = 'planet';
        el.setAttribute('data-group', g.id);

        var size = 22;
        g.bodySize = size;
        var body = document.createElement('div');
        body.className = 'planet-body';
        body.style.width = size + 'px';
        body.style.height = size + 'px';
        var darker = adjustColor(g.color, -50);
        var lighter = adjustColor(g.color, 40);
        body.style.background = 'radial-gradient(circle at 38% 35%, ' + lighter + ', ' + g.color + ' 50%, ' + darker + ' 100%)';
        body.style.boxShadow = '0 3px 14px ' + g.color + '44, inset 0 -3px 8px ' + darker + '66';

        var texture = document.createElement('div');
        texture.className = 'planet-texture';
        body.appendChild(texture);
        el.appendChild(body);

        var label = document.createElement('span');
        label.className = 'planet-label';
        label.textContent = g.label[lang];
        el.appendChild(label);
        g.labelEl = label;

        el.addEventListener('mouseenter', beginHoverPause);
        el.addEventListener('mouseleave', endHoverPause);

        graphStageEl.appendChild(el);
        g.el = el;
        groupMap[g.id] = g;
      });
    }

    // ============ KNOWLEDGE NODES ============
    function createNodes() {
      posts.forEach(function (p) {
        p.angle = p.phase;
        p.paused = false;
        p.x = 0; p.y = 0;

        var el = document.createElement('div');
        el.className = 'node';
        el.style.background = p.color;
        el.style.color = p.color;
        el.setAttribute('data-id', p.id);

        var label = document.createElement('span');
        label.className = 'node-label';
        label.textContent = p.title[lang];
        el.appendChild(label);
        p.labelEl = label;

        el.addEventListener('mouseenter', function () { onNodeHover(p.id); });
        el.addEventListener('mouseleave', function () { onNodeLeave(p.id); });
        el.addEventListener('click', function (e) {
          e.stopPropagation();
          onNodeClick(p.id);
        });

        graphStageEl.appendChild(el);
        p.el = el;
        postMap[p.id] = p;
      });
    }

    // ============ POSITION CALC ============
    function calcPlanetPos(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var cx = W / 2, cy = H / 2;
      var base = Math.min(W, H);
      var o = HUB_ORBITS[pl.orbitIndex] || HUB_ORBITS[0];
      var rx = base * o.rx, ry = base * o.ry;
      var tiltRad = o.tilt * Math.PI / 180;
      var ux = rx * Math.cos(pl.angle);
      var uy = ry * Math.sin(pl.angle);
      return {
        x: cx + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: cy + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcGroupPos(g) {
      var pl = planetMap[g.planetId];
      if (!pl) return { x: 0, y: 0 };
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * SAT_RADIUS;
      var tiltRad = SAT_TILT * Math.PI / 180;
      var ux = r * Math.cos(g.angle);
      var uy = r * 0.6 * Math.sin(g.angle);
      return {
        x: pl.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: pl.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    function calcNodePos(post) {
      // If post belongs to a group, orbit the group; otherwise orbit the planet
      var g = post.groupId ? groupMap[post.groupId] : null;
      if (g) {
        var base = Math.min(window.innerWidth, window.innerHeight);
        var r = base * GROUP_SAT_RADIUS;
        var tiltRad = GROUP_SAT_TILT * Math.PI / 180;
        var ux = r * Math.cos(post.angle);
        var uy = r * 0.6 * Math.sin(post.angle);
        return {
          x: g.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
          y: g.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
        };
      }
      var pl = planetMap[post.planetId];
      if (!pl) return { x: 0, y: 0 };
      var base = Math.min(window.innerWidth, window.innerHeight);
      var r = base * SAT_RADIUS;
      var tiltRad = SAT_TILT * Math.PI / 180;
      var ux = r * Math.cos(post.angle);
      var uy = r * 0.6 * Math.sin(post.angle);
      return {
        x: pl.x + ux * Math.cos(tiltRad) - uy * Math.sin(tiltRad),
        y: pl.y + ux * Math.sin(tiltRad) + uy * Math.cos(tiltRad)
      };
    }

    // ============ ANIMATION ============
    function animate(time) {
      var dt = prevTime ? (time - prevTime) : 16;
      prevTime = time;
      var base = Math.min(window.innerWidth, window.innerHeight);
      graphStageEl.style.transform = 'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.scale + ')';

      // Move planets
      planets.forEach(function (pl) {
        if (!isMotionPaused) {
          pl.angle += HUB_SPEED * pl.speed * dt;
        }
        var pos = calcPlanetPos(pl);
        pl.x = pos.x; pl.y = pos.y;
        pl.el.style.left = pos.x + 'px';
        pl.el.style.top = pos.y + 'px';

        // Update satellite orbit ring
        var r = base * SAT_RADIUS;
        pl.satRingEl.setAttribute('cx', pos.x);
        pl.satRingEl.setAttribute('cy', pos.y);
        pl.satRingEl.setAttribute('rx', r);
        pl.satRingEl.setAttribute('ry', r * 0.6);
        pl.satRingEl.setAttribute('transform', 'rotate(' + SAT_TILT + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move groups (orbit their parent planet)
      groups.forEach(function (g) {
        if (!isMotionPaused) {
          g.angle += SAT_SPEED * (g.speed || 1) * dt;
        }
        var pos = calcGroupPos(g);
        g.x = pos.x; g.y = pos.y;
        g.el.style.left = pos.x + 'px';
        g.el.style.top = pos.y + 'px';

        // Update group's child orbit ring
        var gr = base * GROUP_SAT_RADIUS;
        g.satRingEl.setAttribute('cx', pos.x);
        g.satRingEl.setAttribute('cy', pos.y);
        g.satRingEl.setAttribute('rx', gr);
        g.satRingEl.setAttribute('ry', gr * 0.6);
        g.satRingEl.setAttribute('transform', 'rotate(' + GROUP_SAT_TILT + ' ' + pos.x + ' ' + pos.y + ')');
      });

      // Move knowledge nodes (orbit planet or group)
      posts.forEach(function (p) {
        if (!isMotionPaused && !p.paused) {
          var spd = p.groupId ? GROUP_SPEED : SAT_SPEED;
          p.angle += spd * p.speed * dt;
        }
        var pos = calcNodePos(p);
        p.x = pos.x; p.y = pos.y;
        p.el.style.left = pos.x + 'px';
        p.el.style.top = pos.y + 'px';
      });

      updateConnections();

      if (selectedPlanetId && planetMap[selectedPlanetId]) {
        positionPlanetPanel(planetMap[selectedPlanetId]);
      }

      if (activePostId && postMap[activePostId]) {
        positionCard(postMap[activePostId]);
      }

      requestAnimationFrame(animate);
    }

    // ============ PLANET CLICK ============
    function onPlanetClick(plId) {
      closeCard();
      if (selectedPlanetId === plId) {
        clearPlanetSelection();
        return;
      }
      selectedPlanetId = plId;
      applyPlanetFilter();
      showPlanetPanel(plId);
    }

    function clearPlanetSelection() {
      selectedPlanetId = null;
      applyPlanetFilter();
      closePlanetPanel();
    }

    function applyPlanetFilter() {
      planets.forEach(function (pl) {
        var isBg = selectedPlanetId && pl.id !== selectedPlanetId;
        pl.el.classList.toggle('is-bg', isBg);
        pl.el.classList.toggle('is-selected', pl.id === selectedPlanetId);
        pl.satRingEl.classList.toggle('is-bg', isBg);
      });

      // Also mark hub orbit rings
      if (selectedPlanetId) {
        var selPl = planetMap[selectedPlanetId];
        orbitEls.forEach(function (el, i) {
          el.classList.toggle('is-bg', selPl.orbitIndex !== i);
        });
      } else {
        orbitEls.forEach(function (el) { el.classList.remove('is-bg'); });
      }

      // Dim groups (sub-topic mini-planets) from unselected planets
      groups.forEach(function (g) {
        var isBg = selectedPlanetId && g.planetId !== selectedPlanetId;
        g.el.classList.toggle('is-bg', isBg);
        g.satRingEl.classList.toggle('is-bg', isBg);
      });

      posts.forEach(function (p) {
        var isBg = selectedPlanetId && p.planetId !== selectedPlanetId;
        p.el.classList.toggle('is-bg', isBg);
        if (isBg && activePostId === p.id) closeCard();
      });
    }

    // ============ NODE INTERACTIONS ============
    function onNodeHover(id) {
      beginHoverPause();
      hoverPostId = id;
      var p = postMap[id];
      if (p) p.paused = true;
      if (p && p.relations.length) {
        p.relations.forEach(function (rid) {
          var r = postMap[rid];
          if (r) r.el.classList.add('is-related');
        });
      }
    }

    function onNodeLeave(id) {
      hoverPostId = null;
      var p = postMap[id];
      if (p && activePostId !== id) p.paused = false;
      posts.forEach(function (pp) { pp.el.classList.remove('is-related'); });
      endHoverPause();
    }

    function onNodeClick(id) {
      if (activePostId === id) { closeCard(); return; }
      if (activePostId && postMap[activePostId]) {
        postMap[activePostId].paused = false;
        postMap[activePostId].el.classList.remove('is-active');
      }
      activePostId = id;
      var p = postMap[id];
      p.paused = true;
      p.el.classList.add('is-active');
      showCard(id);
    }

    function onGraphClick(e) {
      if (drag.moved) { drag.moved = false; return; }
      if (e.target.closest('.node') || e.target.closest('.card') || e.target.closest('.planet') || e.target.closest('.planet-panel')) return;
      closeCard();
      // Also deselect planet
      if (selectedPlanetId) {
        clearPlanetSelection();
      }
    }

    function showPlanetPanel(plId) {
      var pl = planetMap[plId];
      if (!pl) return;
      var planetPosts = posts.filter(function (p) {
        return p.planetId === plId;
      });
      var itemsHtml = planetPosts.map(function (p) {
        return '<a class="planet-panel-item" href="' + p.url + '">' +
          '<h4>' + p.title[lang] + '</h4>' +
          '<p>' + p.summary[lang] + '</p>' +
          '<span class="planet-panel-link">' +
            (lang === 'zh' ? '查看详情' : 'View details') +
          '</span>' +
        '</a>';
      }).join('');

      planetPanelEl.innerHTML =
        '<div class="planet-panel-header">' +
          '<div>' +
            '<div class="planet-panel-kicker">' + (lang === 'zh' ? '知识星球' : 'Knowledge Planet') + '</div>' +
            '<h3 class="planet-panel-title">' + pl.label[lang] + '</h3>' +
            '<p class="planet-panel-subtitle">' +
              (lang === 'zh'
                ? '共 ' + planetPosts.length + ' 个相关知识点，点击可查看详情。'
                : planetPosts.length + ' related knowledge points. Select one to open the full article.') +
            '</p>' +
          '</div>' +
          '<button class="planet-panel-close" type="button" aria-label="' + (lang === 'zh' ? '关闭面板' : 'Close panel') + '">×</button>' +
        '</div>' +
        '<div class="planet-panel-list">' + itemsHtml + '</div>';

      positionPlanetPanel(pl);
      planetPanelEl.classList.remove('is-visible');
      void planetPanelEl.offsetWidth;
      planetPanelEl.classList.add('is-visible');
    }

    function positionPlanetPanel(pl) {
      var W = window.innerWidth, H = window.innerHeight;
      var panelWidth = planetPanelEl.offsetWidth || Math.min(420, W - 24);
      var panelHeight = planetPanelEl.offsetHeight || 360;
      var planetScreenX = pl.x * cam.scale + cam.x;
      var planetScreenY = pl.y * cam.scale + cam.y;
      var offset = Math.max(28, pl.bodySize * 0.7 * cam.scale + 24);
      var x = planetScreenX + offset;
      var y = planetScreenY - panelHeight * 0.34;

      if (x + panelWidth + 16 > W) x = planetScreenX - panelWidth - offset;
      if (x < 12) x = 12;
      if (y < 72) y = 72;
      if (y + panelHeight + 16 > H) y = H - panelHeight - 16;

      planetPanelEl.style.left = x + 'px';
      planetPanelEl.style.top = y + 'px';
    }

    function closePlanetPanel() {
      planetPanelEl.classList.remove('is-visible');
    }

    function showCard(id) {
      var p = postMap[id];
      if (!p) return;
      var tags = p.tags.map(function (t) {
        return '<span class="card-tag">' + t + '</span>';
      }).join('');
      cardEl.innerHTML =
        '<div class="card-meta"><time>' + p.date + '</time></div>' +
        '<h3>' + p.title[lang] + '</h3>' +
        '<div class="card-tags">' + tags + '</div>' +
        '<p>' + p.summary[lang] + '</p>' +
        '<a class="card-link" href="' + p.url + '">' +
          (lang === 'zh' ? '阅读全文' : 'Read more') + '</a>';
      positionCard(p);
      cardEl.classList.remove('is-visible');
      void cardEl.offsetWidth;
      cardEl.classList.add('is-visible');
    }

    function positionCard(p) {
      var W = window.innerWidth, H = window.innerHeight;
      var cw = 360, ch = 280;
      // Convert stage logical coords to screen coords via camera transform
      var sx = p.x * cam.scale + cam.x;
      var sy = p.y * cam.scale + cam.y;
      var x = sx + 24, y = sy - ch / 3;
      if (x + cw + 20 > W) x = sx - cw - 24;
      if (x < 20) x = Math.max(20, sx - cw / 2);
      if (y < 80) y = 80;
      if (y + ch + 20 > H) y = H - ch - 20;
      cardEl.style.left = x + 'px';
      cardEl.style.top = y + 'px';
    }

    function closeCard() {
      if (activePostId && postMap[activePostId]) {
        postMap[activePostId].paused = false;
        postMap[activePostId].el.classList.remove('is-active');
      }
      activePostId = null;
      cardEl.classList.remove('is-visible');
    }

    // ============ CONNECTION LINES ============
    function updateConnections() {
      connLines.forEach(function (el) { el.remove(); });
      connLines = [];
      var srcId = hoverPostId || activePostId;
      if (!srcId) return;
      var src = postMap[srcId];
      if (!src || !src.relations.length) return;
      src.relations.forEach(function (rid) {
        var tgt = postMap[rid];
        if (!tgt) return;
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
        line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
        line.setAttribute('class', 'conn-line is-visible');
        line.setAttribute('stroke', src.color);
        svg.appendChild(line);
        connLines.push(line);
      });
    }

    // ============ TAG CLOUD ============
    function buildTagCloud() {
      var tagSet = {};
      posts.forEach(function (p) {
        p.tags.forEach(function (t) { tagSet[t] = true; });
      });
      var cloud = document.getElementById('tag-cloud');
      Object.keys(tagSet).forEach(function (tag) {
        var chip = document.createElement('button');
        chip.className = 'tag-chip'; chip.textContent = tag;
        chip.setAttribute('data-tag', tag);
        chip.addEventListener('click', function (e) {
          e.stopPropagation();
          toggleTag(tag, chip);
        });
        cloud.appendChild(chip);
      });
    }

    function toggleTag(tag, chip) {
      var idx = selectedTags.indexOf(tag);
      if (idx >= 0) { selectedTags.splice(idx, 1); chip.classList.remove('is-selected'); }
      else { selectedTags.push(tag); chip.classList.add('is-selected'); }
      applyTagFilter();
    }

    function applyTagFilter() {
      if (selectedTags.length === 0) {
        posts.forEach(function (p) { p.el.classList.remove('is-dimmed'); });
        return;
      }
      posts.forEach(function (p) {
        var match = selectedTags.some(function (t) { return p.tags.indexOf(t) >= 0; });
        p.el.classList.toggle('is-dimmed', !match);
        if (!match && activePostId === p.id) closeCard();
      });
    }

    // ============ RESIZE ============
    function onResize() { layoutOrbits(); }

    // ============ SETTINGS PANEL ============
    function initSettings() {
      var toggle = document.getElementById('settings-toggle');
      var panel = document.getElementById('settings-panel');
      var backdrop = document.getElementById('settings-backdrop');
      var closeBtn = document.getElementById('settings-close');
      var providerSel = document.getElementById('llm-provider');
      var endpointInput = document.getElementById('llm-endpoint');
      var modelInput = document.getElementById('llm-model');
      var modelSelect = document.getElementById('llm-model-select');
      var apikeyInput = document.getElementById('llm-apikey');
      var fieldEndpoint = document.getElementById('field-endpoint');
      var fieldModel = document.getElementById('field-model');
      var fieldApikey = document.getElementById('field-apikey');
      var testBtn = document.getElementById('llm-test');
      var statusEl = document.getElementById('llm-status');
      var saveBtn = document.getElementById('llm-save');

      function openSettings() {
        panel.classList.add('is-open');
        backdrop.classList.add('is-open');
      }
      function closeSettings() {
        panel.classList.remove('is-open');
        backdrop.classList.remove('is-open');
      }

      toggle.addEventListener('click', function (e) {
        e.stopPropagation();
        openSettings();
      });
      closeBtn.addEventListener('click', closeSettings);
      backdrop.addEventListener('click', closeSettings);

      // Load saved settings
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem('llm-settings')); } catch (e) {}
      if (saved) {
        providerSel.value = saved.provider || 'none';
        endpointInput.value = saved.endpoint || '';
        modelInput.value = saved.model || '';
        apikeyInput.value = saved.apikey || '';
      }

      // Provider change → show/hide fields
      function syncFields() {
        var provider = providerSel.value;
        modelInput.hidden = false;
        modelSelect.hidden = true;
        modelSelect.innerHTML = '';
        if (provider === 'none') {
          fieldEndpoint.hidden = true;
          fieldModel.hidden = true;
          fieldApikey.hidden = true;
        } else if (provider === 'ollama') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = true;
          if (!endpointInput.value) endpointInput.value = 'http://localhost:11434';
        } else if (provider === 'openai-compat') {
          fieldEndpoint.hidden = false;
          fieldModel.hidden = false;
          fieldApikey.hidden = false;
          if (!endpointInput.value) endpointInput.value = 'https://api.openai.com/v1';
        }
        statusEl.textContent = '';
        statusEl.className = 'settings-status';
      }
      providerSel.addEventListener('change', syncFields);
      syncFields();

      // Test connection
      testBtn.addEventListener('click', function () {
        var provider = providerSel.value;
        var endpoint = endpointInput.value.replace(/\/+$/, '');
        if (provider === 'none' || !endpoint) {
          statusEl.textContent = '请先选择 Provider 并填写端点';
          statusEl.className = 'settings-status is-err';
          return;
        }

        statusEl.textContent = '连接中...';
        statusEl.className = 'settings-status';

        var testUrl = '';
        var headers = { 'Content-Type': 'application/json' };
        if (provider === 'ollama') {
          testUrl = endpoint + '/api/tags';
        } else {
          testUrl = endpoint + '/models';
          var key = apikeyInput.value;
          if (key) headers['Authorization'] = 'Bearer ' + key;
        }

        fetch(testUrl, { method: 'GET', headers: headers })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            var models = [];
            if (provider === 'ollama' && data.models) {
              data.models.forEach(function (m) { models.push(m.name || m.model); });
            } else if (data.data) {
              data.data.forEach(function (m) { models.push(m.id); });
            }
            statusEl.textContent = '✓ 已连接，' + models.length + ' 个模型可用';
            statusEl.className = 'settings-status is-ok';

            if (models.length > 0) {
              var currentVal = modelInput.value || modelSelect.value || '';
              modelSelect.innerHTML = '';
              var placeholder = document.createElement('option');
              placeholder.value = '';
              placeholder.textContent = '-- 选择模型 --';
              modelSelect.appendChild(placeholder);
              models.forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === currentVal) opt.selected = true;
                modelSelect.appendChild(opt);
              });
              modelInput.hidden = true;
              modelSelect.hidden = false;
              if (currentVal && models.indexOf(currentVal) >= 0) {
                modelSelect.value = currentVal;
              }
              modelSelect.onchange = function () {
                modelInput.value = modelSelect.value;
              };
            }
          })
          .catch(function (err) {
            statusEl.textContent = '✗ ' + err.message;
            statusEl.className = 'settings-status is-err';
          });
      });

      // Save settings
      saveBtn.addEventListener('click', function () {
        var settings = {
          provider: providerSel.value,
          endpoint: endpointInput.value,
          model: modelInput.value,
          apikey: apikeyInput.value
        };
        localStorage.setItem('llm-settings', JSON.stringify(settings));
        statusEl.textContent = '✓ 已保存';
        statusEl.className = 'settings-status is-ok';
        setTimeout(function () {
          statusEl.textContent = '';
          statusEl.className = 'settings-status';
        }, 2000);
      });
    }

    // ============ LAYOUT SWITCHING ============
    function initLayoutPicker() {
      var picker = document.getElementById('layout-picker');
      var buttons = picker.querySelectorAll('.layout-picker-option');
      var spokeSection = document.getElementById('spoke-style-section');

      // Show/hide spoke style section based on current layout
      spokeSection.style.display = (currentLayout === 'infographic') ? '' : 'none';

      buttons.forEach(function (btn) {
        if (btn.getAttribute('data-layout') === currentLayout) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var layout = btn.getAttribute('data-layout');
          if (layout === currentLayout) return;
          buttons.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          currentLayout = layout;
          localStorage.setItem('layout', layout);
          spokeSection.style.display = (layout === 'infographic') ? '' : 'none';
          applyLayout(layout);
        });
      });

      // Spoke style picker
      initSpokePicker();
    }

    function initSpokePicker() {
      var spokePicker = document.getElementById('spoke-style-picker');
      var spokeBtns = spokePicker.querySelectorAll('.layout-picker-option');
      spokeBtns.forEach(function (btn) {
        if (btn.getAttribute('data-spoke') === spokeStyle) {
          btn.classList.add('is-active');
        } else {
          btn.classList.remove('is-active');
        }
        btn.addEventListener('click', function () {
          var style = btn.getAttribute('data-spoke');
          if (style === spokeStyle) return;
          spokeBtns.forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          spokeStyle = style;
          localStorage.setItem('spokeStyle', style);
          if (currentLayout === 'infographic') renderInfographicView();
        });
      });
    }

    function applyLayout(layout) {
      // Cleanup previous infographic arc listeners
      if (infographicViewEl._arcCleanup) {
        infographicViewEl._arcCleanup();
        infographicViewEl._arcCleanup = null;
      }
      document.body.setAttribute('data-layout', layout);
      // Clean up galaxy state
      closeCard();
      closePlanetPanel();
      if (selectedPlanetId) clearPlanetSelection();
      // Render alternate views if needed
      if (layout === 'cards') {
        renderCardsView();
      } else if (layout === 'infographic') {
        renderInfographicView();
      }
    }

    function renderCardsView() {
      var html = '<div class="layout-cards-grid">';
      planets.forEach(function (pl) {
        var planetPosts = posts.filter(function (p) { return p.planetId === pl.id; });
        if (planetPosts.length === 0) return;
        html += '<div class="layout-cards-group-title">' +
          '<span class="layout-cards-dot" style="background:' + pl.color + '"></span>' +
          '<span class="layout-cards-group-label">' + pl.label[lang] + '</span>' +
        '</div>';
        planetPosts.forEach(function (p) {
          var tags = p.tags.map(function (t) {
            return '<span class="card-tag">' + t + '</span>';
          }).join('');
          html += '<a class="layout-card-item" href="' + p.url + '">' +
            '<div class="card-meta"><time>' + p.date + '</time></div>' +
            '<h3>' + p.title[lang] + '</h3>' +
            '<div class="card-tags">' + tags + '</div>' +
            '<p>' + p.summary[lang] + '</p>' +
            '<span class="card-link">' + (lang === 'zh' ? '阅读全文' : 'Read more') + '</span>' +
          '</a>';
        });
      });
      html += '</div>';
      cardsViewEl.innerHTML = html;
    }

    function renderInfographicView() {
      // ═══════════════════════════════════════════════════════════
      // Arc Hierarchy Engine — unlimited depth, rule-based rendering
      // ═══════════════════════════════════════════════════════════
      // Each arc level displays children (topics + articles) of the
      // selected node at the previous level.  Level 0 shows root
      // topics.  Deeper levels are created/destroyed dynamically.
      // ═══════════════════════════════════════════════════════════

      var W = window.innerWidth, H = window.innerHeight;
      var cx = -W * 0.08;
      var cy = H / 2;
      var baseRadius = W * 0.28;
      var arcGap = W * 0.18;

      // ── Per-level state (dynamic array, grows/shrinks as user navigates) ──
      // Each entry: { angle, targetAngle, selectedIdx, visible, timer }
      function makeLevel() {
        return { angle: 0, targetAngle: 0, selectedIdx: 0, visible: true, timer: null };
      }
      var arcLevels = [makeLevel()];     // level 0 always exists

      var arcState = {
        focusArc: 0,
        animFrame: null,
        isAnimating: false
      };

      var container = infographicViewEl;
      container.innerHTML = '';

      // SVG layer
      var svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svgEl.setAttribute('class', 'arc-svg');
      svgEl.setAttribute('width', '100%');
      svgEl.setAttribute('height', '100%');
      container.appendChild(svgEl);

      // Detail card
      var detailEl = document.createElement('a');
      detailEl.className = 'arc-detail';
      container.appendChild(detailEl);
      var detailHoverLock = false;
      detailEl.addEventListener('mouseenter', function () { detailHoverLock = true; });
      detailEl.addEventListener('mouseleave', function () { detailHoverLock = false; hideDetail(); });

      // Scroll hint
      var hintEl = document.createElement('div');
      hintEl.className = 'arc-scroll-hint';
      hintEl.setAttribute('data-zh', '滚轮切换 · ←→ 层级 · Enter 进入 · Esc 关闭');
      hintEl.setAttribute('data-en', 'Scroll to browse · ←→ levels · Enter to open · Esc to close');
      hintEl.textContent = lang === 'zh' ? hintEl.getAttribute('data-zh') : hintEl.getAttribute('data-en');
      container.appendChild(hintEl);

      var nodeEls = [];
      var defaultNodeGap = 0.32;

      // ── Geometry helpers (all use arcIdx for radius calc) ──

      function getNodeGap(arcIdx, total) {
        if (total <= 1) return defaultNodeGap;
        var r = baseRadius + arcIdx * arcGap;
        var margin = 80;
        var maxHalf = Math.asin(Math.min(0.95, (H / 2 - margin) / r));
        var visibleSpan = 2 * maxHalf;
        var fitGap = (visibleSpan * 0.85) / (total - 1);
        return Math.min(defaultNodeGap, fitGap);
      }

      function getWheelAngle(idx, total, rotation, gap) {
        if (!gap) gap = defaultNodeGap;
        var offset = -(total - 1) / 2 * gap;
        return offset + idx * gap + rotation;
      }

      function getArcXY(arcIdx, angle) {
        var r = baseRadius + arcIdx * arcGap;
        return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
      }

      function findClosestTo3(total, rotation, gap) {
        var bestIdx = 0, bestDist = Infinity;
        for (var i = 0; i < total; i++) {
          var d = Math.abs(getWheelAngle(i, total, rotation, gap));
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        }
        return bestIdx;
      }

      function angleForLevel(depth, idx, total) {
        return -getWheelAngle(idx, total, 0, getNodeGap(depth, total));
      }

      // ── Tree queries ──

      function getItemsForLevel(depth) {
        if (depth === 0) {
          return planets.map(function (pl) { return { type: 'topic', data: pl }; });
        }
        var parentNode = getSelectedNodeAtDepth(depth - 1);
        if (!parentNode) return [];
        var children = getChildren(parentNode.id);
        return children.map(function (c) {
          return { type: c.type === 'topic' ? 'topic' : 'article', data: c };
        });
      }

      function getSelectedNodeAtDepth(depth) {
        var items = getItemsForLevel(depth);
        var lvl = arcLevels[depth];
        if (!lvl || !items.length) return null;
        var idx = Math.min(lvl.selectedIdx, items.length - 1);
        return items[idx].data;
      }

      function nodeLabel(n) {
        return n.label ? n.label[lang] : (n.title ? n.title[lang] : n.id);
      }

      function nodeColor(n) { return n.color || '#888'; }

      // Count all descendant articles under a node (cached per render)
      var descendantCache = {};
      function getDescendantCount(nodeId) {
        if (descendantCache[nodeId] !== undefined) return descendantCache[nodeId];
        var count = getAllArticles(nodeId).length;
        descendantCache[nodeId] = count;
        return count;
      }

      // ── Ensure arcLevels array has entry for depth ──
      function ensureLevel(depth) {
        while (arcLevels.length <= depth) arcLevels.push(makeLevel());
      }

      // ── Trim levels deeper than depth (collapse children) ──
      function trimLevels(depth) {
        for (var i = arcLevels.length - 1; i > depth; i--) {
          if (arcLevels[i].timer) clearTimeout(arcLevels[i].timer);
        }
        arcLevels.length = depth + 1;
        if (arcState.focusArc > depth) arcState.focusArc = depth;
      }

      // ── SVG drawing ──

      function drawArcRing(arcIdx) {
        var r = baseRadius + arcIdx * arcGap;
        var span = (arcIdx === 0) ? Math.PI * 0.85 : Math.PI * 0.7;
        var startA = -span / 2, endA = span / 2;
        var x1 = cx + r * Math.cos(startA), y1 = cy + r * Math.sin(startA);
        var x2 = cx + r * Math.cos(endA),   y2 = cy + r * Math.sin(endA);
        var la = span > Math.PI ? 1 : 0;
        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + la + ' 1 ' + x2 + ' ' + y2);
        var cls = 'arc-ring arc-ring-' + arcIdx;
        if (arcState.focusArc === arcIdx) cls += ' is-focused';
        path.setAttribute('class', cls);
        svgEl.appendChild(path);
      }

      function drawArcSpokes(arcIdx, nodeAngles, nodeColors, selectedIdx) {
        if (!nodeAngles || !nodeAngles.length) return;
        if (spokeStyle === 'hidden') return;
        var r = baseRadius + arcIdx * arcGap;
        var prevR = (arcIdx > 0) ? baseRadius + (arcIdx - 1) * arcGap : 0;
        var nextR = baseRadius + (arcIdx + 1) * arcGap;
        var innerR = (arcIdx === 0) ? r * 0.4 : (prevR + r) / 2;
        var outerR = (r + nextR) / 2;

        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        var darkShades  = [['#1a1e28', '#2a3040'], ['#1e2230', '#2e3648']];
        var lightShades = [['#c8cbd4', '#dcdee6'], ['#d0d3dc', '#e2e4ea']];
        var darkSelected  = ['#252a38', '#3a4258'];
        var lightSelected = ['#b8bcc8', '#d2d5de'];

        var defs = svgEl.querySelector('defs');
        if (!defs) {
          defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
          svgEl.insertBefore(defs, svgEl.firstChild);
        }

        var boundaries = [];
        var i;
        if (nodeAngles.length === 1) {
          boundaries.push(nodeAngles[0] - 0.18);
          boundaries.push(nodeAngles[0] + 0.18);
        } else {
          var firstGap = (nodeAngles[1] - nodeAngles[0]) / 2;
          boundaries.push(nodeAngles[0] - firstGap);
          for (i = 0; i < nodeAngles.length - 1; i++) {
            boundaries.push((nodeAngles[i] + nodeAngles[i + 1]) / 2);
          }
          var lastGap = (nodeAngles[nodeAngles.length - 1] - nodeAngles[nodeAngles.length - 2]) / 2;
          boundaries.push(nodeAngles[nodeAngles.length - 1] + lastGap);
        }

        for (i = 0; i < boundaries.length - 1; i++) {
          var a1 = boundaries[i], a2 = boundaries[i + 1];
          var isSel = (i === selectedIdx);
          var parity = i % 2;
          var innerColor = isSel ? (isDark ? darkSelected[0] : lightSelected[0]) : (isDark ? darkShades[parity][0] : lightShades[parity][0]);
          var outerColor = isSel ? (isDark ? darkSelected[1] : lightSelected[1]) : (isDark ? darkShades[parity][1] : lightShades[parity][1]);

          var gradId = 'spoke-grad-' + arcIdx + '-' + i;
          var rg = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
          rg.setAttribute('id', gradId);
          rg.setAttribute('gradientUnits', 'userSpaceOnUse');
          rg.setAttribute('cx', cx); rg.setAttribute('cy', cy); rg.setAttribute('r', outerR);
          var s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
          s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', innerColor);
          var s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
          s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', outerColor);
          rg.appendChild(s1); rg.appendChild(s2); defs.appendChild(rg);

          var ox1 = cx + outerR * Math.cos(a1), oy1 = cy + outerR * Math.sin(a1);
          var ox2 = cx + outerR * Math.cos(a2), oy2 = cy + outerR * Math.sin(a2);
          var ix1b = cx + innerR * Math.cos(a1), iy1b = cy + innerR * Math.sin(a1);
          var ix2b = cx + innerR * Math.cos(a2), iy2b = cy + innerR * Math.sin(a2);
          var ss = Math.abs(a2 - a1), la2 = ss > Math.PI ? 1 : 0;
          var wedge = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          wedge.setAttribute('d',
            'M ' + ix1b + ' ' + iy1b + ' L ' + ox1 + ' ' + oy1 +
            ' A ' + outerR + ' ' + outerR + ' 0 ' + la2 + ' 1 ' + ox2 + ' ' + oy2 +
            ' L ' + ix2b + ' ' + iy2b +
            ' A ' + innerR + ' ' + innerR + ' 0 ' + la2 + ' 0 ' + ix1b + ' ' + iy1b + ' Z');
          wedge.setAttribute('fill', 'url(#' + gradId + ')');
          if (spokeStyle === 'transparent') {
            wedge.setAttribute('fill-opacity', isSel ? '0.35' : '0.15');
          }
          wedge.setAttribute('class', 'arc-spoke-fill' + (isSel ? ' is-active' : ''));
          svgEl.appendChild(wedge);
        }

        var spokeColor = isDark ? '#2a3040' : '#c0c4d0';
        var spokeOpac = (spokeStyle === 'transparent') ? '0.18' : '0.35';
        boundaries.forEach(function (ba) {
          var sx1 = cx + innerR * Math.cos(ba), sy1 = cy + innerR * Math.sin(ba);
          var sx2 = cx + outerR * Math.cos(ba), sy2 = cy + outerR * Math.sin(ba);
          var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', sx1); line.setAttribute('y1', sy1);
          line.setAttribute('x2', sx2); line.setAttribute('y2', sy2);
          line.setAttribute('class', 'arc-spoke');
          line.setAttribute('stroke', spokeColor); line.setAttribute('opacity', spokeOpac);
          svgEl.appendChild(line);
        });
      }

      function drawBezier(x1, y1, x2, y2, color) {
        var midX = (x1 + x2) / 2 + (x2 - x1) * 0.15;
        var d = 'M ' + x1 + ' ' + y1 + ' C ' + midX + ' ' + y1 + ', ' + midX + ' ' + y2 + ', ' + x2 + ' ' + y2;
        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('class', 'arc-bezier');
        if (color) path.setAttribute('stroke', color);
        svgEl.appendChild(path);
      }

      function createNodeEl(data) {
        var el = document.createElement('div');
        el.className = 'arc-node';
        if (data.count > 0) {
          var badge = document.createElement('span');
          badge.className = 'arc-node-count';
          badge.textContent = data.count;
          el.appendChild(badge);
        }
        var label = document.createElement('span');
        label.className = 'arc-label is-right';
        label.textContent = data.label;
        el.appendChild(label);
        el.style.background = data.bg;
        container.appendChild(el);
        return el;
      }

      // ── Detail card ──

      function showDetail(post, x, y) {
        var tags = (post.tags || []).map(function (t) {
          return '<span class="card-tag">' + t + '</span>';
        }).join('');
        detailEl.href = post.url || '#';
        detailEl.innerHTML =
          '<svg class="arc-detail-open" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M7 3H3v12h12v-4"/><path d="M11 3h4v4"/><path d="M15 3L8 10"/></svg>' +
          '<div class="arc-detail-date">' + (post.date || '') + '</div>' +
          '<h4>' + (post.title ? post.title[lang] : '') + '</h4>' +
          '<div class="card-tags">' + tags + '</div>' +
          '<p>' + (post.summary ? post.summary[lang] : '') + '</p>';
        // Measure actual height after content is set
        detailEl.style.left = '-9999px';
        detailEl.style.top = '0';
        detailEl.classList.add('is-visible');
        var dw = 340, dh = detailEl.offsetHeight || 200;
        detailEl.classList.remove('is-visible');
        var dx = x + 28, dy = y - dh / 3;
        if (dx + dw + 16 > W) dx = x - dw - 28;
        if (dx < 16) dx = 16;
        if (dy < 72) dy = 72;
        if (dy + dh + 16 > H) dy = H - dh - 16;
        if (dy < 72) dy = 72;
        detailEl.style.left = dx + 'px';
        detailEl.style.top = dy + 'px';
        void detailEl.offsetWidth;
        detailEl.classList.add('is-visible');
      }

      function hideDetail() {
        detailEl.classList.remove('is-visible');
      }

      function showDetailForLevel(depth, idx) {
        var items = getItemsForLevel(depth);
        if (idx < 0 || idx >= items.length) return;
        var item = items[idx];
        if (item.type !== 'article') return;
        var lvl = arcLevels[depth];
        if (!lvl) return;
        var gap = getNodeGap(depth, items.length);
        var angle = getWheelAngle(idx, items.length, lvl.angle, gap);
        var pos = getArcXY(depth, angle);
        showDetail(item.data, pos.x, pos.y);
      }

      // ── Rendering rules (configurable per depth) ──
      var DEPTH_RULES = {
        nodeSizeSelected: function (d) { return Math.max(20, 44 - d * 8); },
        nodeSizeDefault:  function (d) { return Math.max(14, 28 - d * 4); },
        showSpokes:       function (d) { return d <= 1; },
        showLabel:        function (d) { return d >= 1; },
        slideIn:          function (d) { return d >= 2; }
      };

      // ── Recursive render ──

      function render() {
        svgEl.innerHTML = '';
        nodeEls.forEach(function (el) { el.remove(); });
        nodeEls = [];
        descendantCache = {};
        hideDetail();

        var darker  = function (hex) { return adjustColor(hex, -40); };
        var lighter = function (hex) { return adjustColor(hex, 50); };

        // Walk each active level and render
        var parentPos = null, parentColor = null;

        for (var depth = 0; depth < arcLevels.length; depth++) {
          var lvl = arcLevels[depth];
          var items = getItemsForLevel(depth);
          if (!items.length) break;

          // Clamp selectedIdx
          if (lvl.selectedIdx >= items.length) lvl.selectedIdx = items.length - 1;

          drawArcRing(depth);

          var gap = getNodeGap(depth, items.length);
          var selIdx = findClosestTo3(items.length, lvl.angle, gap);
          // For roulette levels (level 0 always, others when focused or recently navigated)
          var useRoulette = (depth <= 1 || arcState.focusArc === depth);

          // Compute angles/colors for spokes
          var angles = [], colors = [];
          items.forEach(function (item, j) {
            angles.push(getWheelAngle(j, items.length, lvl.angle, gap));
            colors.push(nodeColor(item.data));
          });

          var spokeSelIdx = (arcState.focusArc === depth) ? lvl.selectedIdx : -1;
          if (DEPTH_RULES.showSpokes(depth)) {
            drawArcSpokes(depth, angles, colors, spokeSelIdx);
          }

          var levelParentPos = parentPos;
          var levelParentColor = parentColor;
          var nextParentPos = null, nextParentColor = null;

          // Pre-compute max descendant count for proportional sizing
          var maxDesc = 1;
          items.forEach(function (it) {
            if (it.type === 'topic') {
              var dc = getDescendantCount(it.data.id);
              if (dc > maxDesc) maxDesc = dc;
            }
          });

          items.forEach(function (item, j) {
            var angle = angles[j];
            var pos = getArcXY(depth, angle);
            var isFocused = (arcState.focusArc === depth);
            var isSelected = isFocused && j === lvl.selectedIdx;
            var isAt3 = (j === selIdx);

            var dist = Math.abs(angle);
            var sizeSel = DEPTH_RULES.nodeSizeSelected(depth);
            var sizeDef = DEPTH_RULES.nodeSizeDefault(depth);
            var sizeFactor = Math.max(0.6, 1 - dist * 0.4);
            var opac = isSelected ? 1 : Math.max(0.25, 1 - dist * 0.5);

            var c = nodeColor(item.data);
            var descCount = (item.type === 'topic') ? getDescendantCount(item.data.id) : 0;
            // Scale topic nodes by descendant count
            if (item.type === 'topic' && descCount > 0) {
              var countRatio = descCount / maxDesc;
              var boost = 1 + countRatio * 0.5; // 1.0x ~ 1.5x
              sizeSel = Math.round(sizeSel * boost);
              sizeDef = Math.round(sizeDef * boost);
            }
            // Topics: size based on descendant count only (not selection)
            // Articles: size based on selection state
            var useSelSize = (isAt3 || isSelected) && item.type === 'article';
            var size = Math.round((useSelSize ? sizeSel : sizeDef) * sizeFactor);
            var bgStr = 'radial-gradient(circle at 38% 35%, ' + lighter(c) + ', ' + c + ' 50%, ' + darker(c) + ' 100%)';
            var el = createNodeEl({ label: nodeLabel(item.data), bg: bgStr, count: descCount });
            if (DEPTH_RULES.showLabel(depth)) el.classList.add('show-label');
            if (DEPTH_RULES.slideIn(depth) && lvl.visible) {
              el.classList.add('arc-node-slide-in');
              el.style.animationDelay = (j * 0.08) + 's';
            }
            el.setAttribute('data-depth', depth);
            el.setAttribute('data-idx', j);
            if (isSelected) el.classList.add('is-selected');
            el.style.width = size + 'px';
            el.style.height = size + 'px';
            el.style.left = pos.x + 'px';
            el.style.top = pos.y + 'px';
            el.style.opacity = opac;
            el.style.boxShadow = '0 3px 12px ' + c + '44, inset 0 -2px 6px rgba(0,0,0,0.2)';

            // Bezier from parent level's selected node
            if (levelParentPos) {
              drawBezier(levelParentPos.x, levelParentPos.y, pos.x, pos.y, levelParentColor);
            }

            // Track the selected node's position for next level's beziers
            if (isAt3 && depth === 0) {
              nextParentPos = pos;
              nextParentColor = c;
            }
            // For deeper levels: the selected item is parent of next arc
            var isExpandedTopic = (item.type === 'topic' && depth + 1 < arcLevels.length &&
              items[lvl.selectedIdx] === item);
            if (isExpandedTopic || (isSelected && item.type === 'topic')) {
              nextParentPos = pos;
              nextParentColor = c;
            }

            // Click handler
            (function (d, idx, itm, px, py) {
              if (itm.type === 'article') {
                el.addEventListener('mouseenter', function () {
                  showDetail(itm.data, px, py);
                });
                el.addEventListener('mouseleave', function () {
                  setTimeout(function () { if (!detailHoverLock) hideDetail(); }, 50);
                });
                el.addEventListener('click', function (e) {
                  e.stopPropagation();
                  if (itm.data.url) window.location.href = itm.data.url;
                });
              } else {
                el.addEventListener('click', function (e) {
                  e.stopPropagation();
                  arcLevels[d].selectedIdx = idx;
                  arcLevels[d].targetAngle = angleForLevel(d, idx, getItemsForLevel(d).length);
                  trimLevels(d);
                  var childItems = getItemsForLevel(d + 1);
                  if (childItems.length > 0) {
                    ensureLevel(d + 1);
                    arcLevels[d + 1].selectedIdx = 0;
                    arcLevels[d + 1].angle = 0;
                    arcLevels[d + 1].targetAngle = 0;
                    arcLevels[d + 1].visible = false;
                    clearTimeout(arcLevels[d + 1].timer);
                    arcLevels[d + 1].timer = setTimeout(function () {
                      arcLevels[d + 1].visible = true;
                      render();
                    }, 200);
                  }
                  startAnim();
                });
              }
            })(depth, j, item, pos.x, pos.y);

            nodeEls.push(el);
          });

          parentPos = nextParentPos;
          parentColor = nextParentColor;

          // If this level's visible flag is false (slide-in pending), stop rendering deeper
          if (!lvl.visible) break;
        }
      }

      // ── Animation engine (dynamic levels) ──

      function animateRoulette() {
        var moving = false;
        for (var d = 0; d < arcLevels.length; d++) {
          var lvl = arcLevels[d];
          var diff = lvl.targetAngle - lvl.angle;
          if (Math.abs(diff) > 0.003) {
            lvl.angle += diff * 0.18;
            moving = true;
          } else {
            lvl.angle = lvl.targetAngle;
          }
        }
        render();
        if (moving) {
          arcState.animFrame = requestAnimationFrame(animateRoulette);
        } else {
          arcState.isAnimating = false;
          arcState.animFrame = null;
        }
      }

      function startAnim() {
        if (!arcState.isAnimating) {
          arcState.isAnimating = true;
          arcState.animFrame = requestAnimationFrame(animateRoulette);
        }
      }

      // ── Bounce at edge ──

      function bounceEdgeNode(depth, idx, delta) {
        // CSS bounce on the node
        var offset = 0;
        for (var d = 0; d < depth; d++) {
          offset += getItemsForLevel(d).length;
        }
        var target = nodeEls[offset + idx];
        if (target) {
          target.classList.remove('is-bouncing');
          void target.offsetWidth;
          target.classList.add('is-bouncing');
          setTimeout(function () { target.classList.remove('is-bouncing'); }, 400);
        }
        // Angle nudge for roulette levels
        var lvl = arcLevels[depth];
        if (lvl) {
          var items = getItemsForLevel(depth);
          var nudge = delta * 0.06;
          lvl.targetAngle = angleForLevel(depth, idx, items.length) + nudge;
          startAnim();
          setTimeout(function () {
            lvl.targetAngle = angleForLevel(depth, idx, items.length);
            startAnim();
          }, 120);
        }
      }

      // ── Navigation (unified for all depths) ──

      function spinLevel(depth, delta) {
        var items = getItemsForLevel(depth);
        if (!items.length) return;
        var lvl = arcLevels[depth];
        if (!lvl) return;
        var newIdx = lvl.selectedIdx + delta;
        if (newIdx < 0 || newIdx >= items.length) {
          bounceEdgeNode(depth, lvl.selectedIdx, delta);
          return;
        }
        lvl.selectedIdx = newIdx;
        lvl.targetAngle = angleForLevel(depth, newIdx, items.length);

        // When navigating at this depth, collapse deeper levels
        trimLevels(depth);

        var item = items[newIdx];
        if (item.type === 'topic') {
          hideDetail();
          // Auto-expand children
          var childItems = getItemsForLevel(depth + 1);
          if (childItems.length > 0) {
            ensureLevel(depth + 1);
            arcLevels[depth + 1].selectedIdx = 0;
            arcLevels[depth + 1].angle = 0;
            arcLevels[depth + 1].targetAngle = 0;
            arcLevels[depth + 1].visible = false;
            clearTimeout(arcLevels[depth + 1].timer);
            arcLevels[depth + 1].timer = setTimeout(function () {
              arcLevels[depth + 1].visible = true;
              render();
            }, 200);
          }
        } else {
          // Article — auto-show detail if this level is focused
          if (arcState.focusArc === depth) {
            setTimeout(function () { showDetailForLevel(depth, newIdx); }, 60);
          } else {
            hideDetail();
          }
        }
        startAnim();
      }

      function handleVerticalInput(delta) {
        spinLevel(arcState.focusArc, delta);
      }

      // ── Determine max navigable depth ──
      function getMaxDepth() {
        return arcLevels.length - 1;
      }

      function getArcLevelAtXY(px, py) {
        var dist = Math.sqrt(Math.pow(px - cx, 2) + Math.pow(py - cy, 2));
        var bestLevel = 0, bestDist = Infinity;
        for (var d = 0; d <= getMaxDepth(); d++) {
          var r = baseRadius + d * arcGap;
          var dd = Math.abs(dist - r);
          if (dd < bestDist) { bestDist = dd; bestLevel = d; }
        }
        return bestLevel;
      }

      // ── Event handlers ──

      function onArcScroll(e) {
        if (currentLayout !== 'infographic') return;
        e.preventDefault();
        var delta = e.deltaY > 0 ? 1 : -1;
        var targetArc = getArcLevelAtXY(e.clientX, e.clientY);
        if (targetArc > getMaxDepth()) targetArc = getMaxDepth();
        if (targetArc !== arcState.focusArc) {
          arcState.focusArc = targetArc;
        }
        handleVerticalInput(delta);
      }
      container.addEventListener('wheel', onArcScroll, { passive: false });

      // ── Lightweight focus update (no DOM rebuild) ──
      function updateFocusClasses() {
        nodeEls.forEach(function (el) {
          var d = parseInt(el.getAttribute('data-depth'), 10);
          var idx = parseInt(el.getAttribute('data-idx'), 10);
          if (isNaN(d) || isNaN(idx)) return;
          var lvl = arcLevels[d];
          var isSel = (arcState.focusArc === d && lvl && idx === lvl.selectedIdx);
          el.classList.toggle('is-selected', isSel);
        });
      }

      function onArcMouseMove(e) {
        if (currentLayout !== 'infographic') return;
        var targetArc = getArcLevelAtXY(e.clientX, e.clientY);
        if (targetArc > getMaxDepth()) targetArc = getMaxDepth();
        if (targetArc !== arcState.focusArc) {
          arcState.focusArc = targetArc;
          updateFocusClasses();
        }
      }
      container.addEventListener('mousemove', onArcMouseMove);

      function onArcKeydown(e) {
        if (currentLayout !== 'infographic') return;

        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          e.preventDefault();
          handleVerticalInput(e.key === 'ArrowDown' ? 1 : -1);

        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          var nextDepth = arcState.focusArc + 1;
          if (nextDepth < arcLevels.length) {
            var nextItems = getItemsForLevel(nextDepth);
            if (nextItems.length > 0 && arcLevels[nextDepth].visible) {
              arcState.focusArc = nextDepth;
              render();
              // Auto-show detail if landing on article
              var selItem = nextItems[arcLevels[nextDepth].selectedIdx];
              if (selItem && selItem.type === 'article') {
                showDetailForLevel(nextDepth, arcLevels[nextDepth].selectedIdx);
              }
            }
          }

        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (arcState.focusArc > 0) {
            arcState.focusArc--;
            hideDetail();
            render();
          }

        } else if (e.key === 'Enter') {
          e.preventDefault();
          var depth = arcState.focusArc;
          var items = getItemsForLevel(depth);
          var lvl = arcLevels[depth];
          if (!items.length || !lvl) return;
          var item = items[lvl.selectedIdx];

          if (item.type === 'topic') {
            // Expand: ensure next level exists and enter it
            var childItems = getItemsForLevel(depth + 1);
            if (childItems.length > 0) {
              if (depth + 1 < arcLevels.length && arcLevels[depth + 1].visible) {
                // Already expanded — simply move focus
                arcState.focusArc = depth + 1;
                render();
                var ci = childItems[arcLevels[depth + 1].selectedIdx];
                if (ci && ci.type === 'article') {
                  showDetailForLevel(depth + 1, arcLevels[depth + 1].selectedIdx);
                }
              } else {
                ensureLevel(depth + 1);
                arcLevels[depth + 1].selectedIdx = 0;
                arcLevels[depth + 1].angle = 0;
                arcLevels[depth + 1].targetAngle = 0;
                arcLevels[depth + 1].visible = false;
                clearTimeout(arcLevels[depth + 1].timer);
                arcLevels[depth + 1].timer = setTimeout(function () {
                  arcLevels[depth + 1].visible = true;
                  arcState.focusArc = depth + 1;
                  render();
                  var ci2 = getItemsForLevel(depth + 1);
                  if (ci2.length && ci2[0].type === 'article') {
                    showDetailForLevel(depth + 1, 0);
                  }
                }, 200);
                render();
              }
            }
          } else if (item.type === 'article' && item.data.url) {
            window.location.href = item.data.url;
          }

        } else if (e.key === 'Escape') {
          hideDetail();
        }
      }
      document.addEventListener('keydown', onArcKeydown);

      container.addEventListener('click', function (e) {
        if (e.target === container || e.target === svgEl) {
          hideDetail();
        }
      });

      // Resize handler
      var arcResizeHandler = function () {
        if (currentLayout !== 'infographic') return;
        W = window.innerWidth; H = window.innerHeight;
        cx = -W * 0.08;
        cy = H / 2;
        baseRadius = W * 0.28;
        arcGap = W * 0.18;
        render();
      };
      window.addEventListener('resize', arcResizeHandler);

      // Cleanup
      container._arcCleanup = function () {
        container.removeEventListener('wheel', onArcScroll);
        container.removeEventListener('mousemove', onArcMouseMove);
        document.removeEventListener('keydown', onArcKeydown);
        window.removeEventListener('resize', arcResizeHandler);
        if (arcState.animFrame) cancelAnimationFrame(arcState.animFrame);
        arcLevels.forEach(function (lvl) {
          if (lvl.timer) clearTimeout(lvl.timer);
        });
      };

      render();
    }

    // ============ UTIL ============
    function beginHoverPause() {
      hoverPauseCount += 1;
      isMotionPaused = hoverPauseCount > 0;
    }

    function endHoverPause() {
      hoverPauseCount = Math.max(0, hoverPauseCount - 1);
      isMotionPaused = hoverPauseCount > 0;
    }

    function adjustColor(hex, amt) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      r = Math.max(0, Math.min(255, r + amt));
      g = Math.max(0, Math.min(255, g + amt));
      b = Math.max(0, Math.min(255, b + amt));
      return '#' + [r, g, b].map(function (c) {
        return c.toString(16).padStart(2, '0');
      }).join('');
    }

  }); // end DOMContentLoaded
  </script>
</body>
</html>
